front:
  text: 甘水仙源録卷之一
  hash: sha256:153f093bebc4c0f5ba0251338e45c802cf9aafb86dfa24ea8d60cd74fac5e452
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_HFL_001-001a, image: hfl/0611/0611-008.png}
body:
  text: 夷門天樂道人李道謙集詔書皇帝若曰大道開明可致無為之化至真在宥迄成不宰之功朕以祖宗獲承基構若稽昭代雅慕玄風自東華垂教之餘至重陽開化之始真真不昧代代相承有感遂通無遠弗届雖前代纍承於褒贈在朕心猶慊於追崇乃命儒臣進加徽號惟東華已稱帝君但增紫府少陽之字其正陽純陽海蟾重陽宜錫真君之名丹陽以下七真俱號真人載在方册傳之萬世噫漢世之張道陵唐朝之葉法善俱錫天師之號永為道紀之榮當代不聞異辭後來立為定制朕之所慕或庶幾焉東華教主可贈東華紫府少陽帝君正陽鍾離真人可贈正陽開悟傳道真君純陽吕真人可贈純陽演正警化真君海蟾劉真人可贈海蟾明悟弘道真君重陽王真人可贈重陽全真開化真君丹陽馬先生可贈丹陽抱一無為真人長真談先生可贈長真雲水藴德真人長生劉先生可贈長生輔化明德真人長春丘先生可贈長春演道主教真人玉陽王先生可贈玉陽體玄廣度真人廣寧先生郝大通可贈廣寧通玄太古真人清淨散人孫不二可贈清淨淵貞順德真人宜令掌教光先體道誠明真人張志敬執行準此至元六年正月日碑文終南山神仙重陽真人全真教祖碑開府儀同三司上柱國密國公金源璹撰皇圖啓運必生異人大定隆興道圓賢哲夫三教各有至言妙理釋教得佛之心者達麼也其教名之曰禪儒教傳孔子之家學者子思也其書名之曰中庸道教通五千言之至理不言而傳不行而至若太上老子無為真常之道者重陽子王真人也其教名之曰全真屏去幻妄獨全其真者神仙也真人名哲字知明應現於咸陽大魏村仙母孕二十四月又十八日按二十四氣餘土氣而成真人也真人美鬚髯大目身長六尺餘寸氣豪言辨以此得衆家業豐厚以粟貸貧人惠之者半其濟物之心略可見矣弱冠修進士舉業籍京兆府學又善武略聖朝天眷間收復陜西英豪獲用真人於是捐文場應武舉易名德威字世雄其志足可以知還被道氣充餘善根積著天遣文武之進兩無成焉於是慨然入道改今之名字矣會廢齊攝事秦民未附歲又饑饉時有群寇劫真人家財一空其大父訴之統府大索於鄰里三百余户其所亡者金幣頗復得焉又獲賊之渠魁真人勉之曰此乃鄉黨饑荒譬如乞諸其鄰者亦非真盜也安忍陷於死地縱捨使去里人以此敬仰真人愈甚咸陽醴泉二邑賴真人得安是後於終南劉蔣村創别業居之置家事不問半醉高吟曰昔日龐居士如今王害風於是鄉里見真人曰害風來也真人即應之蓋因自命而人云正隆己卯季夏既望於甘河鎮醉中啖肉有兩衣氈者繼至屠肆中其二人形質一同真人驚異從至僻處虔禱作禮其二仙徐而言曰此子可教矣遂授以口訣其後愈狂詠詩曰四旬八上始遭逢口訣傳來便有功明年再遇於醴泉邀飲肆中酒家問之鄉貫年姓答曰濮人年二十有二姓則不知也其異歟留歌頌五命真人讀餘火之文載全真集中自此棄妻子携幼女送姻家曰他家人口我與養大弗議婚禮留之而去又為詩故以猥賤語詈辱其子孫其末後句云相違地肺成歡樂撞入南京便得真後别號重陽子於南時村作穴室居之名曰活死人墓後遷居劉蔣村北寓水中坻凡肆口而發皆塵外句鄉人唯以害風謔而未始詢其意遇遊則挈一壺行歌且飲有乞飲者亦不拒或以壺取水與人但覺其釀香冽異常後復遇至人飮以神糞因止酒唯飲水焉人聞真人口鼻間醺酣之氣而已醉矣大定丁亥四月忽自焚其庵村民驚救見真人狂舞於火邊其歌語傳中具載又云三年之後别有人來修此庵口占詩有修庵人未比我風流之句凌晨東邁過關携鐵罐一枚隨路乞化而言曰我東方有緣爾七月至山東寧海州郡豪有馬從義者先夢南園仙鶴飛翥俄頃真人至馬公信猶未篤真人於鶴起處築全真庵鎖門百日化之或食或不食又絶水火庵至馬宅幾百步復隔重街馬公寢於宅中樓上門户扃閉真人遇夜親對談論不知從何而來人欲寫其神左目右轉右目左轉或現老少肥瘠黃朱青白形色無定人不能狀之馬夢母曰有一客吕馬通未嘗語人次日真人訓馬公名曰通有馬復夢有梓匠周生者傳道與馬即辭乃尊有關中之行披席出家見一道士入族人馬户曹邸馬亦隨入見真人與道人對坐有馬九官人者求術於二老真人以公曰教馬哥代我於是馬公誦歌一首約二百餘字夢覺唯記歌尾三兩句云燒得白鍊得黃便是長生不死方翌日真人訓馬公法名曰鈺號丹陽子又夢隨真人入山及旦真人便呼馬公曰山侗至於出神入夢感化非一有談哥者患大風疾垂死乞為弟子真人以滌面餘水賜之盥竟眉鬚儼然如舊頓覺道氣瀟灑訓名處端號長真子又有登州棲霞縣丘哥者幼亡父母未嘗讀書來禮真人使掌文翰自後日記千餘字亦善吟詠訓名處機號長春子者是也後願禮師者雲集真人誚罵捶楚以磨鍊之往往散去得真人道者馬談丘而已八年三月鑿洞於崑嵛山於嶺上採石為用不意有巨石飛落人皆悚栗真人振威大喝其石屹然而止山間樵蘇者歡呼作禮遠近服其神變又或餐瓦石或現二首坐庵中人見遊於肆或留之飯預言來餽者何神通應物不可槩舉至八月間遷居文登姜氏庵在張氏家食童子輩見目前琉璃碼瑙珍珠衆寶競來乞取餘人則不能見於文登建三教七寶會九年己丑四月寧海周伯通者邀真人住庵榜曰金蓮堂夜有神光照耀如晝人以為火灾近之見真人行光明中寧海水至鹹鹵真人呪庵之井至今人享其甘潔於是就庵建三教金蓮會至福山縣又立三教三光會至登州遊蓬萊閣下觀海忽發颶風人見真人隨風吹入海中驚訝間有頃復躍出唯遺失簪冠而已移時却見逐水波泛泛而出或言真人目秀者即示以病眸或誇真人無漏者即於州衙前登溷凡為變異人不可測者皆此類也在登州建三教玉華會至萊州起三教平等會凡立會必以三教名之者厥有㫖哉真人者蓋子思達磨之徒歟足見其冲虛明妙寂靜圓融不獨居一教也萊人從之者衆獨納劉處玄者號長生子有釣罷將歸又見鰲之什此四子者世所謂丘劉談馬也又於寧海塗中真人擲油傘於空傘乘風而起至查山王處一庵其傘始墜至擲處已二百餘里也其傘柄內有傘陽子號玉自髫齕間嘗過玄庭宫主空中警化今呼云玉陽子是也與寧海州署相對有卜隱郝生鬻肆真人倒坐於其間郝曰請真人回頭真人曰爾不回頭拂袖而去郝亦隨悟乃廣寧郝大通也馬公之妻孫不二者亦同入道早明心地世云孫仙姑者四哲之亞真人門人又有此三大士矣真人一日告衆曰時將至矣明日西行道友乞詩詞自旦至夜留詩曰登途上路不由吾雲霧相招本性蘇萬里清風常作伴一輪明月每為徒山青水緑程程送酒白粱黃旋旋沽今夜一杯如有意放開紅燭照冰壺筆尚未投從外有史公者來送酒一座大驚真人勸人誦般若心經道德清靜經及孝經云可以修證明日率馬公等四人徑入大梁於磁器王家旅邸中宿止時遇歲除與衆别曰我將歸矣衆乞留頌真人曰我於長安欒村吕道人庵壁上書矣枕左肱而逝衆皆號慟真人復起曰何哭乎於是呼馬公附耳密語使向關中化人入道至十年庚寅正月四日口授頌曰地肺重陽子呼名王害風來時長日月去後任西東作伴雲和水為鄰虛與空一靈真性在不與衆人同頌畢儼然而終是後馬公傳道四海大行伏遇世宗皇帝知真人道德高明二十八年戊申二月遣使訪其門人應命者丘與王也命丘主萬春節醮事職高功五月見於壽安宫長松島講論至道聖情大悅命居於官庵又命塑純陽重陽丹陽三師像於官庵正位丘纍進詩曲其辭備載磻溪集中八月懇辭還山至承安丁巳六月章宗再詔王處一至闕下特賜號體玄大師及賜修真觀一所十月召劉處玄至命待詔天長觀自重陽丹陽長春暨諸師皆有文集傳於世嗚呼真人起西州化行山東道滿於天下名聞天子開發後人使盡逍遙之遊豈不偉歟後真人五十六年嗣法孫汴京嘉祥觀提點真常子李志源中太一宫提點洞真子于善慶二大士真實道行弘揚祖道者也殷勤求記於玉陽子友人樗軒居士居士援筆為之銘曰咸陽之屬曰大魏村山川溫麗實生異人幼之發秀長而不群工乎談笑妙於斯文又善騎射健勇絶倫以文非時復意于武戡定禍亂志欲斯舉文武二進天不我與蓋公宿緣道氣為主慨然入道真仙自遇頃刻授之口訣祕語人呼害風真人承當或歌或舞以酒倘徉維摩非病接輿非狂肆口而發皆成文章燒却庵舍拂袖關中乞化而往全真道東寧海因緣萊陽通融亟顯神異東人畢從陶汰真實杜絶虛假煆鍊百端捶楚怒罵餘鄙解散四子傳化四子為誰丘劉談馬德其亞者王郝與孫共成七賢贊我真人玉陽長春大啓其門遭遇聖朝為王之賓真人高躅望若星雲瀛海渺然仙跡宛存此道大行逍遙乎真終南山重陽祖師仙跡記翰林修撰嘉議大夫同和制誥上輕車都尉彭城郡開國伯食邑七百户賜紫金魚袋劉祖謙撰孔老之教並行乎中國根源乎至道際六合無內外極萬物無洪纖真理常全無有缺餘固不可以淺識窺測或者剖强名之原指成器之跡互相排斥是此而非彼而二家之言遂爭長于天下是不知天下無二道聖人不兩心所以積行立功建一切法導迪人心使之遷善遠罪洋洋乎大同之域其於佐理帝王一也為老氏者曰吾寶慈儉又曰常善救物與夫孔聖本仁祖義之說若合符契今觀終南山重陽祖師始於業儒其卒成道凡接人初機必先使讀孝經道德經又教之以孝謹純一及其立說多引六經為證據其在文登寧海萊州嘗率其徒演法建會者凡五皆所以明正心誠意少私寡欲之理不主一相不居一教也師咸陽人姓王氏名哲字知明重陽其號母孕二十四月而生美鬚髯目長於口形質魁偉任氣而好俠少讀書係學籍又隸名武選當天眷之初以財雄鄉里歲且饑人多殍亡有盜盡劫其資以去一日適因物色得盜終不之問遠近以為長者正隆己卯間忽遇至人於甘河以師為可教密付口訣及飲以神水自是盡斷諸緣同塵萬有陽狂垢污人益叵測慮夫大音不入俚耳至言不契衆心故多為玩世辭語使人喜聞而易入其變異談詭千態萬狀不可窮詰嗚呼箕子狂九疇叙接輿狂鳳歌出權智倒橫直堅均於扶世立教良有以也師後於南時村掘地為隧封高數尺榜曰活死人墓又於四隅各植海棠一株曰吾將來使四海教風為一家耳居三年復自實之遂遷於劉蔣與和李二真人為友各結茅居之至大定丁亥夏復焚其居人爭赴救師婆娑舞於火邊且作歌以見意詰旦東邁徑達寧海首會馬鈺於怡老亭馬亦儒流中豪傑者初未易許師故懇師庵居固其扃鐍率數日不給食縱與食之亦未嘗見水火跡或時夜就馬語莫知其所由來及去追之不及扃鐍如故間與魂交夢警分梨賜栗之化不一馬於是始加敬信與其家人孫氏俱執弟子禮又得談處端劉處玄丘處機王處一郝大通等七人多類此號馬曰丹陽談曰長真劉曰長生丘曰長春王曰玉陽郝曰廣寧孫曰清靜散人並結為方外眷屬逮己丑季秋留王郝於崑嵛山携四子西歸抵汴寓王氏逆旅無幾何呼丹陽付密語無疾而逝春秋五十有八四子歸其柩葬於劉蔣故庵之側丹陽因廬於墓次今之祖庭是也師先自六年前於長安欒村庵壁留題云害風害風舊病發壽命不過五十八乃知仙齡有期非偶然也有詩詞千餘篇分為全真前後集傳于世玉峰老人胡光謙為之傳及丹陽嗣教從之者益衆其徒遂滿天下丹陽東歸長春因劉蔣故庵大加營葺玉陽又請額為靈虛觀凡住持者始受度為道士以奉香火世宗皇帝素欽其名嘗遣使訪焉戊申春長春玉陽應命至京師賜以冠巾絛服命居天長觀尋又徵至北宫長松島與語大悅詔於島西築官庵居之承安泰和間道陵亦屢召玉陽長生至闕下賜居修真觀以待召問玉陽得號體玄大師自丹陽而下所為歌詩各有集而郝廣寧獨邃於易備見于太古集中至正大初密國公璹讚云全真道東四子傳化四子謂誰丘劉談馬德其亞者王郝與孫共成七賢贊我真人玉陽長春大啓其門遭遇聖朝為王之賓瀛海渺然仙跡宛存細玩此讚其師資道業槩可見矣僕適承乏翰林與捉點嘉祥觀冲虛大師李志源及提點中太一宫冲虛大師于善慶無欲子李志常為方外友因索鄙文以紀重陽仙跡僕往年從事鄠亭密邇靈虛宿聞真風故就為之說使後之學者知師出處之蹟其功用及物若是之大得以考觀而推行焉若其出神入夢擲傘投冠其他騰凌滅沒之事皆其權智非師之本教學者期聞大道無溺於方技可矣是不得以固陋辭天興元年九月重陽日謹記丹陽真人馬公登真記邑子張子翼撰真人間世之異人也禀天仙之姿應期運之數明哲聰敏冲粹夷曠學窮六藝行包九德夫其器量弘深襟宇豁達邈乎人不可及已然棲遲衡門不苟祿仕常喜詩酒陶陶自樂而不屑世務一日重陽真人西來授以祕訣則頓然而悟視妻子如脫屣於是捐千金之産偕為水雲之遊遡洛入關結廬於太一之下修真功積真行服紙麻之服食糲糧之食隆冬祁寒露體跣足恬然不之顧惟一志于道且手不接人一錢積有年矣至於出口成章咳唾珠璣多至數千百篇無非發揮玄奧冥合於希夷之趣者布於四方人人傳誦其安心定性則清虛淡泊其接物導人則慈愛愷悌由是遠近趨風士大夫爭欽慕而師友之於斯時也踴金臺劉公顯武榮任京兆之運勾一見真人傾蓋如故自公退食揮塵清談歡然相得每期異日同為蓬閬之客居無幾何真人會有鄉關之行乃匆匆執别及抵山東凡在三州五會之衆傾赴雲集歡喜踴躍不啻如見慈父乃起黃籙爭虔懇延致以為濟度師焉癸卯冬閏赴萊陽之請乃館於遊仙觀之環庵席不及暖遽然即真越明年夏六月顯武公來宰斯邑下車之日獲聞真人於此登真也即躬詣靈殯流淚拜伏不勝哀悼徐謂道衆曰真人上升之際得無遺教乎當具告我翌日曹瑱劉真一乃奉上真人遺跡仍略之曰先師前冬臘月既望遽示歸真之意越七日癸未適遇重陽真人生朝方陳設供養才初鼓震雷忽奮聞重陽真人言曰子仙期已及不當淹久及中夜即枕左肱而化矣既而復神遊於酒監郭復中家留頌二十字且言在世無人識之意墨跡在焉又往劉錫之居復書一絶有風馬升仙之言洎吾邑黃籙感應之祥蓬萊真容出現之異其靈顯之事孔多蓋不可以縷指數公嗟嘆良久曰異哉真人行跡神妙如此近古希有苟不刻於翠琰傳之來世良為可惜汝等其奈之何答曰弟子不肖安能傳播師父功行之萬一大可罪也豫雖然竊聞古人有云布衣之士不附青雲烏能施名於後世哉今日幸遇我公豈非自有宿緣乎公曰我聞命乃召邑子張子翼謂曰丹陽師父仙去之跡吾將勒石以傳不朽聞子遊全真之門久矣子其為我記之子翼承命驚悸伏謝駑材不足以仰承重委願選諸能者公曰豫無牢讓子翼因不敢復辭乃伏思而言曰在昔西京曹參之來相齊也盡召諸耆老問所以安集百姓者然人人言異殊未知所定聞膠西蓋公善治黃老言乃使人厚幣請之既見為言治道貴清靜而民自定推此類具言之於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相今我顯武公之來令是邑也暫淹驥足聊用牛刀視事月餘闔境稱治向之冤抑無訴者得以伸其屈奸猾抵獻者無所肆其惡百姓歡然均賴其福加之清廉公正無一毫之私雖魯仲康之令中牟西門豹之治鄴縣不能過也且萊陽素為劇縣號稱難治今庭無留事居多暇日乃延請道衆若鐵查山玉陽子輩引居便坐講道論德探清靜無為之本窮修真養性之術庭館蕭然殊不覺有官況既散則復治事如初從旦達瞑略不知倦然夫公之高才絶能剸裁如流而清靜之道抑不為無助也由是觀之與夫曹參之禮蓋公何所異哉矧乎同僚皆一時之賢協心戮力贊成美政主簿夾谷昭信朱勾課最户無逋租仙尉蒲察武功綵棒威行盜奔他境遂使一邑之內皆攝然安生曾無所擾其道治化宣聲遠近靡不景仰其德政矣且夫公之為京兆運幕也與真人道契彌篤已見之於初及真人登真於萊陽也值公復宰斯邑與諸僚佐特命樹碑勒文垂示無窮以張大全真之教復成之於末竊觀初末遇合之因緣殆為大幸實非人力所能及也賤子不敏因托其相遇之實得非並記云大定二十五年歲次乙巳正月十五日己亥謹記全真第二代丹陽抱一無為真人馬宗師道行碑翰林直學士中順大夫陜西漢中道提刑按察副使王利用撰天地無為而全道至人悟道以全真廣大簡易不見其朕資生資始而弗能主名道全於內者其天地乎屈伸消長莫測其變德參化育而必臻其極真全於內者其至人乎丹陽馬宗師瑞金蓮於東海根玄教於重陽起跡於金源氏全盛之時流派於我大元開創之始與夫廣成鳴道於上古混元垂教於姬周冲虛南華立言於戰國之世者無以異也師諱從義字宜甫世業儒系出京兆扶風漢伏波將軍援之後五季兵亂東遷寧海因家焉祖覺字萃叟以孝行稱父師楊字希賢容儀可觀沉默有度事親為學綽有父風客或驚走以紬復擲於家者視之兼金也白於父藏之以待旬日客至即付之客謝曰吾吕仙也居幽谷村以淘採為業積金兩鎰將鬻於市逼於監稅者賴公獲免願中分以報希賢固却之吕曰公有黃向風義後當有高士出焉他日訪幽谷人無姓吕者始知其異人也師將育母唐氏夢麻姑賜丹一粒吞之覺而分瑞金天會元年癸卯五月二十日也昆季五人以仁義禮智信命之故號五常馬氏師次子也童時常誦乘雲駕鶴之語及長善文學不喜進取適李無夢鍊大丹於崑嵛山幾三載矣曰仙至則丹可成一日師遊其側無夢見而異之曰是子額有三山手垂過膝真大仙之才因為之贊曰身體堂堂面圓耳長眉修目俊準直口方相好具足頂有神光宜甫受記同步蓬莊既而丹果成忠顯孫君惜師才德以其子妻之凡三息曰庭珍庭瑞庭圭師嘗補試郡庠夜夢二衣褐者一素補兩肩跪且泣曰我輩十萬餘命在公所主言訖而去逐之入屠者劉清圈中壁有字云我輩己亥十萬人太半已經辛巳殺此門若是不慈悲世世軸頭常厮抹既覺聞屠猪聲往視之則清之子阿澤屠二猪其一肩白欲止則弗及也始悟己亥猪也辛巳清之歲屬也詣術士孫子元占之以决其惑因稽壽幾何曰君壽不踰四十九師嘆曰死生固不在人曷若親有道為長生計已而與客奕棋乃失聲曰此一著下得是不死矣大定七年丁亥秋七月師偕高巨才戰法師飲于范明叔之怡老亭酒酣賦詩曰抱元守一是工夫懶漢如今一也無終日銜杯暢神思醉中却有那人扶中元後復會重陽祖師造其席戰師曰布袍竹笠冒暑而來何勤如焉曰宿緣仙契徑來訪謁與之瓜即從蒂食詢其故曰甘向苦中來復曰奚自曰終南不遠三千里特來扶醉人師心自謂曰前所作有醉中人扶之語此公何以得之就叩何名曰道曰五行不到處父母未生時席間談道多與師合乃邀居私第出示所述羅漢頌一十六首祖師賡和宛若宿成遂心服而師事之先是師夢南園地中一鶴湧出今兹欲為祖師結庵祖師即指鶴出之地師大異之庵既構字之曰全真師欲從祖師西遊以纍重難之祖師乃盛陳離鄉遠遊之樂以開釋焉是歲十月朔祖師令師鎖庵齊居百日日止一餐雖隆冬祁寒唯筆硯几席布衣草屨而已形神和暢若寒谷回春者焉八年春正月十有一日庵始啓鑰祖師謂師曰將謂汝三數日從我西遊直鎖害風百日仍作一場奇怪師悟以資産付庭珍輩以離書付孫氏遂易服而道焉祖師因師夢中歌有燒得白鍊得黃便是長生不死方之句命師更名鈺字玄寶號丹陽子師又夢從祖師入山及旦祖師呼曰山侗因為小字焉居崑嵛之煙霞洞師忽患頭痛殆若無所遁者祖師令醫於家一日謂門弟子曰昨日馬公飮酒其破道乎使候之師蓋藥用酒引不覺過量疾甚人復曰馬公將死矣祖師拊掌嘆曰吾遠尋知友緣信道不篤而至此耶乃以鍊心語療之曰凡人入道必戒酒色財氣攀緣愛念憂愁思慮此外更無良藥矣疾遂愈其年十月朔令師焚誓狀于文登蘇氏庵師從祖師至汴寓王氏之旅邸飲食起居悉以仙機示之煆鍊既久遂承祕印十年春正月四日祖師將升師請曰鈺當為吾師服祖師曰可赴終南劉蔣之故居囑以後事而逝師暨談劉丘三道友入關謁和李二真人詣劉蔣祖庵居之十二年春化自然錢於長安市中復護仙柩自汴之秦歸葬劉蔣遵遺命也師居廬頭分三髻三髻者三吉字祖師之諱也十四年秋夕師與三道友言志於秦渡鎮真武廟師曰鬥貧談曰鬥是劉曰鬥志丘曰鬥間翌日乃别師復歸劉蔣構一廣庭為環居之所手書祖庭心死以表其顔庵為祖庭自此始也師謂門人曰一晝夜凡幾時對曰十二曰十二時中天運造化曾少停息否對曰無師曰學道者亦如是矣十八年就化華亭劉昭信李大乘不果乃賦詩曰錦麟不得空潦漉收拾綸竿歸去來大乘即悟遂執弟子禮賜以靈陽子之號十九年春二月師築環華亭大乘亦與焉墻外來禽一株枯已久矣四月十四日移植環內以水沃之曰今日純陽降世辰也豫生於五月二十日至日此樹生葉矣仍作頌曰天上三十六地下三十六天地入寶瓶七十二候足大乘請釋其㫖曰此隱語也其應有日矣及期緑葉敷榮始知移植之日至五月二十相去三十有六是天地晝夜合為七十二候也大乘因作異木記以志之秋八月遷居隴州佑德觀解元李子和輩願執几杖以從繼而棄俗歸道者不啻百餘人二十年春東還祖庭適長安居蓬萊庵從善友趙恩請也秋八月旱師祈雨詩云一犂沾足待何時五五不過二十五至日果雨二十一年冬師謂門人來靈玉曰世所稱衣服舊弊重修潔者何名曰拆洗師曰東方教法年深弊壞吾當往拆洗之未浹旬官中有牒發事遂以關中教事付丘長春為主張焉仙仗東歸過濟南有韓淘清甫者慕康節之為人所居號安樂園禮師乞垂開發師曰夫道以無心為體忘言為用柔弱為本清淨為基節飲食絶思慮靜坐以調息安寢以養氣心不馳則性定形不勞則精全神不擾則丹結然後滅情於虛寧神於極不出户庭而妙道得矣淘謝曰大道鴻濛無所扣詰今聞至言得其門而入矣師嘗說四體用云行則措足於坦途住則凝神於太虛坐則勻鼻端之息卧則抱臍下之珠類此甚多蓋言道人分內事也二十二年夏四月至寧海未几行化于文登之七寶庵門人穿井九尺而大石障之師乃云穿鑿須加二尺深甘泉自有應清吟及疏鑿尺有八寸泉乃湧出冬十二月晦師謂門弟子曰今日有非常之喜遂乃歌舞自娛二十三年春正月報者云仙姑孫不二返真于洛陽矣冬十月下元日文登令尼厖古武節請師作九幽醮師謂姚鉉來靈玉曰空中報祖師至青巾白袍坐白龜於碧蓮葉上龜曳其尾見於雲表道俗歡呼焚香致拜居無何回首側卧東南而去十二月師赴萊陽遊仙觀忽肆筆書委形贊其略云大哉登真路入青冥麟隨絳節鳳撁朱軿鳴鑾佩玉履虛步雲超受真誥上登玉辰特寓其歸真之意耳是月二十二日祖師誕辰師仰瞻天表曹瑱問其故曰祖師偕和師叔至當赴仙會矣于知一曰教門洪大胡不愸遺師曰堂堂歸去也作箇快活仙謂劉真一曰汝等欲作神仙須要積功纍行縱遇千魔百難愼勿退惰果爾然後知吾言不妄矣又曰我開眼也見瞑目也見元來不在眼但心中了然無所不見耳汝緣在北方可往矣時將二鼓師東首枕肱而蛻是夜於劉錫屋壁間留一頌云三陽會裏行功圓風馬乘風已作仙勸汝降伏龍與虎自然有分亦登天俄頃人云師已仙矣方悟留題蓋師之神也初崑嵛紫金山東華庵有松數株變青為白師曰松之白殆為我乎不半載師果逝焉長生玉陽二宗師來蒞喪事七日而卜兆於遊仙觀而安厝之二十五年邑人疑仙骨陜右門人盜去萊陽宰武節劉公啓柩視之貌如生乃更衣於金玉堂復葬之師幼習儒長克家有不資之産而樂周急故得輕財好施名禮所謂積而能散者此也雖為碩士接一童子必致敬焉老氏所謂不敢為天下先者此也承師訓以闡化援門人以歸真雖寓形於寰海以濟衆為己任語所謂人能弘道者此也一遇至人得傳心法日經煆鍊而不弛其志孟軻氏所謂欒取於人以為善者此也以致感海市之瑞像變苦泉為靈液劉清毁屠具而改行欒周焚漁網以向風所過者化狂恣革其非心所存者神耆稚為之雲集果行西秦飛舄東海凡五道場弘師教也故曹瑱雷大通劉真一于洞庭等數十人實修真達道扶宗翊教之士悉出師陶鑄之手談長真劉長生丘長春皆祖師之高弟尊師曰叔師處之裕如也生平所作歌詩皆出塵絶俗之語而沾丐後人者亦多矣至元六年春正月璽書加贈丹陽抱一無為真人之號十九年秋八月朔住持終南山重陽萬壽宫真人李天樂持師道行之狀致懇於僕曰吾嫡祖丹陽宗師葬于萊陽進士張子翼作登真記已識之矣而祖師成己成物盛德大業師能纘承之乘風御氣長生久視之道師能揄揚之祖庭會真實本諸此不以貞珉載其道行以詔後人殆為闕如子無靳其文庶傳其不朽也僕惟道德之源繼續承承不迷於後世者丹陽師之力也牢辭其可乎乃繫之以銘其辭曰乾坤大道法自然至人一出千百年道非人弘道不傳人能弘道道始全重陽飽飲甘河泉道眼直視東海壖金焰爍爍開七蓮慨然捉馬揮玉鞭丹陽鴻儒宿有緣行功煆鍊方且圓涣然冰釋歸真仙詞源落紙如雲煙機發於踵崑丘巔降龍伏虎祕法玄知知覺覺無後先道場五闡教乃宣秉風御氣遊八埏下視塵世猶天淵若子若孫稱大賢胸中冰雪壺中天傳心嗣法無窮邊長真子談真人仙跡碑銘開府儀同三司上柱國密國公金源璹撰昔人有言仙語無詞心傳道見神丹之訣洞簫之音流注於玄虛渺漠之間其得之者又不知幾何人哉隱之則紅霞丹景出之則琳宫金簡如斯人輩似有為之士也士至於無為無不為携壺曳履落魄于逆旅酒家之間吟嘯忘懷與風月為莫逆此亦近乎大隱者矣德不孤必有鄰道不我須及人黃秦朝張東坡門下之四賢也詩文雄深筆力雅健故能弘先生之教馬談丘劉重陽門下之四仙也道用冲虛處心清寂故能明祖師之道教何以弘道何以明其實皆一心也其虛心明道者誰長真子談公真人也師諱處端字通正山東寧海州人其父即鏐鐐之工於權衡出納之間無非平實輟己生資以濟貧窘積善纍行備餘慶而生先生公幼而秀發聲韻琅然人知其非常兒也甫及六歲因戲墮於井中人急下井救之見公安坐水上隨挈而出略無傷焉又所居遺火巨棟碎於榻前公方寢熟呼而起之神情自若蓋有道之士非水火所能殞越也至十有五齡而志於學詠物警策其葡萄篇已膾炙人口及弱冠乃尊以玉名之遂涉獵詩書工諸草隸一朝因醉遇雪卧於途中即感風痺之疾公喟然嘆曰玉平昔為行於世略無鮮益中復遇奇疾必非藥石可療之惟暗誦北斗經以求濟忽夢大席橫空公飛升欲據之見北斗星君冠服而坐公叩首作禮間恍然而覺自兹奉道之必篤矣至大定丁亥歲仲秋聞重陽真人度馬宜甫為門生公徑赴真人所祈請棄俗服羽執弟子禮真人付之以頌便宿於庵中時嚴冬飛雪丹竈灰冷藉海藻而寐寒可墮指真人遂展足令抱之少頃汗流被體如置身炊甑中拂曉真人以盥洗餘水使公滌面從滌之月餘宿疾頓愈於是公推心敬而事之其妻嚴氏詣庵呼歸公怒而黜之公拜禱真人求道之日用真人以四字祕訣授之遂立今之名字焉又道號長真子師命公赴維陽與馬丘劉同處真人步虛詞中有達真談玉之語味之豈小許哉真人至汴遺訓命四子主掌教門及重陽仙遊公與三大士負師遺蛻徑歸關中瘞之于劉蔣村祖庵之西隅供祭盡師資之禮頃有請長真齊者公不避嚴凝涉溪而往水介於鳧舄之間足無所苦人咸異之後寓跡於河朔獲䴥縣府君廟之新庵一日先生鎖庵而出云往衛州至夕廟官溫生者見庵中光輝照映即窗隙而窺之見先生逼火而坐溫驚疑潛退未曉默遣人趨州託乞藥於師其人至衛見先生於卧內尚未起授藥而還復視庵中燃火猶未畢燼與薊子訓歷諸家之說異世而同科爾先生行業頗多不能遍舉姑略而論數事于後忍折齒之憤德也施夢中之藥神也知巨僚之見訪明也書龜蛇以辟火靈也為人德能通神明可濟靈非仙而何歟又聞先生不擇貴賤賢鄙不異山林城市俱以道化無非晏然作歌詩百餘篇目之曰水雲集宿慕洛陽天中之土人多道心有意作丹成之所因見洛南之朝元宫昔朗然子之故居也愛其山水明秀遺跡尚存有道士張永壽者時主觀事即以宫之東隙地數畝遺之先生誅茅拾礫而庵焉有洛人朱氏者奉道構庵請公居之先生於朱庵中神遊間似與重陽丹陽遇報以仙期旋復返朝元之故居即今之棲霞觀也觀在後長春丘公真人立名至大定乙巳歲孟夏朔日無疾留頌而逝異香凝室者數日世壽六十三昔嘗畫龜蛇者蓋巳年已月巳時歸真之預知也其門人王道明董尚志自童稚禮先生盡負汲香火之勤先生馭鸞之後數十年居仙瑩之側王生主棲霞觀事與董生始終醮祭無惰擬行改葬因李公都運先生暨四大道師李公志源于公善慶王公志淵陳公無染以碑銘見囑於老夫敬喜而筆之銘曰重陽真人大道之師長真先生攝衣從之以心傳心神鬼不知我知至人生於聖時人貴其異我敬其實東齊發揮西洛留跡語見歌詩名傳金石霞舉玄風雲開丹液野鶴昂藏靈龜寶章伏火制水順陰調陽分形入夢道術彌彰先生未亡千載馨香甘水仙源録卷之一
