front:
  text: 甘水仙源録卷之三息三
  hash: sha256:c901f7171348b9d0b23cb6fcae0282d6f2cb5eb29b2d54721be9167b697591ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_HFL_003-001a, image: hfl/0611/0611-120.png}
body:
  text: 夷門天樂道人李道謙集清和妙道廣化真人尹宗師碑銘并序汝陽弋彀撰宗師全真嗣教六世祖也自守真緒風化鼎盛什百於疇昔形器之域古今同盡春秋八十有三遽有拂衣啓手之嘆以辛亥二月六日升于大房山清和宫之正寢寧神五華山者幾十稔矣嗣教誠明張公一日語衆曰清和師思報祖師之恩遂大葬之禮仍即其福地並建宫宇勝槩甲天下弘闡祖道功越古今吾儕享其成業今無一報顔實腆矣將刻碑紀實以詔無窮若何僉曰唯遂以中統三年十月吉日徵文於汝陽弋彀僕以師真道德高厚奧妙無方詎以荒疏淺淺者所能窺測形容哉固辭不可謹按門人馬志通所紀行狀仍托其功德之著見於耳目者序述之夫道之在天下一而已惟天之所以畀付於聖賢者無不備其所以濟斯世而見於功用者或久近廣狹之不齊何哉曰時也時非聖賢所能必能不滯其時而已或拱揖廊廟或私淑側陋或清靜而化揖讓而治或平水土降播種或放伐以救焚溺或寬默以革苛僞文勝質喪則示還純反朴之訓禮壤樂崩則正三綱五常之教大則天下後世小則一郡一邑隨機應變與物推移要不過乎徇道以濟斯世耳由跡以觀之功用之不齊者所遇之時異也則天之以是道而畀付於聖賢者曷嘗有二哉道猶水也渴則為酌飮旱則為灌溉道猶火也飢則為烹飪寒則為煦嫗用雖不同而水火曷嘗有二哉頃以金録訖運喪亂並興黔黎殄於葅醢玉石燼於烈火天意開顧挺生至人全畀斯道以假援之之手於是重陽而後丹陽長真長生長春繼出而全真之教興及清和接長春之統授受之際纍聖之妙無餘藴父作子述闡化數十年徒侣遍天下聞望重朝野風之所靡狠戾易心强梗順命革煩苛為清靜化湯火為衽席挈一世鄙夭之民躋之仁壽之域自古教法之盛功德之隆惟清和師為最蓋天之畀付之道一而所遇之時異也師諱志平字大和姓尹氏遠祖居滄州前宋時有官萊州者因家焉顯高祖妣有子九人俱登進士第仕至郡守者七人顯大父公直顯考弘誼皆隱德不耀師於大定九年正月二十日生是夕其母方寐見儀衛異常皆盛服而入神思愕然驚寤師已誕矣時里人相驚曰尹氏宅火奔救之至則無火稍長舉止異凡兒三歲穎悟善記事五歲入學日誦千餘言讀書即玄解嘗因祀事究生死理杳然遐想自忘七歲遇陜西王大師有從遊意十四歲遇丹陽真人遽欲棄家入道其父難之潜往十九歲復迫令還家錮之竟逃出再三始從之住昌邑縣之西庵常獨坐樹下達旦或一夕見長生劉真人飄然而來斷其首剖其心復置之覺而大有所悟後住庵福山縣養疾惠困勤瘁者纍年衆德之遊濰州時龍虎完顔氏素豪倨慕師道德施囿地創觀曰玉清率家人尊事之今觀廢於兵而松檜鬱為茂林後覲長春真人於棲霞觀執弟子禮真人特器異之付授無所隱又受易於太古郝真人受口訣於玉陽王真人自是道業日隆聲價大振四方學者翕然宗之己卯歲太祖皇帝遣便宜劉仲祿徵長春真人仲祿及益都真常李公曰長春今在海上非先見尹公必不能成此盛事及濰陽謁師於玉清之丈室見其神采嚴重不覺畏敬自失從容語及詔㫖師大喜曰將以斯道覺斯民今其時矣遂偕往覲長春真人於萊州昊天觀先是金宋聘命交至皆不應至是師勸行决計北上時從者十八人皆德望素重者師為之冠辛巳及癸未備嘗難阻既見帝於西印度奏對稱㫖還及雲中真人聞山東亂國兵又南下曰彼方生靈命懸砧鼎非汝莫能救遂遣往招慰聞者樂附所全活甚多乙酉歲勑令長春真人住太極宫即今長春宫也師在席下四方尊禮者雲合師曰我無功德敢與享此供奉乎遂辭退住德興之龍陽觀屢承真人手劄示以託重意及真人升師方隱煙霞觀又欲絶跡遠遁為衆以主教事敦請勉從之還長春宫以嗣事自任自是徒衆輻凑輦贐樂貢者日充塞庭宇忽謂衆曰吾素猒冗劇喜山林遂因平欒請主醮事而出遁景州之東山未幾燕之僚士固請還宫壬辰帝南征還師迎見於順天慰問甚厚仍令皇后代祀香於長春宫貺賫優渥甲午春遊母閭山太玄觀之李虛玄語人曰去年院中青氣氤氲者纍日占者以為當有異人至今師來既驗矣踰春南歸及玉田衆喜為數日留日已晡遽促駕兼夜行五十餘里舍豐草中衆莫知所以後還宫始知在玉田時有寇數百欲劫掠追至大合甸不及而反從者相賀曰非師奈我輩何時皇后遣使勞問賜道經一藏乙未春詣沁州主黃籙醮事入郊城境居人或夢縣之地祇曰真人來當警衛無虞及平遙理醮事時旱久且風醮之三晝夜燈燭恬然在他境猶風沁帥杜德康平遙帥梁瑜各施宫觀一方傾心焉九月達平陽分命披雲宋公率衆鏤道藏經板不數載而完所費不資而人樂成之亦師為之張本師以此道化大行歸功祖師重陽真人遂留意祖庭時京兆行省田公馳疏來請適與師意合丙申春始達於榛莽中規度兆域及宫觀基址終南太華等處諸觀宇廢不能復咸請主於師時陜右甫定遺民猶有保栅未下者聞師至相先歸附師為撫慰皆按堵如故繼而被命於雲中令師選天下戒行精嚴之士為國祈福化人作善時平遙之興國觀崞之神清前高之玉虛白雲洞定襄之重陽沁之神霄平陽之玄都皆主於師秋帝命中書楊公召還燕道經太行山間群盜羅拜受教悉為良民出井陘歷趙魏齊魯請命者皆謝遣原野道路設香花望塵迎拜者日千萬計貢物山積略不顧戊戌春忽曰吾老矣久厭勞事以正月上日傳衣鉢於真常李公俾主教事乃卜築五華山並增葺大房山之真陽觀更日清和宫以為菟裘焉終南祖庭葬具已備庚子冬請師董其成欣然而往雖冒寒跋險不憚也常曰吾以報師恩耳時季冬京兆一境旱衆禱曰師來和氣必應下車而雪大蕆葬禮以明年正月二十五日既事時陜右雖甫定猶為邊鄙重地經理及會葬者四方道俗雲集常數萬人物議恟恟不安賴師道德素重鎮伏邪氣故得完其功初重陽真人修道於此既成火其庵而東貽詩有後人復修意至是師賡之亦有繼祖來修之語噫百年事終始吻合豈偶然哉於是剪蕪平丘土木並作堂廡殿閣粲然一新既成額以重陽以示報本意若華山之雲臺驪山之華清太平宗聖等宫悉擇名重耆宿以主之興完皆踰舊是年還燕夏五月過太原時自春不雨禾種不入師憐之出己帑物為香火費為民祈禱雨大霈及還燕無幾何謂侍者曰我常便清和宫之西堂故居之今為我灑掃方丈從之翌日長往及宫洮頮禮聖畢訣衆曰吾將逝矣衆驚愕師曰吾意已决夫復何言有進紙筆者默不應惟戒葬事勿豐遂不食但飲水啜茶危坐談道語音雄暢異常是夜久正衣冠曲肱而逝衆毁哭過哀時馨香之氣滿室遠近聞者奔走賻賵哀戚若喪考妣初師遺言葬大房至是僚士固請遂葬五華徇輿意也中統改元二年詔贈清和妙道廣化真人師平日著述甚多門人板之目曰葆光集并語録皆通貫經藝洞見道體所謂博學而約說者當時朝㫖褒崇及宏儒名卿詩文讚美裒為一集目曰應緣録其覺後進則高下不遺蹊徑坦明以謙遜勤約為治心之要以踐履功行為入道之基及其縱說則時亦露機緘之妙所謂窮理盡性以至命者也得其門者由堂及奧其次不失為誠謹之士其成就於人者如此初居濰陽龍虎家餘二十年姬侍日滿前終莫一識其面嘗失善馬獲其盜物色既驗盜畏罪不承曰此我馬也師即還馬縱去其高潔不纍於物如此至大至剛之氣充諸內形諸外望之如神即之如春不怒而威匪爵而尊雖萬乘不足加其重雖窮處不足為之輕其平日之所養者如此及遭時得君權道濟物祥風時雨覆及遠方跂行喙息罔不得其所其見於功用者如此其至誠前知感通神明則又時出人意表以天挺之姿承積纍之基譬猶日中之陽月盈之光不期盛而自盛尚且謙抑自居淡泊自樂化應乎無窮之緣神寂乎寥廓之鄉體用兼備無過不及之弊其諸異乎同源而異流者歟抑世有以綱常為言者是又大不然自四海橫潰華禮蕩滅污俗所染又豈特於借鋤德色取帚誶語八佾舞庭召王所狩者乎及風化所過暴者仁奪者讓泰者抑上下怗然此於綱常之助其功豈易量哉僕悼夫昧大體而妄自分裂者故并及之銘曰叔世運厄坤軸旋皇綱解紐兵方連鼎中生靈若小鮮磨牙萬喙垂飢涎天生至人蓋汝憐神道設教畀己專重陽發源亦有傳得自無始先天先世間果有甘河泉萬劫老派常涓涓流入濰陽玉清前灌溉六葉開金蓮混沌雖鑿大道全積靄掃盡孤月圓至理渾融無正偏溙園鄭圃非獨賢遭時得君明機權鑑光亦豈從媸妍冥鴻高舉蓬海邊閶闔萬里來翩翩鰲頭可釣虎可編萬蚪誰信容笞鞭頽波力障回九川塗炭氣化成几筵惠雨一灑劫火燃大地墾作種玉田精衛投石海空填螟蛉遇祝速變遷風雲千載非偶然轉禍為福皆夤緣歸來演教談妙玄英華咀嚼九九篇琅函萬軸成蹄筌始信天上無癡仙洙泗豈特徒三千燈分大小俱燀燀有心不敢自聖癲有口難說無礙禪人云功行遍八埏波浪幻跡從沺沺草樓菟裘茅一椽茹芝大房腹便便直鈎坐釣三峰巔寶地花木肥芊芊青山不礙行雲煙死而不亡壽更延他山有琰實可鐫光騰億劫無歲年千溪萬壑分嬋娟明月依舊懸青天玄門掌教大宗師真常真人道行碑銘翰林學士承㫖資善大夫知制誥兼修國史王鶚撰道教之曰全真以重陽真人為祖師其自甘河仙遇劉蔣焚庵行化關東前後僅十年而天下翕然宗之非信道篤而自知明安能特立章章如是卒之搜奇訪逸得高第四人曰丹陽曰長真曰長生曰長春四人者俱能整玄綱弘聖教使運數起而道德新韙矣哉至於禮聘兩國聲馳四方生能無欲殁能不壞惟長春師為然師救物以仁度人以慈淡然無極而衆美從之故遊其門者率聰明特達之士然傳法嗣教止於尹清和李真常二公而已清和公早慕真風遍趨法席濰陽化度沙漠侍行為長春門弟子之冠其踵師掌教謙抑不居竟脫煩勞優遊以壽終若夫以清靜養真以仁恕接物華實相副文質兼全名重望崇使遠近道俗趨拜堂下惟恐其後則吾真常公有之矣公諱志常字浩然其先洺州永年人宋季避地濮之范陽尋又徙開之觀城因著籍焉高祖皓曾祖昌祖明父蔓皆隱德不耀素為鄉里所重明昌癸丑春正月十有九日母聶氏夜夢異服一人授以玉兒覺而生公二歲喪父六歲喪母養於伯父濟川家濟川諱蒙名舉子也賦義兩科屢占上遊雖以四舉終場同進士出身歉如也見公穎悟不群嶄然出頭角意欲作成以償平昔之願而公不喜文飭雅好恬淡常默禱高穹望早逢異師勝友式副夙心年十有九伯將議婚公聞之嘆曰本期學道未涉津涯若愛欲纏縛則古人高蹈出塵之事業難乎有成矣同舍兄張本敏之初以嗣續規公既知牢不可奪乃各言所志而訣居無幾負書曳杖作雲水之遊初隱東萊之牢山復徙天柱山之仙人宫宫之主者曰湯陰李仙見公儀觀魁偉音吐不凡大加賞異逮公辭告之曰君玄門大器也山庵荒僻非久淹之地音祖師所至異人並出今獨長春在焉宜往從之他時成就未可量也公翌日遂行至即墨之東山屬貞祐喪亂土寇蜂起山有窟室可容數百人寇至則避其中衆以公後拒而不納俄為寇所獲問窟所在捶楚慘毒絶而復蘇竟不以告寇退窟入者出環泣而謝之曰吾儕小人數百口之命懸於公一言而公能忘不納之怨以死救之其過常情遠甚爭為給養至於康調迄今父老猶能道之歲戊寅夏六月聞長春師自登居萊公促裝往拜席下師一見器許待之異常山東路轉運使田琢器之高其行且聞音在即墨主帥黃摑副統咨公籌畫保完一城以書邀至益都待以賓禮已卯冬十有二月我朝遣便宜劉相仲祿齎詔備禮起長春師于東萊時益都副帥張林自金歸宋叛服靡常公懼其為阻滯乃往說林俾移檄所經衛送以行庚辰春正月師始命駕從行者十有八人公其一也二月達燕明年春二月北上秋七月至阿不罕山距漢地幾萬里並山漢人千家逆師羅拜以為希世之遇咸請立觀擇人主之師將行指公坐上語衆曰此子通明中正學問該洽今為汝等留此其善待之因賜公真常子號額名其觀曰棲霞師既西邁公率衆興作刻日落成又立長春玉華二會至今不輟癸未夏五月師至自行在憩于其觀一日齊客四集師手持一弓弦不言以授公公亦不言而受圈而佩之仍作詩為謝師但笑領而已蓋阿不罕之留弓弦之授識者知其有付屬之意秋七月從師還至下水時殘暑尚熾師因納凉官舍之門樓字呼公而教之曰真師不易遇得道者不易逢逢之而不易識也守道之篤人貌而天行直寓六骸而淵宗忘飢渴而常寧至靜而遺形獨遊乎無極之妙庭此語汝當記之以俟他日自得之耳公拜而謝自承教之後益自奮勵息機體真敬事循理歷死生憂患之際曾不易其所守師住燕京之日凡教門公事必與聞之丁亥秋七月師既仙去清和嗣教以公為都道録兼領長春宫事己丑秋七月見上於乾樓輦時方詔通經之士教太子公進易詩書道德孝經且具陳大義上嘉之冬十一月得㫖方還庚寅冬有誣告處順堂繪事有不應者清和即日被執衆皆駭散公獨請代之曰清和宗師也職在傳道教門一切我悉主之罪則在我他人無及焉使者高其節特免杻械鎖之入獄夜半鎖忽自開公以語獄吏吏復鎖之而復自開平旦吏以白有司適以來使會食所食肉骨上隱然見師像其訟遂息癸巳夏六月承詔即燕京教蒙古貴官之子十有八人公薦寂照大師馮志亨佐其事日就月將而才藝有可稱者乙未秋七月奉詔築道院於和林委公選高道乘傳以來雖清和掌教而朝觀往來必以公故公為朝廷所知而數數得㫖璽書所稱曰仙孔八合識八合識譯語師也戊戌春正月清和會四方耆舊手自為書付公俾嗣教公度不能辭乃受之三月大行臺斷事官忽土虎奉朝命復加玄門正派嗣法演教真常真人號夏四月赴闕以教門事條奏首及終南山靈虛觀係重陽祖師鍊真開化之地得㫖賜重陽宫號命大為營建甲辰春正月朝命令公於長春宫作普天大醮三千六百分位及選行業精嚴之士普賜戒籙逮戊申春二月既望醮始告成凡七晝夜祥應不可殫紀歲辛亥先帝即位之始年也欲遵祀典遍祭嶽瀆冬十月遣中使詔公至闕下上端拱御榻親緘信香冥心注想默禱於祀所者久之金盒錦幡皆手授公選近侍哈力丹為輔行仍賜內府白金五千兩以充其費陛辭之日錫公金符及倚付璽書令掌教如故公至祭所設金籙醮三晝夜承制賜登壇道衆紫衣暨所屬官吏預醮者賞賫有差詢問窮乏量加賑恤自恆而岱岱而衡衡隸宋境公嘗奏可於天壇望祀焉既又合祭四瀆於濟源終之至於嵩至於華皆如恆岱之禮祀所多有徵應鴻儒巨筆碑以紀之壬子春正月命駕終南祖庭恭行祀禮規度營造凡山下道院皆為一例以是地係教門根本故也逮四月既望東歸癸丑春正月奉上命作金籙大齊給散隨路道士女冠普度戒牒以公為印押大宗師甲寅春上又遣使作普天大醮分位日期如戊申而益以附薦海內亡魂勑公為大濟度師出黃金五百兩白金五千兩凡龍璧環紐鎮信之物及沉檀龍麝諸香並從官給自發牒至滿散鸞鶴五雲現於空際者無虛日公復念燕境罪徒久幽狴犴不以湔洗則無由自新言之有司蒙開釋者甚衆冬十有二月有㫖召公乙卯秋七月見上於行宫適西域進方物時太子諸王就宴勑公預焉舍館既定數召見咨以治國保民之術十有二月朔旦上謂公曰朕欲天下百姓安生樂業然與我同此心者未見其人何如公奏曰自古聖君有愛民之心則才德之士必應誠而至因歷舉勳賢並用可成國泰民安之效上嘉納之命書諸册自午未間入承顧問及燈乃退丙辰春正月以老辭夏四月至自北庭五月至晦總真閣之北簷無故摧壞六月庚申朔公倦於接應謝絶賓客隱几不言戊寅正襟危坐語左右曰昨夜境界異常吾自知卦數已盡歸其時矣主管教門向已奏聞令誠明張志敬受代餘無可議者翌日悉以符印法衣付之乃留頌順正而化春秋六十有四平昔著述多為人所持去有又玄集二十卷西遊記二卷行於世公以儒家者流决意學道事師謹與人忠茹葷飲酒之戒涓毫不犯主宫門二十年凡所營繕皆公指授翬飛櫛比雄冠一時四方信施歲入良多悉付之常住一無私積羽化之日衣衾杖屨而已性質直不能曲意順情故謗訟屢興隨即自解公一不校復以誠信待之方其與同舍張君敏之之訣也各言其志敏之卒中詞賦高第而公竟掌道教長春别幾二紀敏之以使北見留隱為黃冠公兄事如昔并其屬給養之時河南新附士大夫之流寓於燕者往往竄名道籍公委曲招延飯于齊堂日數十人或者猒其煩公不恤也其待士之誠類如此長春道侣不下數百獨能識誠明於齠稚教育成就卒付重任其知人之明又如此故能歷事三朝荐承恩顧雲軿所至傾動南北香火送迎絡繹不絶及聞訃音近者素服長號若喪考妣遠者出迓仙靈為位以哭可謂其生也榮其死也哀矣庚申夏四月今上嗣登寶位中統辛酉秋八月詔贈真常上德宣教真人號明年夏五月既望豫方逃暑不出誠明子携諸執事踵門來見曰先師嗣法有功玄教今猒世幾七年不有以追述其美則門弟子輩俯仰慚怍殆無了期惟先生與師鄰鄉縣熟其為人敢以斯文請豫辭之力不踰月凡三見臨具狀其師之道行及持虛舟道人李鼎之和所為傳併以見示豫觀其行實平美略無織芥譎怪之事乃以豫平昔之所見聞併為次第其先後而銘之銘曰道之為教基於老氏不肆不耀知足知止性而身之全真則是質而文之真常乃爾粵惟真常系出仙李重陽裔孫長春嫡子笑授弓弦傳法微㫖留建棲霞嗣教伊始言必成章動必循理誠以待士廉以律己萬口推尊三朝付倚善始令終榮生哀死蒼蒼五華涓涓一水窈兮窀穸閟我冠履付畀得人追書遺美有狀斯述有傳斯紀仙靈雖升仙聞不已我銘以辭無愧焉耳終南山重陽萬壽宫洞真于真人道行碑宣授河南路轉運使兼廉訪楊奂撰盈尺之璧徑寸之珠天下皆知其為寶也不以藴於山淵而不聞況於人乎東魯宣父炳辟世辟地之訓歷代史臣列隱逸逸民之傳宜乎綿亘千數百載而不廢也僕儒家者流竊有志於史學謹按洞真之行實斯亦古之所謂宗師者歟故碑之無疑師諱善慶字伯祥寧海人高門于公之後祖彥升主好時縣簿考道濟韜光不仕師幼不茹葷長通經史大義雅嗜道德性命之學與馬丹陽同里開大定二十二年丹陽演法於金蓮道場耋稚雲集而師預焉時甫十七矣丹陽見而奇之且嘆曰向畏重陽譴訶頗萌倦弛然得以終其業者彥升力也使是兒入道殆天報乎其家聽執几杖以從再年冬丹陽返真徑造隴州龍門山謁丘長春長春俾參長真於洛陽得鍊心法丐食同華間明昌初長春歸海上囑曰汝緣在汧隴無他往夫人需友以成不可不擇復入秦卜吳嶽東南峰鑿石以處日止一餐凡可以資於道者造次不暫舍絶跡人間七八年迄今目其龕曰于真人洞友蒲察道淵待之如師後創觀汧陽之石門承安中好事者請玉清額禮體玄大師尋佩受法籙以輔道救物遠近益加崇敬泰和三年隴之州將保賜冲虛大師號五年再謁長春啓證心印退隱相州天平山六年長春介畢知常緘示密語督還汧隴仍易名志道師再三敬諾參長生久之道價隆重輝照一時雖黃髮故老自以為不逮也常謂學仙者存乎積纍赴人之急當如己之急八年南征凱還憫其俘纍必盡力購援而後已元光二年隴山亂中太一宫李冲虛聞之舉以自代不起正大改元上悼西軍戰殁遣禮部尚書趙公秉文祭於平凉充濟度師秉文高其節圖像薦諸朝召之又不起二年饑荒或言路直秦岐之咽過客無别歲計奈何師曰吾門一見其難而遽如許不廣甚矣言者悚愧未幾秋大熟遷五姓洞真觀環居弗出逼中使絡繹不絶起而應之遂領中太一宫事七年河南不雨召近侍護師降香濟源上初期望祀於宫中而臨河阻風鐵劄既沉斥鼓棹前進登岸風如故立致甘澍特㫖褒異兼提點五嶽佑神觀天興二年春京城送款于我朝驛訪高道以師為之冠秋七月約由中灤渡北邁時苦於餓依附者衆船人疑其有金帛迤邐沿流而下夜將半遇一沙渚委之而去黎明驚濤四涌莫不倉皇失措會八柳樹堤潰乃定徐謂弟子符道清曰今日之事非爾不能濟道清秦人不安於水承命捷若神助俄賂二舟馳迓舉脫其厄其臨事如此過魏過魯過趙諸侯郊迎以相躡擁篲以相先玄通子范圓曦方為人所尊信主東平上清宫聞風虛席引避良有以也乙未秋入燕致祠處順堂下適清和嗣教門事待之如伯仲丙申燕境大旱而蝗俯徇輿情投符瀘溝乃雨蝗不為灾戊戌夏四月詔天下選試道釋進號通玄廣德洞真真人秋七月掌教李公真常奏請住持終南山重陽萬壽宫適北京留守烏公築全真觀奉之庚子太傅移刺寶儉總管田雄交疏邀師會葬祖庭即日命駕入關總宫事綦白雲李無欲實綱維之而曹冲和志陽實潤色之丙午夏五月西遊鞏昌以汪侯德臣敦請故也冬盤桓秦亭賓僚劉澤琡王道寧焦澍朝夕左右動靜語默具西州録丁未春二月還宫張道士來雲中躬拜庭下師堅讓不受執事者曰真人壽垂九秩簪冠滿前以此而處淵源之地過矣師曰禮無不答大白若辱廣德若不足老氏有之以丹陽接一童子必答焉忍自尊大耶庚戌冬十月二日沐浴正襟危坐猶平日翌日留頌以寓生不必樂死不必憂之㫖曲肱斂息坦然順化春秋八十五後九日葬于宫之西北隅有洪鍾集行於世鎮陽馮侍郎璧傳其事甚悉在汴則尚書左丞張公行信平章政事侯公摯司諫許公古禮部尚書楊公雲冀王府司馬李守節修撰雷淵應奉翰林文字宋九嘉在燕則陳漕長時可吳大卿張侍讀本在關中則參省王輔臣郎中邳邦用講議來獻臣同德寺丞楊天德員外郎張徽中書掾裴憲經籍官孟攀鱗署丞張琚蓋當世景慕者也容力取而言詰之哉師間氣天挺謙慈夷粹似簡而不失其倨似和而不涉於流信乎其難名也四方學徒不可勝數雖久於其事者未嘗見喜怒之色形於顔間察其日用之常則寒暑風雨無少變六十八年脅不沾席衣不解帶可謂愼終如始矣與人言惟正心誠意而已至於嗇神頤真之祕苟非其人閉口不吐恐失之强聒也精潔儉素不習而能一履襪之細至經歲不易肯以絲毫利諸己耶東徹海岱南窮襄鄧西極洮鞏北際燕遼瑰蹤瑋跡章章可考葬之明年春僕以南漕長告老燕臺無欲子促其徒往返六千里懇徵文石嗚呼玄鶴不來青山已塵遐想巖扉强勒之銘銘曰維道與天初同原方術分裂無乃繁至人躍然起海門丹陽嫡子重陽孫空山大澤環四垣隱几坐觀萬馬奔物生不願為犧樽火烈始見玉性溫西翱東翔動帝閽歲旱懷詔濟瀆源洪流怒濤鯨吐吞靈符一擲懾老坤蜚廉馮夷掖雨轅焦穀載沃如平反朝那夜哭戰死魂霓旌豹尾交繽翻楊枝麾灑消沉冤隨機應物忘清渾疾雷破聵電燭昏功成弗居德愈尊上賓碧落何軒軒道路掩面泫宿恩洪鍾叩擊皆玄言包括鄭圃羅漆園陸陶殊派契義敦我舌入筆勢可捫赤書翠琰馨蘭蓀甘水仙源録卷之三
