body:
  text: 甘水仙源録序息一夫道家之學以祖述黄老而憲章莊列者也後之學者去聖逾遠所謂徵妙玄通大本大宗閎衍博大之理枝分派别莫得其傳蓋已數千餘歲於今矣道不終否待時而行我重陽祖師挺天人之姿奮乎百世之下乃於金正隆己卯夏遇眞仙於終南山甘河鎮飮之神水付以眞訣自是盡斷諸縁同塵萬有即養浩於劉蔣南時等處者三年故得心符至道東遊海濱度高弟弟子丹陽長眞長生長春玉陽太古諸君遞相闡化於是高人達士應運而出大則京都小則郡邑建立名宫傑觀比比皆是遂使眞風遐布於世間聖澤丕敷於海内開闢以來而道門弘闡未有如斯時之盛嗚呼其重陽祖師暨門下諸君有功於玄教者爲不淺矣道謙爰從弱冠寓跡于終南劉蔣之祖庭迄今甫五十載每因教事歷覽多方所在福地名山仙宫道觀堅立各師眞之道行及建作勝縁之碑銘者往往多鴻儒鉅筆所作之文雖荆金趙璧未易輕比道謙既經所見隨即紀録集爲一書目之曰甘水仙源録鋟梓以傳如他日嗣有所得繼之斯後庶使向上諸師仙功道行不離几席之上得以觀覽者焉亦可謂玄教盛事之一端也至元戊子歲重九日夷門天樂道人李道謙序
