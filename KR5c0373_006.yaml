body:
  text: 夷門天樂道人李道謙集終南山重陽萬壽宫無欲觀妙真人李公本行碑宣差宗玄大師提點陜西五路興元路教門兼領重陽萬壽事何道寧撰釣六鰲於東海者不為鯢鱨而垂鈎採合抱於鄧林者不為拱把而加斧苟志於大區區細務不較也今觀無欲行實其超出物表之志蓋類是歟公族姓李諱仲美原月山人父珍職官醖有子四人公其次生於大定己丑五歲始能步及長聰慧邁倫慷慨特達毅然以正直自負里閈有狡獪者每正辭折之人望而畏服嘗肆意酒間視舉世為不足玩年三十七乃憣然曰與其汨沒塵坌中孰若擺脫方外耶時全真教方行意欲從師而未知所向適碧虛楊先生主重陽祖庭事乃往見之碧虛素得人於眉睫間知其為玄門重器然天屬所繫度其有難解於心者且令還歸但勉以積善而已公抵家與諸親友決謝妻子而去其妻訕之笑而不顧其父見而呵責公婉其辭曉之以理性之事父徐省悟亦欲向道乃同詣碧虛門下碧虛以公識量不凡命名守寧及無欲子號公蓬頭弊衣行丐於市時人謂之酒李先生日用間惟以濟人利物為己任至於幽微之理允造其極大安庚午秦境大旱居民阻飢公謂其屬曰餓殍如此安忍坐視同邑趙三郎富甲關中公詣其門備訴田里艱棘之狀趙悟乃發廪粟付公賙賑公與齊志道等晝夜舂爨以給貧病日不減百人井水適涸衆憂之公密禱于神鑿泉得水設濟至秋斂而罷公素不欲彰名歡人知己即日西行已而有司奏聞特賜趙為潤國長者未幾入興平環居以千日為約其靜中妙用見長安集至期渠河使夾谷公及耆老數輩就環懇請以縣南龍祥觀委公為主公諾之居五年至興定庚辰住終南樓觀五年又遷京兆之丹霞尋蒙師旨主營建三原碧虛觀事所寓之地皆有成規正大戊子春碧虛於祖庭丈室謂公可以倚重舉以自代關中搔動公及軍民避亂于南山糧盡人相魚肉幾及我公或曰此酒李先生素有道者也因携持出山遂得免焉庚寅春如南陽依附者衆會沖虛李公洞真于公在汴沖虛奏請住持丹陽觀癸巳汴京款附于我朝俄而忽起異議無辜者皆坐誅公與一長老止水泊中迫於凶焰長老悚栗不能自持公止之曰我輩平日所行正為此耳死生常事夫何畏焉竟以事免城中絶糧人爭北渡津人固拒飢溺者以萬計公請洞真先登因以陰隲開諭津人餘皆獲濟公繼達新衛門徒望風輻湊今之靈虛天慶創成榮觀自此始也明年領衆適燕時清和尹公掌教每會道衆議祖庭緣事皆推公為能公謝不逮復奏請住持重陽宫兼任提點陜西教門事更名志遠祖以厚贐公東行而歸過魯過魏自侯伯以下皆夾道祗迎有以庵觀奉之者有願為弟子者有以財施者公得之不以一毫私己悉歸之祖庭京兆田侯德粲聞公西歸督佐官就河中相迓以府城佑德觀歸之今玉清宫是也時關中甫定暴狠相煽公以仁言誘掖稍稍格心比年南征俘摯來者不絶公詢其主有好善者多端勸諭引而歸道有不可必致者乃議貨取隨授以明文許其自便其感之深者終不忍去公嘗往來於祖庭玉清之間然規畫調度未嘗不拳拳於祖庭丙申秋受清和師書督祖師葬事掌教真常宗師又任以祖庭之職冬十月詔提點重陽宫再年秦士議修文廟闕瓦郎中邳邦用輩請於公公盡給之士皆稱嘆庚子春三月被旨特賜無欲觀妙真人號秋匕月河北郝公總管家隸百餘陰謀南遁得其顯狀盡欲刑之公聞之連夜馳至其門以善言誨導亡者皆免明年城中群小數百結連私逸權府韓淵密知其情議尸諸市以令衆感公一言但殲其魁渠太傳移刺寶儉其母死欲以二婢為殉公以古葬禮正之始罷議凡契丹人以人殉死者弊因以革丙午春詔燕京作普天醮公預焉夏四月歸自衛汴京長官復請住丹陽棲雲王公具禮郊迎座中若有急色介諸徒速出人莫知其然甫登舟南軍己擁京門其先見類如此明年還宫秋八月朝旨加玄微真人號尋又被冠服之寵甲寅春宗師以國家醮事具書招致年已八十六矣不敢以老耄辭比至堂下疾篤以後事付于法弟衍真大師張志悅以其徒拜宗師為大度師於長春方壺留頌而蛻時夏六月二十六日也諸徒奉柩西歸附葬于終南祖塋禮也葬之明年志悅命李志安陳志元具行狀請于宗師欲刻諸石道寧適有事于堂下宗師就命當筆且曰無欲領袖祖庭蓋有年矣今子代之始終行實子必熟知其文之也固宜道寧不復牢讓謹按無欲可見之行為之説曰有主持玄教之大人不可無輔翼玄教之仁人大人者正己而物正者也我宗師正容悟物天下羽士皆觀而化無欲公輔弼其教以仁存心俾祖師根本之地有隆無替可謂無負宗師眷倚之意蓋公之為人稟剛大正直之氣持特立獨行之操傳授有源充養有地故施於事也無不濟之以仁遇患難則先之見人急難必盡力救援而後已有叩其修真之訣者則以積纍勉勵之其可與談性命事者每至夜分不寐雖與童子言亦諄諄未嘗倦至於名士大夫尤樂與交遊而相忘形骸與人接談又能度其高下而切中其機然且待人以約持己以謙其處衆也威而不猛和而不流在環堵四五年間神變之妙欲直書之恐人以為誕原其動靜語默之常亦可謂間世異人者矣故碑之而無慊乃贊之曰偉歟李公專氣致柔其守也堅其行也周解紛庶務而善計不籌一志不撓而先為之儔若人者將猒世擾攘而追帝鄉之遊耶吾知其了了諸緣而嗒然乎歸休也紫陽真人祭無欲真人維大蒙古國歲舍乙卯正月己亥朔二十三日辛酉友生河南酒長兼廉訪致仕奉天楊奂謹致祭于無欲真人開元天寶若吳尊師性質高鯁克愼攸履嘯月吟風嵩少之趾所與善者惟李謫仙孔巢父爾若張志和號玄真子浮家泛宅逍遙卒歲寓意於魚釣不設餌曰陳少遊實觀察使曰顔魯公乃州刺史杖屨往來迄今傳之以為勝事奂也何人浪名進士職非顔陳才非孔李巖穴素契洞真無欲兩翁而已旅舍京華適癸之已天兵南渡喋血千里十二都門閉而弗啓一死一生誓言在耳頃承驛召入長安市洞真羽化吁亦久矣真人既見傾寫底裏目電射人徹曉不寐青山滿眼簿書紛委盛夏五月腦瘡作祟夜半託君萬有不諱朝殞朝葬暮殞墓瘞大限未終勉強而起真人入燕遽然厭世倏聞訃音老淚如水玉骨北還卧病桑梓剝琢荆扉尺書踵至白馬素車遠涉清渭三奠生芻少酬知己儻念宿昔能不監止再見無時伏惟尚饗佐玄寂照大師馮公道行碑銘虎巖趙著撰公諱志亨字伯通寂照其號同州馮翊人五代瀛王道之後賦性明敏業進士年甫弱冠府薦入京師就住太學兩赴內試不中適崇慶兵亂還鄉以詩書自娛不復為舉子計本州節度使奧屯肅請攝教授事公辭以不能大兵西征公因北渡寓德興深居不出歲癸未長春宗師自北闕回道過焉公以其平音聖學浸灌之故至是為真師感發之機一召於外而己之天機立應於內鶴鳴子和森不可禦尋即願奉几杖列門弟中乃先謁真常真人為先容真常一見莫逆於心遂引見焉宗師亦不以常人待之既還燕一夕指公謂二三尊宿曰斯人他日必能扶持吾玄門後事也公默然銘於胸中後數載宗師將歸真宅衆乃以嗣事為請師曰我之託付伯通知之矣不必復言長春仙去公謂清和真人曰道教之興自開闢以來未有今日之盛長春宗師人貌而天者也教門後事屬意在君豈非天乎請毋多讓遂集道衆並達官貴族天下大老便宜劉公之屬就迎於所居之靜室請定仙號初清和閉門而不納公奓户而入扶至堂上使衆羅拜堂下名位既正玄風大振公之力也至乙未清和因祖庭事往闡教於秦晉之間默遺公手書云豫年邁而往矣老不歇心少不努力俱非所宜况四時之序功成者去未成者來汝當果斷時不可不順公得書乃自念言真常攝行此事已十年知之者不惟玄門道衆上至天庭下至山野皆知之此蓋天也豈人私意所得而可否哉丁酉清和承韶還宫公乃取元初立清和彌縫扶護之禮按為典故而行之遂立直吊既畢清和乃以歸老之計逍遙於自得之鄉真常乃以無礙智慧進服教門之重任輔兹二真人終始進退俱不失其正者亦公之力也先是承詔教授胄子十有八人公乃於名家子弟中選性行溫恭者如其數為伴讀令讀孝經語孟中庸大學等書庶幾各人於口傳心受之間而萬善固有之地日益開明能知治國平天下之道本自正心誠意始是後日就月將果皆克自樹立不惟俱獲重用復以才德見稱於士人又勸宣撫王公改摳密院為宣聖廟命弟子薛德琚修葺武廟而守祀之又創建五嶽觀及道庵十餘處為道衆修進之所庚子冬十月京兆太傳及總管田侯等請清和改葬重陽祖師以公為輔行自燕至秦三千餘里凡經過道家宫觀廢者興之缺者完之至百餘所其間公為之記使刻諸石者亦十二三焉祖師葬事既已復從清和還宫戊申真常大宗師依恩例賜金欄紫服遷充教門都道録權教門事仍賜以今號蓋嘉之也及將立玄學公復以作成後進之心而贊助之直至有成甲寅秋八月二十三日示疾即真享壽七十有五二十六日葬之五華山之西南原禮也化之明日著因以祭文致奠禮於靈柩前門人薛德琚姚志玄執公之行狀求為墓銘將刻石以表之著辱公之交為最厚因知公為最詳故不辭而為之且真常之於此老一相遇便歡若平生遂引致博大真人門下同著道家冠服又與築室於宫之右而居之比至物化三十五年之間其相與往來者梁運使斗南陳翰林秀玉吳大理卿德明輩每論及當世人物至以宰輔之器許之其雅量高致為可知已歷觀三代宗師所行之實迹則是靡有一事不相咨問不相假借而成之者又於化前後凡十數日數相往來於似夢非夢之中豈亦各人胸次真理融會之地别有相得於形聲之表歟何其誠通氣合物莫能間而至於是耶或者往往竊議謂同出身於儒之故兹蓋囿於私智之所見也化之後真常祭之曰與公相會三旬有五不交以勢不聚以富憶初相見無言心許公今假化境出非人生死示迹孰知其神此豈囿於私智者之所能及也哉豫故斷之曰如其不然烏得為寂照乃銘之曰堂堂佐玄博大無偏止水應物不隨物遷禮服智燭仁宅義路才德雖兼時則不遇蓽門圭竇終日如愚窮通有别聖道豈殊忽遇長春星拱北辰一惠發藥德因日新孔廟躬修武廟繼創文武之道將行有望公之所開豈小補哉贊成玄教亦卜大來荆金趙璧光而不耀英華外發誠明內照昔日非熊今學猶龍彼此一時不謀攸同刊之金石磨滅有終盛德流風云胡可窮重玄廣德弘道真人孟公碑銘太原虛舟道人李鼎撰公名志源字德清號重玄子其先本上京徒單氏大定末遷萊州膠水居孟氏宅人因以孟氏歸之此亦古之因食采地得氏者也高祖貺卒于汾陽軍節度使高祖母完顔氏金源郡王希尹之妹曾祖克寧尚嘉祥縣主事熙宗海陵興陵道陵凡四朝以功纍遷至太師封淄王及薨諡曰忠烈祖斜哥辭世襲千户終于南京副留守父給答馬復世襲千户職母烏林答氏略以金國名臣傳考之其家世可謂盛矣況在大定明昌泰和間使他人處之鮮不為紛華之所流蕩公獨從髫齓中猒富貴而樂淡薄非性分上夙有薰習之力能之乎明昌初年飢即墨人高翔嘯聚劫掠詔命公之父討之乃曰食者民之天得之則生弗得則死抵死求生小人之常情討而誅之惡在其為民父母也遂宣布主上之德賑以倉廪不戮一人寇為之平古語有云活千人之命其後必有顯者是公能了此大事亦必借先世豐功厚澤陰相之力而致之耳公有三兄六弟其兄有官至驃騎者有至輔國者餘皆克紹家聲泰和癸亥父母與議婚事公因遁去徑詣濰州玉清宫見長春宗師請為門弟子師憐其貴家子兼異其風骨不凡後必為玄門大器乃從其請授今之名字父兄疑其第四都全真觀主知之故為隱匿縶歸有司公聞之遂還家自言其志父母知不可奪因選第二都樂真觀使居之樂真今更名玉清矣公雖得法於長春充養之際亦嘗質於玉陽太古二師真玉陽賜號開真子太安己巳長春應詔京師還住玉清知公有所得乃賜重玄子號蓋嘉之也貞祐癸酉公之昆弟皆為兵亂蕩散而父母失依公乃扶二親就己所居致孝養之力三載雖二兄還其安置省問誠敬之禮未嘗缺己卯聖朝遣便宜劉仲祿超長春於海濱門人中選道行清實可以從行者得十八人公其一也及進程萬里沙漠其緇重車皆兩人主之惟公獨御焉清和憫其勤請副於師師曰吾知斯人之勤矣但欲先行其人之所難而後必有大所獲耳公聞之乃曰弟子於師丘山厚德無以為報共僕其御實當為之事豫惟不知所求亦不知為勞也同行者由是雖勤苦百至皆爭赴矣辛已西至阿不罕山始有漢人耕作因公等九人立棲霞觀癸未住德興之龍陽甲申長春奉旨住燕城太極宫尋更名長春公亦自龍陽來丁亥師反真公年四十一矣一日靜坐一室忽於恍惚間見重陽長真長春三師真公拜畢侍立祖師言汝壽當七十五長春言汝五十後必負教門重任事雖繁劇汝勿憚是皆磨礪汝之砥石煆鍊汝之罏冶也言訖不知所在尋覺身中百關通暢真氣沂流升尾閭入泥丸是後日復一日神物變化金漿玉液黃庭絳宫灌溉浸漬非言可及公因遍考先代師真得道之後身中之事著見於書者針芥相投矣公從此以來雖顛沛造次罔不在是其身中所得流運之理亦未嘗止想當時其為樂可勝計耶至清和真人掌教乃副知長春宫事俄遷知宫戊戌受宫門提舉丙午遷宫門提點戊申權教門事己酉以恩例賜金冠紫服並至德玄虛悟真大師號癸丑掌教真常大宗師奉朝命普度戒籙委公為監度師丙辰真常羽化誠明真人張公嗣教以公玄門大老之故己又在制遂授以教門都提點印俾攝其事戊午秋應丞相胡公之請主平陽黃籙羅天大醮尋奉令旨賜今真人號中統二年辛酉春秋七十有五矣度門人五百有奇宫觀稱是是年春二月二日順正而化前此數日預以後事囑門人凡為省視者見其耳聰目明音吐洪暢盡如平昔皆不之信至是方知公之所得過人遠甚越三日葬之五華山仙瑩從遺命也至於度門人立宫觀兹皆緒餘土苴衆人之所共見者或可得而言之今壽幾八十矣而精神不衰臨行一著又明白如彼其素養之於內必有精真微妙衆人之所不能見之者豈易得而言之也送葬之日官僚士庶前祭後擁傾動都邑道衆不言可知秋九月門人狀其行請文於豫豫因按其實而次第之屬以銘曰荏苒柔木言緡之絲大浸滔天砥柱不移二者之美公並有之公既有之我請布之一遇師真便得正理觀公之性已超異矣及住大宫中正不倚四十年間又出類矣苟非其人道不虛行本若不立道無由生推公之孝及公之誠本既立矣道宜有成人所見者緒餘土苴公之得者妙絶真假天地一指萬物一馬不以是觀知公蓋寡與其觀身孰若觀神神如之何把握乾坤陰升陽降黃河崑崙至人妙處不屬見聞精神骸骨各歸本始門人治任奢儉合禮燕城之北五華之址碑以表之公元不死渾源縣真常子劉君道行記前進士王鶚撰君諱道寧雲中白登人世為縣吏以廉平稱君生不好弄間與諸兒戲必結庵跌坐曰我學道爾識者知其有宿習及長雅意玄門昆季凡四人君其伯也縣民推嗣世業力却之秦和壬戌聞渾源隱士劉柴頭號得道乃與家人訣詣屏風山金泉觀師事焉師歷試諸難至遣丐食君樂從不屑也師知可教遂授微旨自是東遊海上西歷關中寓華山上方之白雲宫屬歲飢僵餒立志不少衰既又如太原泊神霄宫有饒益院僧賢而飯之道獲楮幣千二百貫君榜求其主踰月竟不至悉以給貧乏而一無所私貞祐之甲戌避地張村穴洞以居歲丙子鄉里稍安帖土官馮祿聞君之在并也迎歸雲內君尸居環堵若將與世絶者而樂道之人渴於請益百方為出之於是肩摩踵接學君之學者日益衆矣庚辰春渾源長高定飽聞君譽敬請之來曰龍泉曰金泉曰玄元皆名觀也君更為住持而興廢起頓之功為多癸未秋真人丘長春入覲回君執弟子禮迓諸銀海之東目繫道存一見如故問君之初事以柴頭對師頷之曰仙人中天隱也因授祕訣加號真常令築室西京未幾推為道官長遊戲十年庭無一訟逮長春仙蛻清和紹休尤與君相得丙申之春尹清和謁祖庭還會君於古恆嶽之陽語之曰吾近遊陜右奉田侯德粲之命凡玄宫道宇皆擇人主之惟華山之雲台地靈物秀實仙家一洞天非君無可託者君再辭不獲遂遣門人為經營君亦往返再三大興築構所過崇奉男女如市癸卯中夏田侯修華嶽廟復與丞相胡公天祿同署邀君於雲應間君聞命欣然即日就途甫四三年厥功告成丙午春有詔設普天大醮於燕京之長春宫遍召諸方耆德而君亦預焉時李真人主醮事得君甚喜是年夏五月庚申旋車古恆越二十二日壬午請州牧高仲揀洎門人許志安屬以後事翌日將中曲肱而逝春秋七十有五君生長大定明昌間不以世俗所樂者嬰其心而能遠迹塵凡棲心物表東遊西歷所至風靡雖土木屢興聊亦應緣而已嘗作巴人曲接引於衆又著會仙隨應總仙三録以道神仙可學之事臨終語門弟子曰可於丈室瘞吾軀榜以翛然足矣蓋取南華翛然而來翛然而往之義則君之平昔所養可知已方君之在渾源樂與學士魏公邦彥遊故其亡也門人史志經狀其行走燕求記于公且將刻石祠堂之側公一日携以過僕曰真常好道人吾知之詳然吾老不作文字久矣子其代豫言僕初客燕城殊無文思重違學士之請而復嘉志經之不忘所事乃以臨終之言名其堂因為紀其始末云若夫門弟之翹楚者皆當識諸碑陰兹不敢喋喋歲疆圍協洽清明前六日記重玄子李先生返真碑銘嘉議大夫吏禮部尚書高嗚撰金朝故事新天子即位例出諸王為方鎮大安崇慶間宣宗以豐王來彰德先生時以高訾家推擇為功曹掾有廉平稱尤精算術因之出入府中雅性重厚復小心畏愼故見親任至寧元年宣宗入繼大統明年車駕幸汴梁扈從以行補户部令史當艱難之際柄臣高琪蔑視文吏其持下急如束濕從事者為之惴恐稍稍引去先生以直道自任氣殊不少衰會被檄漕米餽燕師抵霸州值北兵大入幾至不測然憂世之懇每見於顔間議者謂秩無崇卑顧力行何如耳若是而進武則功名爵位其畏不顯一日忽報謝病歸隆慮山聞者愕然適與丹陽馬公之高弟盧公相遇便請執禮為全真師既付授有源未幾默有所契徑入樓霞谷無憂洞深坐練化木茹澗飮其節愈堅苦學道者難言之行元師府宗室惟良招撫使杜仙皆一時豪傑日加敬異在屯戍扞禦中嘗率僚佐致謁其他可知甲申聞長春丘公應召還附盧公遠迓得賜名志方號重玄子盧公有北京之命謂先生緣在彰德俾之南行總管趙德用請住迎祥觀觀雖兵燼日久凡事草創先生一顧奂焉有承平舊物之漸丁亥長春公上仙携法衆往祭因宿留檀順若致心喪焉庚寅復還士庶逢迎歡動閭里皆曰吾家先生來也總帥蕭仲通暨同列奉疏請主盟天慶宫宫之荒廢略如始住迎祥時先生力為經度不數歲大敞而新之殿堂庭廡壇藏厨庫下逮廄湢咸備而法視他郡邑為冠丁巳宗王穆哥崇向高風遣使持金冠雲錦羽衣焜耀之仍加真人號以庚申二月九日春秋七十有六怡然留頌而逝門弟子葬之王裕村某原從治命也所著地元經若干篇行于世甲子春提點趙志璞偕法兄弟扶狀來謁曰先師寧神冢上之木拱矣而旌紀寂寥誠惠顧之以銘死且無恨敢請鳴以先生之行有應銘者蓋先生少時已自不碌碌雖由文法進人皆以遠大器許之况潛邸舊人依光日月君臣相遇古人謂之千載雖方駕漢名臣可也乃今挺然不顧稿項黃馘自棄於淡泊無端倪之地以至成道非烈丈夫孰能如此以是槩之真可銘也已若夫萬鶴繞醮壇而翔飛蝗抱祭器而死虎承牒而殺田豕雪失道而作司南其靈異類此者甚多皆先生平日所不喜道亦不敢具書先生字友之相州安陽人初諱益既入道止以法名行銘曰貪魃倀倀不膠者臧在昔所難在我翕張城旦刑書家令智囊顧乾龍未躍已麗乎初九之陽逮雲雲滃然而從相得益章果以功名自任於一代宗臣而有望政屑就代來之議猶作封侯之宋昌胡舍彼而取此抑可謂有天德沉潛之剛翩翩獨征淡與世忘擁腫之與鄰寂寞之為鄉是宜為下士所笑而耿耿自信者廓兮其心光此孰得孰失計必有能辨其詳或乘白雲或下大荒千年夜旦曾不失處順安時之常有豐者碑植立墓傍繫攓蓬之日雖樵童牧堅知有道者為不亡棲真子李尊師墓碑嘉議大夫河東山西道提刑按察使王博文撰尊師姓李氏諱志明字用晦棲真其號也世為潞之壺關人以農為業祖考而上皆潛德不耀甫九歲去父母為全真學初禮樊山潘先生為師誦經讀書為童子事稍長遇超然廣化王真人授以火候周天之法鍊陰為陽之術久之覺有徵驗鼓舞踴躍不自勝乃曰師真豈欺我哉自是益積日新之功遂事長春真人命名與字愛之深所以教之篤始自薪水庖廄及一切勞筋力役心智之事皆令親歷而備嘗之然後誘之以至道之妙示之以用力之方廑懇諄復不憚朝夕師亦力強而志苦至脅不沾席者餘十年靜而生慧性識明了伸紙引筆肆口為歌頌皆有理致長春曰李生果為受道之器非餘子所及也居無幾乃曳杖挂瓢徑歸太原葺保真觀居之或寄迹於廛肆或丐食於村墟觀化閲世人無識之者但以單子李師父目之時方進取國制未定戎馬營屯星散汾晉間劫攘財物戕害人命者在所有之有司莫敢誰何歲庚寅太宗皇帝南伐駐蹕並之古城師率徒侣拜覲天光拈香祝壽上情悅懌因敕兵人有暴民攘物者以軍法從事遂著為令由是行者無擾居者晏然師與有力焉辛卯再駕而南復蒙盼睞是後師之道價益重矣清和宗師嗣教命管領一路道門事仍兼本府道録復以道體沖虛大師之號畀之未幾府尹石抹公及道録智公以保真狹隘疏請師住持天慶故宫天慶兵亂後鞠為荆棘瓦礫之場既允其請慨然以興復崇建為事一日從容語徒衆曰度道士以守宫觀雖近代之制然自漢武帝時於甘泉宫中為臺畫天地太一諸鬼神像各置祭具自是之後蔓綿衍溢恢張弘大以至於今其來遠矣吾道家者流雖恬淡無為以治其心可不以分祉祝釐為立教之迹乎是則以營繕之事不得不盡心力而為之也或有以功大難之者師曰古人有言作舍道傍三年不成謀之欲衆斷之在我即荷畚鍤為之倡從之者雲集貴者董其役富者輸其財智者獻其巧壯者程其力師斡旋運動於神明之中而應之者不愆於素遂使天慶之規制雄碩俊整為一方之冠者具見於榮祿宋公所撰萬壽宫碑兹故略戊子夏大旱將為一路災府中祈雨僚屬以師主醮事已而澍雨霑浹歲以大豐又宣差完顔胡失刺暴得奇疾氣息幾絶家人走告師以危殆狀躬詣其處呪詛杯水下咽復蘇其精誠之至感格之效如此平生不勝計所録才一二耳己酉真常真人以師踐履之實洋溢遠邇遷河東南北兩路道教副提點凝坐一室中不動聲色而事無不集者雅為誠明宗師所敬重中統二年即升副為正越明年左仙翁保奏於永寧邸即授棲真洪妙真人之號方為人天所瞻仰遽爾猒世於至元丙寅建子月之浹晨返真得年六十有七又明年師之高弟提點張志希侯志正等請道教都提點洞元大師申雲叟繼主天慶事雲叟即師之同法弟也至元癸酉豫方官太原適洞元還自燕都將以是年四月己酉葬師於太原府城之東南三里所從遺命也洞元持師之門人郭志修等所纂行實狀以墓碑為請洞元與豫二十年之舊也固辭弗許因請洞元言尊師一方外間人耳無猗頓之富無晉楚之力徒以日積月纍而歲以增加遂令荒寒寂寞之域一顧盼之頃化為天上之玉京平地之寶坊非德足以服人誠足以感物曷以臻此莊子有言水之積也不厚則其負大舟也無力風之積也不厚則其負大翼也無力以師今日之所成就者論之可謂積厚而有力者哉銘曰維全不虧不虧何傷維真不偽不偽可常斯道昭昭熟為主張得其人而遇其時遂川流而天光僉謂若人福厚莫量心靜而明志堅而剛內德既充道價日彰事之者煬竈爭席師之者摳衣升堂騰實蜚聲佩蘭襲芳砥柱中流橫潰獨障遊赤水而得玄珠讀南華而友子桑視人世之死生猶旦夜與陰陽遽厭世而上仙返白雲之帝鄉顧雖蛻骨於此既不足以喪吾存則又何必驚於凡亡耶甘水仙源録卷之六
