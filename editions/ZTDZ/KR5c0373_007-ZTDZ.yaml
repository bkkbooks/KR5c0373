body:
  text: 夷門天樂道人李道謙集崇眞光教淳和眞人道行之碑嘉議大夫吏禮部尚書高鳴撰全眞之教始於少陽君興於重陽子大盛於長春公長春傳之清和清和傳之眞常眞常傳之誠明誠明傳之淳和淳和以大元數之實爲宗門五代祖諱志坦字公平出於相州湯陰王氏父諱忠性慤願以貲雄其鄉母岳氏閨壺有微妊夢古仙來告曰此子成人必令學道否則將禍而家已而公生焉自童弁不好弄戲且不喜華羡物甫及冠即著道士服師北京盧尊師師乃丹陽馬公之法孫洞清于公之高弟也時以道録居京之華陽宫盧素嚴厲少忤輒責誚之殆若官府然故居門下者鮮克終公叅謁之餘力營百役至於廥廐湢磑之細躬執靡有懈盧亦憫其勤而誠復加以禮癸未秋謁大宗師長春眞人于宣德一見器之傳付祕訣既恐無以善其後遂行化興中義錦間日丐一食雖蚊蚋嘬敗亦不屑棄已匪茆而居不計何地遇昏暮即止戊子聞清和宗師駐燕知道統所在叅禮焉師愛其力行大加奬拔公忽有開悟恍若神明頓還舊觀無幾何徑入金坡坐而鍊化窮深抵幽木茹澗飮人莫見其面其志愈堅苦雖晦跡十餘年無賢不肖皆曰金坡王先生有道之士也甲辰春眞常眞人李公素高其玄屢以書見招來拜爲大度師夏五月從眞常北上叅受三洞祕籙以祈禳訶禁濟人其疾病藥石不可爲者假符水或以袂拂之罔不立驗咸畏服其神皇太后飲挹眞風寵賫以禮公益自謙遜惟顛墜是懼每蒙慰諭必歸功於聖神若私不敢有者其知本不伐也如此留居闕庭者六年還燕爲教門都提點燕去和林里千六百有奇凡赴十有七馳驅寒暑略無艱苦狀蓋以輔翼玄教爲己任雖九死不悔也先皇帝踐祚之元年龍集辛亥詔眞常公佩金符馳傳祀嶽瀆以公爲輔行繼而奉香代祭者又四皆以祈天求命斂福錫民爲意癸丑上問養生之術對曰此山林枯槁之士所宜非天子之急務也天子代天理物當順天心與民興利則天降之福壽近大赦天下革故鼎新民樂生活開創以來戕横天閼精魂無依非求諸冥冥中而莫之能救是所謂恩已及於八方澤又浸於九原矣因奏修黄籙普天大醮上喜曰天垂此教以利天下即詔公命眞常公于燕之長春宫陳設醮事所須旅百俱出内帑一無擾於民食墨得甲寅三月十有五日禮備將行雲膚寸而雨公密禱於天天爲之靜風月肅然星辰可摘又有卿雲鸞鶴之應公卿文士咸作歌詩以贊其瑞繇是道價益重一時貴遊悉奔走承事或執弟子禮眞常猒世誠明嗣之公之力居多中統建元春入關旋及覃懷陟天壇愛之留玉峰前期歲相州神霄宫乆虚玄席諸耆宿士庶懇公主之明年會眞常葬又明年復入金坡至元改元燕人楊提領者素慕玄教於私第之後圃作環庵一區願得天下清修高尚之士奉之僉曰金坡王練師可即禮致焉三年冬誠明復以提點事懇公七年誠明上仙今皇帝詔公襲位仍加眞人號以九年十一月二十有七日蛻形於長春之玄堂得年七十有三越明年門弟子梁志安常志敏等奉其衣冠寧神於金坡山下從治命也時天氣肅冽比襄事熙熙然化而陽春執紼祖軷者萬余人汗皆浹背咸嗟異之以謂純誠之驗也所著信心録六牛圖傳於世葬之明年志安志敏等狀公之行來謁銘鳴治彰德時蓋嘗以疏請公主神霄從遊甚款故習其爲人義不可辭公美儀觀愛讀書尤喜性理學深得奥義好施與困乏無聊者不以己之有無謙恭寬碩克己下人故度門弟子者數千人若觀若庵者又營建百餘區可謂能弘其道矣嗚呼以公平日陰功濟物之心嚮在闕庭假之以政救時行道焉知不有如行符設醮之功耶若夫將適遼東也禱之而愈風痺又去許昌也空中傳玉帝有命其靈異若是者甚多然實非公之本心且有淳和眞人傳在兹略而不書銘曰混沌既死大道窈冥乃醨其醇乃濁其清喫詬以形勃蹊以情拱璧而先駟馬竟盜爲夸矜天開聖人藥石聾盲著書二篇强爲之名爰有漆園演爲鯤鵬蝶夢破而虚白生然後使混沌復起大道復明代有人焉玄風日宏有來重陽莫之與京孰其似之淳和是承挺焉志堅夷焉心衡嗒焉尸居而聞望震驚寂然無聲澹然無營眇翩翩而獨征砥柱中央萬古不傾力提玄綱惟公主盟雖以符水藉名而救世是宜羔鴈待之如老更金坡蒼蒼草木光榮衣冠有藏功行有銘而復返其精抑將乘冷冷之風御顥顥之氣遊元洲而戲赤城也耶頤眞冲虚眞人毛尊師蜕化銘宣授河南府路提舉學校官李國維撰人命於天地兩間事莫大於生與死也自生至死之際善惡所歸其可以見之矣且莫高者天莫厚者地在天而日月有晦蝕在地而山川有崩陷天地尚不能乆有壞如此而况於人乎乃知生不常存惟靜而復命曰常死而不忘者壽蓋有道存焉耳自大道既隱人慾滋熾不可救藥幸鍾吕而下降及近代全眞之教興有王重陽者出化馬譚丘劉於海上相從往返東西二都仙跡顯著而後遠近向風而流傳漸久彌滿四方遊其門而學者不知其幾萬千人至於識性命之理了死生之事而不失其所者蓋亦寡矣百年以來能繼重陽七眞之風而不下於今之高道動化關洛間衆所飮慕卓然獨異者冲虚眞人毛尊師也師諱養素字壽之道號純素子頤眞冲虚眞人其師號也家世平水太常博士兼祕書郞沁州同知毛麾牧達之嫡孫牧達以文行純粹前金明昌初朝廷重其名特徵授宫教之職得其師道上下受益歷館閣通守外郡於道無少違失宜其爲天所佑有賢子孫其父諱德字日新以門資入仕不喜躁進師性資冲澹雅有出塵之志幼喪母事父謹敬鄉里以純孝稱既長僑寓許昌貞祐初適一羽客見過風神蕭爽師一見乃知其爲異人謹奉之久羽客曰此子可教授以祕語師問仙號曰我華山陳希夷也言訖忽失所在自是心神涣釋道縁漸濃又於隱君子于宋二老時親言教以謙光處己實德接物乃父既即世喪祭禮闋棄家易服而道往禮太華惠照眞人田無礙即丹陽之法嗣也謹執几杖清苦玄門幾二十年惠照異之丹書祕訣又得其傳天光焕發日以益新殆不可掩因志在四方不爲物滯門人常志乆系出素宦方監永寧務棄官入道同諸貴遊請師居鳳翼道院一日其子尋訪既見堅乞還歸師却之曰吾既在道門去就自有時終不能爲世俗累爾無顧我子號泣而迴後天興河南之變大朝王師南渡因復姑汾時官府道俗交狀敦請同法屬王葉諸公棲霞黨子春住持玄都觀當其晋境飛蝗滿地民心懸急師率王葉輩齋戒致禱蝗悉飛去竟不成灾人以爲靈應昭然精誠所致莫不尊敬之但福地靖廬未能全忘其情乙未同諸門人常志久由陜而南興葺洛陽朝元棲霞二宫及華陰清華觀不數年金碧輪奂冠於他處丁酉汝州官府狀請住北極觀己亥關洛荐饑豪富閉糴師悉發餘糧均施困餧賴以活者甚衆蓋平昔樂於賙急以仁爲己任如此辛丑清和眞人至終南以師宿德望重起爲棲霞提點兼領披雲玄都寳藏八卦局時紫陽楊使君行漕臺暨玉華王元禮西庵楊相正卿諸公俱在洛與之遊相得甚厚道價增重光耀一時甲辰副提點寂照大師吴志明北上齎皇后懿㫖有冲虚大師之號繼及眞常掌教大宗師銜命南下賜號頤眞冲虚眞人既莅琳宫主盟師席薰戒嚴肅日無惰容庚戌舉燕京都道録韓公以自代退跡清華未幾韓復歸燕棄世再奉掌教誠明眞人法諭復領朝元棲霞宫事師於性理之學尅意終世斯須無少間斷故能透脱融貫全眞正脉其造之也不爲不深一日炷香危坐即示歸寂之語衆莫能測翌日晨興方理巾幘既畢依墻儼然立化神觀不衰是日朝霞亘天人有見師翱翔其上者士子伊川楊君用登封韓仲温因宿於宫嘆以爲異實己未七月上旬四日也世壽八十有二凡聚徒闡教前後度門人百數輩其遺骨瘞葬於本宫之先瑩關洛諸公多爲作傳及賦歌詩挽誄之有汎霞圖卷傳於世翰林待制孟攀鱗京兆教授李庭叙之甚詳門弟子王志冲張志佺同道判常志乆齎講師郭從道所作行狀謁余求誌辭不能已余以謂甚哉道之難明也其道有成不成由其人之悟不悟故前聖有道心唯微之㫖亦有謂朝聞道夕死可矣之語皆不以達道爲易其所以悟而成者誠亦有所由來必也所禀賦高明所遇合神異所以抱神守一甚固積行累功甚勤自種時一點物眞力耕敏耘善始令終然後可望入其閫域矣師生於姑汾長於賢祖考積慶之門得天地之間氣其禀賦不必論也隱於許下遇希夷許以可教遂授其妙道入太華禮田無礙授丹書其遇合可知也内持孝敬以事親奉天外施慈仁以愛人及物此非積累之功行乎隱居華之下洛之濱清淨虚寂餘四十載有進無退此非抱神守一甚固者乎故卒能有成脱塵網之中出化機之表翛然往來入於自在逍遥之境界不亦宜乎後之學者可不景行而加諸意抑謂自大朝奄有天下以至中統改元當今皇天眷命皇帝暨后妃太子諸王莫不敦尚玄風敬禮高士而師之所歸至善若此不可不爲之銘銘曰太古之時人生之始壽而不夭仁而不鄙大道既隱衰俗靡靡滋熾人慾泯絶天理輕妄好惡勞煩聽視眞趣之歸幾人而已在清流中有純素子忘懷名利遠跡朝市養氣煙霞棲身山水伊水洛水嵩山華山往求同志密叩玄關當擾攘之際倘徉乎其間契遇高眞逸駕相攀傳授祕訣煆成大丹輟食賙人救時阻艱内持外修功成行完策名紫府垂範黄冠塵縁方盡飈馭將還幻身外物付之等閑汎霞璇空眇視塵寰陳跡在碑有志明刊善始令終衆之所難不歸於地府不列之王官生死無變於己而况乎利害之端豈亦不幾於神仙之一班後人仰止拂石以觀終南山圓明眞人李練師道行碑祖庭天樂道人李道謙撰師姓李諱志源邠州三水縣人天挺至性宗黨以孝悌稱自幼有冲舉志年未三十考妣俱喪乃棄家絶累潔身入道師事本州玉峰觀全陽周君服勤左右數年匪懈全陽憫其精懇遂付以修眞微㫖且使遊歷諸方叅證心印至醴泉與同志裴公結茅以居遣欲凝神虚心集道歷十有八載故得塵慮盡銷天光内發鄉人李公崇尚高潔建道院率閭里耆艾延至事以師禮無何全陽召之還邠賜號圓明子俾主玉峰觀又嘗集衆言曰圓明於道實有所得他日吾歸全之後汝輩當尸祝之迨正大戊子冬十月全陽返眞門衆遵宿昔之命舉練師處師位練師勉從其請未幾遷居京兆府城之西漢高祖廟凡昆季子姪教育公溥遠近道屬靡不得其懽心始服全陽付畀得人之哲天興初秦地受兵練師挈衆出關寓陜州之雞足山尋遷洛陽長生觀及河南破天朝遣使招集三教人練師率衆北渡於東阿縣築栖眞觀居之遠邇聞其名德之重請益受教者不可勝紀玄通子范尊師方主東魯道教事待之如伯仲時遣人候問起居資其不給甲午歲關輔略定練師念及絡南南時村活死人墓乃重陽祖師鍊眞之地曩者全陽意欲葺居以彰仙跡適丁金季之亂不克肯構即遣門人王志瑞等西歸耕占乙未叅軍齊大年與練師鄉里之舊時居趙州慕其道德創悟眞庵請至事之百色用度繼奉不輟丙申冬適燕謁處順堂掌教清和宗師遇以殊禮署練師充眞定路道門提點且曰吾向詣長安祀香祖庭見公遣人創制南時勝跡吾就名與重陽成道觀矣然此非細故公儻不親臨恐莫能濟練師還趙之日繼令法弟吴志恒來充知觀戊戌冬京兆總管田德粲差官持疏往迓練師即日命駕率百衆西還大行起建由是道縁益弘門徒翕集不數年殿宇壯麗與宗聖上清遇仙諸宫相甲乙辛丑春祖庭會葬之際道流恒數千人洞眞宗師舉練師提舉重陽宫練師以正己而物正之道禆贊玄化與有力焉丙午八月朔旦朝謁禮竟忽謂衆曰吾昨承玄告不能乆留世矣公輩各當以進修爲業及此師祖勝縁實先師之志今克伸之吾歸無慊矣可善主持無使中道而廢遂絶粒忘言越五日沐浴更衣奄然解化春秋七十有一門衆葬于本宫東北之仙瑩庚戌冬掌教眞常眞人奉上命委加玄教有道之士名號以恩例追贈淵虚圓明眞人仍升觀爲宫於戲盛哉練師道器凝重上性謙冲律己容人輕財重義生平不讀書凡視聽言動脗合經㫖當作務紛擾之甚其修鍊之功亦無時少輟丈室之中惟巾盂几杖無長物一冠一袍之外不置囊橐終日塊坐殆若與世相忘者及其即之而飮人以和使人自有所得其教誘後進又能隨其根性高下各有所發明無非頤神毓氣誠意正心之要雖髫童之愚所爲不道亦未嘗以惡言斥辱但以善惡罪福之報方便啓導之必使心自慚服以馴其化其成就於人者如是至元癸酉秋重陽日提點吴志恒每念練師薰陶切磋之惠思而不忘丐予爲文用刻貞石以垂不朽向予與練師同居仙境僅及十年仰慕高風亦樂道其盛德仍系之以銘銘曰眞常之道無門無房誰其啓之教祖重陽東遊海上四子傳若支分派别化洽萬方圓明老仙天挺道器丹陽裔孫全陽嫡嗣乆進眞修功周德備或出或處有道有義仙仗西來肯構南時門徒濟濟教化熙熙樓觀嵯峨金碧參差肇開神宇萬世之基善始令終曲肱斂息形有生化道無終極我銘以辭無愧乎實刻石琳宫後昆懿則清虚大師把君道行録翰林侍讀學士正議大夫兼國子祭酒陳楚望撰國家尊右三教道其一也爲教者思寵遇之優渥而歸美報上之念亦與國家相爲無窮是以道家者流必創宫殿集徒侣崇奉玄昊晨夕焚修以爲皇家祈天求命之地此乃天保下報上之遺意而通明殿之所以建也天下之理通則明人心本自虚明洞達一爲外物所蔽則明者塞矣塞則暗莫甚焉夫明必本於通不通未有能明者也此通明之義是宜清虚大師把君以是銘諸心而又以是名其殿也君諱德伸字仲直世居唐邑幼而好學事親以孝聞學廣聞多而以老氏虚心體道之要爲入道之門户值貞祐南遷挈家襄陵十餘載二親相繼而逝既終喪欲訪異人辭故里南遊至蒙山受道於無塵子衛君無塵甚器重之爲立今名字自此黄冠野服惟意所適晩寓青社養素於太虚宫先是有同門高士王君於府城東南隅卜建觀基欲居雲遊之衆城東二十里許購田園以備香供之具一旦遇仲直道同志合悉以其地相付與且曰成吾志者子也仲直躬率羽流銳意締構是時總管于公元師姜公及諸方信士隨心樂施助成勝事崇通明之正殿立玉帝之尊儀方丈雲堂齋厨庫庾廊廡雜舍以序營爲一新偉觀落成之後每遇朔望自總管以次官行香致禮以贊頌天子萬年之祝其歸美報上之一念必使無負於尊右之初意此仲直之本志也玄門掌教大宗師眞常眞人名其觀曰通玄仍付以金襴紫衣號曰清虚大宗師誠明眞人特授益都路道録歲次乙亥朝廷遣使徵召留長春宫每事屨有咨訪特㫖遷授提舉諸路道教以彰有德昔河内司馬子微受中嶽體玄潘君正一之法體玄受之於茅山昇玄王君昇玄受之於華陽隱居陶君自陶君至子微歷四世而子微被召於唐景雲間乃以治國猶治身之説納誨於睿宗自丹陽宗師以是道傳之元元宋君元元傳之無塵子衛君無塵子傳之仲直亦已四世而仲直以有道榮膺召命他日奏對必能以正心誠意開物成務之學啓沃聖心其視子徵治國治身之語殆異世而同符矣仲直老名而儒行者也余與交最久頗知出處之大槩併筆之以遺後之嗣教者使有知焉至元庚辰正月吉日記終南山樓觀宗聖宫同塵眞人李尊師道行碑宣授陜西五路西蜀四川道教提點天樂眞人李道謙撰師姓李氏諱志柔字謙叔其先洺水人世業農桑以門地清白見稱於鄉里昆季四人師其次也生有宿慧及長雅好林泉蕭然有出塵之趣父志微素嗜玄學先從趙州臨城縣太古高弟開玄眞人李君叅受全眞教法及學成行尊所作歌詩深契玄理泰和辛酉歲師亦事開玄執弟子禮服勤日乆開玄識爲受道器眞筌祕訣付授無所隱師既蒙印可自是鍊心養性丐食邢洺間雖絶粒數日立志不少衰尋隱居仙翁廣陽兩山謝絶人事者十有二年潜究道德性命之學大有所得是時開玄及志微俱上仙其兄志端弟志藏志雍皆從師遊蓋相尚以道也已而西山盜起遷邢臺築通眞觀居之道價日隆遠近向慕願爲門弟子者户外之屨嘗滿庚辰春聞長春宗師拔起海隅道經燕趙師以禮餞行迨癸未八月長春奉詔南下師復迓於宣德之朝元觀長春以師碩德宿望賜號同塵子教以立觀度人將迎往來道衆爲務師恪遵玄訓於是始建長春於漳川奉天棲眞於大名丙戌復詣燕覲寳玄堂叅證心印明年秋長春返眞師杖屨南歸向化者益衆如磁州之神霄相州之清虚林慮之天平廣宗之大同燕都之洞眞皆以次而舉其門弟諸方起建大小庵觀二百餘區化度道流稱是丙申清和宗師自燕入秦興復終南劉蔣祖庭時師亦侍行適樓觀宗聖宫道士張致堅以廢址係玄元道祖演道德二篇聖蹟天興兵亂焚毁殆盡具狀懇宗師乞爲重建計宗師以爲無丹山豈能棲彩鳳有任公乃得猒大魚即以狀付師俾任其責師奉命率徒剗荆蕪陶瓦甓經之營之日漸成序丁酉冬眞常宗師署師大名刑洺兩路教門提點暨清眞大師號俾往來秦魏趙間以辦其事不十載雄樓傑觀粲然一新庚戌洺州牧石德玉慕師名節詣闕保奏賜黄金冠服加號同塵洪妙眞人甲寅春詔燕京大長春宫修普天大醮師預高道之選事竟盤桓邢洺諸觀院有未完者例爲補葺中統癸亥誠明宗師命督還樓觀凡有闕略悉加修飾方之前代增益數倍矣至元改元奉德音禁民侵擾及使臣軍旅無聽留宿以便焚誦三年丙寅夏六月二日沐浴正襟儼若平日集衆於前戒以修身利物爲念以後事嗣弟子石志堅主領翌日翛然順化享年七十有八方其斂息之際宫北焦家巷居民見空界五雲浮動仙音朗徹奔往視之師乃昇矣畏暑流金顔色如生醮祭三日權瘞於所居之丈室既事遣介赴喪於東門人忽一日大名奉天宫群鶴飛鳴下直壇殿衆目仰瞻須臾訃音至識者以爲師之神遊也後四年庚午門下諸耆宿卜以清明日葬于宫東南成道觀之仙遊堂師純素誠敬終日危坐望之毅然若不可犯逮其即之教人不倦皆嗇養精氣神之祕其次則必以退己進人罪福之方隨其高下接引之誕惑幻怪之語不道也雖應縁世務中其頤眞毓浩之業未始少間輕財重義慈儉謙裕殆若夙成四方學徒不可勝計歲時供奉金帛充溢悉歸常住爲興建費衣冠之外囊無私積故能享其壽致高名所至之地權豪士庶莫不再拜禮敬北面師事之自非胸中誠實所格疇克爾耶以予嘗辱知於師比其葬也石君志堅狀師平昔所行大槩懇來乞文將刻之石予亦重師之有道不得以固陋辭即因其實而紀之銘曰希夷道妙言難窮誠之所感斯能通粤有人兮宿慧充開玄嫡嗣同塵公早年穎悟超樊籠仁慈清儉居謙冲虎龍交媾全眞功鍊就骨肉俱相融令名籍籍壓岱嵩所在請益來叅同西翱東翔闡宗風隨機接物開盲聾草樓灰燼施神工瑶壇玉宇增興隆功成道備師知雄退身閑居德愈崇百年厭世遊太空昭昭不亡存其中我作銘詩樹琳宫高天厚地齊始終洗燈子然先生道行碑銘翰林直學士中順大夫陜西漢中道提刑按察副使王利用撰道家者流蓋逸民之徒歟語其心則冲虚清靜語其身則落魄不羈語其情則愛惡俱遺語其志則持守不移其設教也不娶不宦不葷不垢慈而祥貧而樂和柔謙退而已所以老莊於周鍾離於漢吕仙之於唐繼繼承承而不世出也其簪冠模範心跡塵俗者姑置而勿論金源氏作重陽祖師飲甘泉而了道丹陽馬師遇重陽以修眞趙玉斗法嗣於丹陽洗燈子光續於趙斗教法大闡而關中爲最者洗燈師與有力焉師諱逸期字守約姓然氏京兆涇陽人大定辛卯分瑞于世骨相異常弱不好弄及其長也神注于顔髯過于腹澹然寡欲樂慕玄風父母欲妻之誓而弗許遂禮清陽子桃花陳先生爲師灑掃叩詰盡瘁服勞雖經叱訶責辱未少退惰晝不懈夜不寐者凡六寒暑矣清陽子曰汝雖經鍜鍊功行未圓若非明師指訣詎可入於大乗東山道人與汝有千劫縁當往叅禮力遣之乃謝去至驪山遇了眞子趙公方悟陳師之言久炙仙機默有所契了眞子曰靜功垂成更加礱勵可也長安太白延祥觀乃唐朝玄元道祖示現之跡吾丹陽師已爲建立全眞堂於其側他日必爲大福田汝可識之即日西邁過醴泉邑人留居環堵遂乃踵納眞息内杜德機棄智忘言識心見性不三年造夫大妙之域一日火光從環堵中出衆以爲灾奔赴之至則見師瞑笑而坐衆感而異之方悟火光乃神光也於是敬仰禮奉倍於他日師厭其煩瀆出遊商顔卜築三陽草庵以止息焉字其庵曰還眞三陽地勢高迥泉素艱得師指其震隅曰泉其在此乎發之泉果涌出甘冽如飴遂賦詩曰一陽初動震天關須信還眞地有縁昨夜乖龍轟霹靂迸潮海眼出寒泉居十歳聞望益彰門人大集鄉之善友敦請西遊遂赴了眞師所囑太白延祥觀而住持焉士庶叅謁曲盡誠敬持紙幅懇求翰墨者比比也或者辭色頗倨即書二詩付之持歸披讀了無一字翌日再詣師席具白其事師笑曰爾元不曾開眼再讀當有所見展而視之墨跡儼存驚悔拜謝而去節度使曳刺金紫之在鄧也病篤夢異人飲以法水寤而即愈命工繪其像晨昏敬禮焉聞師歷商過鄧使數人邀於路至則駭曰乃夢中所遇之異人也出像示之惟蕭師知其意誠諭以詩曰憶昔垂綸逾四載至今猶自不吞鈎可憐笑殺灘頭鷺辜負寒江一葉舟金紫拜而受之歲壬辰秋七月居浙川召門下楊志堅張道性語之曰比歲暮吾將行矣其年冬十一月二十八日命道侣次第而坐曰諸公盍爲我餞行因令高歌起舞時及四鼓乃留頌曰四大元無主包羅物外身壺中天地好歸跨紫麒麟頌畢擲筆端坐而蜕春秋六十有二乃卜服餌谷之兆而權厝焉越明年門人白志柔等欲改葬樊川了眞師仙瑩之次焚香啓柩面如生亦足以表其平日修鍊之功矣至元癸未冬十二月嗣法提點趙志暉提舉王志靈知觀李道和輩持師道行之狀介道友通眞子乞文於予曰吾師襟靈明爽虚室生白經文洞曉肆筆成書曩昔著述歌詩幾四百首引援門弟子無慮千餘人墓雖有誌若非道行碑銘恐無以白于世而壽于後也予感其求請之懇乃爲之銘曰維鍊金兮純粹其精維質玉兮瓏玲其聲德叅乎兩儀秀禀乎五行言乃矢口而發書乃肆筆而成降龍伏虎兮翱翔乎河洛七八之數乗風御氣兮逍遥乎鵾鵬九萬之程其來也孤雲其去也迅霆孰知夫洗燈莫測之妙盍視此翠琰不朽之銘乎通眞子秦公道行碑銘遺山眞隱元好問撰通眞子諱志安字彦容出於陵川秦氏大父事軻通經博古工作大字爲州里所重父諱略字簡夫中歲困於名場即以詩爲顓門之學自號西溪道人殊有古意苦於雕琢而無跡可尋一時文士極稱道之生二子通眞子其長也自早歲趣尚高雅三舉進士而於得喪澹如也貞祐初避亂南渡西溪年在喜懼親舊以禄養爲言不獲已復一試有司至御簾罷歸正大中西溪下世通眞子已四十遂置家事不問放浪嵩少間稍取方外書讀之以求治心養性之要既而於二家之學有所疑質諸禪子其推墮滉漾中而無可徵詰也去從道士遊河南破北歸遇披雲老師宋公於上黨略數語即有契乃嘆曰吾得歸宿之所矣因執弟子禮事之且求道藏書縱觀之披雲爲言喪亂之後圖籍散落無幾獨管岑者僅存吾欲力紹絶業鋟木流布有可成之資第未有任其責者耳獨善其身曷若與天下共之通眞子再拜曰謹受教於是補完訂正出於其手者爲多中間奉被朝㫖借力貴近百方並進卒至於能事穎脱眞風遐布而通眞子之道價亦重於一時矣通眞子記誦該洽篇什敏捷樂於提誨不立崖岸居玄都垂十稔雖日課校讎其叅玄學受章句自遠方至者源源不絶他主師席者皆竊有望洋之嘆焉藏室既成之五月謂徒衆言寳藏成壞事關幽顯冥冥之間當有陰相者今大縁已竟吾其行乎越二十五日夜叅半天無陰翳忽震雷風烈大木隨拔遽沐浴易衣蛻形於所居之樗櫟堂得年五十有七弟子李志實等以丁未年月日奉其衣冠寧神於天壇之麓披雲之命也所著林泉集二十卷行於代往予先君子令陵川予始成童乃識通眞子之大父閑居嵩山與西溪爲詩酒之友者十五年通眞子以世契之重與予道相合而意相得也故志實輩百拜求爲其師作銘今年春二月劉志清者復自濟上訪予新興冰雪沍寒跋涉千里其勤有足哀者況於平生之言乃爲作銘鋟刻之松臺其銘曰昔在窮桑發眞源鑿民耳目神始全遭罹元二坤軸旋壞劫欲墮未開前道山絶業疇當傳百於苾蒭了大縁若有人兮靖以專嚮也易老同初筵玄綱力挽孰我先苦節終至孰我堅網羅落簡手自編寒暑不廢朱黄研琅函瓊笈閟九淵垂芒八角星日懸司功會計盍上遷乃今出瓶鳥飛翩安常處順古所賢死而不亡豈其然華陽九障名一焉豈不委形殆賓天爲復延康轉靈篇爲復蘂珠叅七言爲復虎書校三元爲復逸度論九玄寧當褭蹄燒紫烟寧當麟角煎集弦寧當千家課芝田寧當七祖歸枯禪松臺有銘閲千年我相夫子非頑仙恕齋王先生事蹟先生姓王氏名粹字子正北平之巨族也才高而學贍少有詩名每一詠出膾炙人口然與世疏闊不事舉業正大間薄遊鄧下時漆水公節鎭唐鄧喜文章樂與士夫遊故中朝名士多往依焉先生亦客其門會天兵南下民遷襄陽先生亦漂泊江漢間甲午楊侯彦誠被命招集三教醫卜等流一時士人皆得保其妻孥復還中國楊侯獨迎先生至燕遇眞常大宗師即北面事之執弟子禮居長春宫眞常遇之甚厚復以上世師祖本行屬之爲傳將藏諸祕笈以永其傳先生遂居萃玄堂研精致思旁求遠索紬繹而編輯之年四十餘以癸卯九月無疾而逝不浹旬而見夢於誠明張君其云爲款曲不異平昔少焉作詩而别云當時每恨花開早及看花開花已老花落花開能幾何回頭又見春光好詰旦誠明以所夢之詩白於眞常宗師眞常嘆曰予正仙矣聞者異之先生爲人性恬澹無機構廉潔貞介與人交悉待之以誠聞有道行者雖窮居陋巷必親之嗜讀書作文尤長於詩其五言雅淡有陶韋之風焉訥庵張先生事蹟先生諱本字敏之觀津人幼年與眞常李眞人爲同舍生初眞常之入道也先生以嗣續規之既知牢不可奪乃各言所志而訣貞祐二年先生中詞賦高第平生工於大篆及八分作詩殊有古意正大九年以翰林學士使北見留遂隱爲黄冠居燕京長春宫僅十年時眞常掌道教兄事如昔盡禮給養之後遊濟南翛然而化甘水仙源録卷之七
