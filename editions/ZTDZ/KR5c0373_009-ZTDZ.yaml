body:
  text: 夷門天樂道人李道謙集鄠縣秦渡鎭重修志道觀碑前鄂州教授雪溪逸人俞應卯撰祖師重陽以全眞名教者即無極之眞二五之精妙合而凝所以爲萬善之原也號之爲師之祖者蓋師道立則善人多善人多則朝廷正而天下治也道之體大而無外細而無内道之用無物不有無時不然不以堯而存不以桀而亡不以愚而不足不以賢而有餘何者蓋元氣敷施陽以剛之陰以柔之木金水火以布列之此氣也人得之所以爲人也太極渾浩健以行之順以立之仁義禮智以綱紀之此理也人得之所以爲道也乾父坤母既以五性之全一理之眞而賦之人而人不能全此眞者不爲嗜好奪之則爲强暴失之不爲名利汩之則爲忿慾亡之此眞之不能全則天下宜乎無善人無善人則國何由而治天下何由而平惟能全是道之眞者可以爲帝王師可以爲後世法推而行之則無非飲純飫朴之俗神而化之豈有茹名嗜利之風子雲昧此所以有事莽之污所以有投閣之駭子房識此所以成相漢之業所以成赤松之遊斯道也先天而天弗違後天而奉天時修之則吉悖之則凶信不誣矣惟黄帝師是道於廣成故垂衣裳而天下治舜受堯之天下師是道於巢許而萬國寧武丁學是道於甘盤而商中興苟非其人道不虚行且太上玄元生於三代之時嘗爲柱下史矣遇周室道衰不能推其所爲遂著道德之編以貽後世其曰道大而又曰王配天地之大豈不與吾夫子一王之法同其功乎南華眞人生於戰國之時嘗爲漆園吏矣因天下爭奪不能展其所行故寓其言於道以示諸人曰易以道陰陽春秋以道名分蓋亦與吾夫子尊王之心合其志也迨西漢之四皓以是道定國本之計於一言東漢之嚴光以是道契中興之主於平昔至於晋宋齊梁歷唐暨宋時雖不古而斯道自存如許旌陽葛勾漏陶隱居寇謙之司馬子微東華正陽純陽與夫希夷亦善推其所全之眞以及當時之君其正陽純陽陰陽不測之神至今常顯於寰宇之内故重陽祖師得以繼是道之正傳全一眞之妙理師本醴泉人也姓王氏於金朝初興之日舉進士中甲科人物魁梧天資秀偉方瞳熒熒美髯鬱鬱奈何道與時違故不以軒冕利禄縈其心常以水竹煙霞樂其志遂卜終南劉蔣而居焉一日遇鍾吕於甘河傳是道之妙訣以重陽爲號以嚞爲名於所居之室四隅各植海棠一株繼而策杖出關東歸海上有問其故則曰我向丘劉譚裏捉馬去人皆未諭其㫖未幾從游者七其所親侍者四馬鈺譚處端劉處玄丘處機是也號馬爲丹陽譚爲長眞劉爲長生丘爲長春西還抵汴遽謂門人曰東華鍾吕之約不敢愆期吾後事在劉蔣全眞之教汝輩當勉之言畢具湯沐奄然而逝汴之名公巨卿賢士大夫無有不赴弔者既而四師輦仙櫬以入關中遵遺命而葬劉蔣事畢將歸四宗師憩於秦渡鎭眞武堂茂樹之下彷徨然猶有慕師之戚執手分袂各述其所藴之志俱不負祖師之囑長春隱於太公之皤溪長生寓東周之瀍水長眞居水南之朝元惟丹陽反築室於場爲今之終南重陽萬壽宫也自是全眞之教漸興師宗之德益著於興定間有景慕四眞之事者依眞武堂經營宫室以奉香火恩例賜額爲志道觀值金祚將終民多凶暴觀宇灰燼恭惟大元聖文神武奄有四海生民綏定百廢俱興惟志道廢址尚存荆榛堙塞一日洞眞眞人于君道經秦渡載瞻故基慨然有過河洛思禹之心對羹墻見堯之感遂命門人駱志通鳩工事材構殿宇聚徒衆恢拓乎宗師之跡增光乎玄教之風使一祖四宗之德業爲可大可久之基豈不偉歟予於暇日倘徉琳宇間覽紀事於碣石者與道體往往相違是以慊焉一日志通表四眞之事跡丐予屬文紀述其事嘗觀太史公序九流之說儒與道特冠於衆流之上道之與儒同此一理儒之與道同此一機通其變則天下無弊法執其方則天下無善教若非圜機之士不足以論此也然教之在天下亦何常師之有且祖師以全眞名教者豈非吾儒眞實無妄之理乎其鍊形修性豈非大易窮神知化之妙乎方其護祖師之柩歸而克葬之後高弟能繼志述事者有之廬其墓側者有之於斯時也何異乎吾夫子殁而門人治任將歸相向而哭之意歟及其長春宗師被詔北庭而好生之德感動人主轉不殺之機於一言之頃於斯時也又何異乎吾孟子告時君不嗜殺人者能一之之仁歟由是觀之則祖師所修之道宗師所繼之志既可以帝王之取法則又足以致天下之治平大非秦皇漢武之時方士雜學之比亦非晨門荷篠之徒長沮桀溺之輩觀今日書同文車同軌四海之内晏然朝廷之政清肅然後知植海棠之意不誣於其先丘劉譚馬之事有驗於其後噫是道也自常情觀之神妙難測由至人守之不外乎一眞之理故全眞之教雖遺世獨立而尊君親上之心常存雖遐遯隱居而愛人利物之仁愈切即無思無爲之誠以顯其有感有應之理在宗師既能神知來而智藏往於門人又能繼其志而述其事豈不有補於聖明之朝乎非志於道其孰能與於此哉從而贊之曰道體渾浩兮無臭無聲陰陽肇判兮成象成形幽潜淪隱兮昇降八紘惟人爲貴兮萬物之靈原始要終兮故知死生嗜慾之汩沉兮出入莫測其心列仙之相傳兮抵欲全乎無極之眞不先覺於重陽兮孰開妙理於我人爲道之紀綱兮橐籥乎二五之精志道復古兮奂然而一新眞人常在兮道備而德純一祖四宗兮亘萬古以皆春燕京白雲觀處順堂會葬記寂通居士陳時可撰長春大宗師既仙去嗣其道者尹公乃易其宫之東甲第爲觀號曰白雲爲葬事張本也越明年三月朔召其徒而告之曰父師殯于葆光未安也吾將卜地白雲構堂其上而安厝之何如或曰工力非細道糧不足未易爲也公曰誠以孝思報德何患乎不成矧我父師遺德在人四方門弟子疇不追慕當自有贊成者公等勿疑縱復不然盡常住物給其費各操一瓢可也於是普請其衆以四月丁未除地建址越四日庚戌雲中河東道侣數百輩裹贏糧來助凡四旬成其堂制度雄麗榜之曰處順既祥奉仙骨以葬其歳月事跡已見于本行碑一日求予别爲之記將以諸方會葬者之名氏刻于石之陰以大其事余然之有笑而詰余者曰昔莊子之將死也弟子欲厚葬之莊子曰吾將以天地爲棺槨以日月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備耶弟子曰吾恐烏鳶之食夫子也曰在上爲烏鳶食在下爲螻蟻食奪彼與此何其偏也老聃之死也秦佚弔之三號而出曰適來夫子時也適去夫子順也安時而處順哀樂不能入也古者謂是帝之懸解道家者流學老聃者也今夫長春子之徒徒以處順名其堂而其師反眞之日相與嚴敦匠之事且嗷嗷然哭之其哀如是及至葬大備其禮四方來會之道俗逾萬人至有司衛之以甲兵其厚且侈又如是是豈老莊之意乎余應之曰以長春子之懸解其視生死如昨夢然豈有望於是哉但弟子戴師之恩不得不爾且所謂理事者若知之乎夫忘哀樂外形骸理也方外之聖賢自處如此至于送終追遠事也人間世之禮如此若泥於理而蔽於事得謂之囿乎吾書生也試以吾孔孟之道語若易曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過欲其甚大過厚也孟子之書有曰昔者孔子殁三年之外門人治任將歸入揖於子貢相向而哭皆失聲然後歸子貢反築室於場獨居三年然後歸不忘孔子也今也遊長春之門者既學其道矣能不以墨者之薄葬其師又將慎終追遠如子貢之徒何害爲達哉若以爲哭則害道也若嘗笑乎曰然笑與哭哀樂也而笑獨不害乎中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者在下之達道也苟哀樂中節又何害於道乎難者乃屈因書其事爲記且遺其徒以詩使歌以供師以見弟子思師之至師有德之至也其詞曰師乗雲兮帝之鄉蜕仙骨兮留葆光將葬兹兮啓玉棺貌如生兮髮膚完既更其衣兮又新其冠人所知兮其不朽所不知者兮不亡之壽師在天兮閲塵世有室輪囷兮可遊可憩師憐我勤兮時來歸跨鳳驂鸞兮匪鞭匪笞屋頭有山兮門臨風漪杖屨所經兮若或見之歆我兮祐我進殽蔬兮侍香火玄門之教兮師能弘國家崇尚兮子孫奉承我曹報德兮來者無怠暮禮朝叅兮敬之如在懷州清眞觀記新興元好問撰修武清眞觀在縣北全眞諸人爲長春丘公所建者大定初丘公自東萊入於關隱磻溪十數年不出天下以爲有道者興陵召赴闕取道山陽愛其風土之美徘徊乆之且謂其徒言在所道院武官爲之冠濱都次之聖水又次之若輩得居於此則與濱都聖水相甲乙矣諸人乃乞地於鄉豪馬子安而得之積以歲月廬舍乃具舍傍近出大泉溉田千畝稻塍蓮蕩東與蘇門接茂林脩竹往往而在太行諸峰壁立千仞雲煙朝暮使人顧揖不暇考之地志蓋晋諸賢之所樂而忘返處也大安初以恩例賜今名丘公命其高弟劉志敏來居聚徒至百人興定庚辰之兵觀毁正大辛卯志敏之徒泠德明復葺居之今所食亦千指矣余自大梁羈館聊城德明之法兄弟房志起介于幕府叅佐祁文舉郞文炳趙尚賓請予爲記泠與房道行清高皆喜從吾屬遊故爲次第之並著予所感焉蓋自神州陸沉之禍之後爲之教者獨全眞道而已嘗試言之聖人之憂天下後世深矣故爲之立四民建三綱五常士農工賈各有業父慈子孝兄友弟敬君臣嚴夫婦順各有守九官而有司徒仁義禮樂典章法度與爲士者共守之天下之人耕而食蚕而衣養生送死而無憾粲然而有文驩然而有恩於聖人之教也如饑之必食寒之必衣由身而家由家而達之天下四方由不可斯須離至百世千世萬世而不可變其是之謂教而道存乎其間傳有之天佑下民作之君作之師道之行與否皆屬之天今司徒之官與士之業廢者將三十年寒者不必衣饑者不必食乃不可以常理詰之者如皇極書所言王伯而降至於爲兵爲火爲血爲肉元元之厄適當斯時人情甚不美重爲風俗所移幸亂樂禍勇鬥而嗜殺其勢不自相魚肉未艾也丘公往年召對龍庭億兆之命懸于治國保民之一言雖馮瀛之悟遼主不是過天下之所以服其教者特以此耳今黄冠之人十分天下之二聲勢隆盛鼓動海嶽雖凶暴鷙悍甚愚無聞知之徒乆與俱化銜鋒茹毒遲回顧盻若有物掣之而不得逞父不能詔其子兄不能克其弟禮義無以制其本刑罰無以懲其末所謂全眞家者乃能救之蕩然大壞不收之後殺心熾然如大火聚力爲撲滅之嗚呼豈非天耶丁酉十二月有六日記衛州胙城縣靈虚觀碑翰林修撰郡人王惲撰衛之胙縣距城北墉有觀曰靈虚蓋玄微眞人大度師李公所建也門人奉教歳乆彌篤故殿堂像設廊廡齋室制不崇侈略潰於成初胙之割於滑也越金明昌間河改南道因入於衛貞祐南遷迫爲疆場建帥府統州治宿重兵繫浮梁阨爲京師北門歲壬辰金人撤守天兵徇取之明年京城大饑人相食出逃死求餔者日不下千數既抵河津人利其財賄率不時濟殍死風雪中及已濟而陷没者一日間亦無慮百數方草昧未判獨全眞教大行所在翕然從風雖彊梁跋扈性於嗜殺之徒率徼福避禍佩法號者皆是也時無欲子李公已在衛有日目其事愀然嘆曰厄會乃爾人發殺機復至於此耶吾拏舟而來本行化北遊兹焉不格安往而施其道哉遂税駕河上建此道場以爲神道設教之本於是玄風一扇比屋回心貪殘狠戾化而柔良津人跋俗悔過受教於門者肩相摩而踵相接矣凶焰燎原撲殺心於已熾慈航登岸夷天險爲坦途由是而觀非好生至德浹於人心者其能若是哉師二日晨起集大衆謂曰吾學道有年印於心者一與虚而已蓋生之所恃精與神也神之所安虚與靜也一則爲營魄之主虚則乃萬物之本故經云天得一以清地得一以寧神得一以靈致虚極守靜篤萬物並作吾以觀其復惟其虚則能靈靈則自虚矣且天地虚而發亭毓之妙日月虚而盪照臨之光山澤虚而蒸雲雷之變人心虚而爲萬物之靈致虚而要其極不過鍊精守寂滌情去慾而已因題其額曰靈虚二三子敬奉吾教且曰君子盛德容貌若愚今業漿之家十饋其八九吾不可乆於此明日遂行自是風聲教習洋溢於河朔矣師諱志遠秦原月山人年餘三十棄妻子入道師浮山碧虚子遂盡得眞傳深入性窟故爲大宗主推德主持玄教於終南祖庭者蓋有年矣生平以濟物爲本事具重陽宫碑兹不復云歲丙午詔大醮燕京師預焉上既受釐特加師玄微眞人號且膺寳冠霞帔之寵世以酒李先生行云甲寅春復以醮事赴召堂下眞人以是年夏六月羽化於燕之長春宫及西歸門人啓柩顔色如生越冬十有一月扶護至衛弟子王志安等以縗絰成禮哀號凝慕如喪考妣醮祭三晝夜而去禮也啓行有祥雲晻晻自東北來陰翳蓋如抵西南河堧而散是夜朔風震屋將濟即止船安如陸吁亦異哉中統五年春志安等圖爲不朽用昭師德遂以禮幣來謁曰先師行業杳乎難名教之所及師之所在也然過化存神之妙經度營建之始無文以詔來者責其誰歸吾子方有志圖經鄉枌盛事幸爲我樂道之敢再拜以請僕儒家者流道不同不相爲謀獨嘉其尊師重教窮源務本篤信有如此者故即其說而爲次第云且全眞爲教始以修眞絶俗遠引高蹈滅景山林如標枝野鹿漠然不與世接果哉末之難矣終之混跡人間蟬蜕泥滓以兼善濟物爲日用之方豈以道眞治身以緒餘爲國以土苴治天下乎不然天命之性有物有則彝倫一叙終不得而弊之耶如長春眞人丘公在先朝時皇帝清問首以治國保民爲本其利亦云博哉今觀玄微眞人度師李公出處行己若易地則皆然爾於是乎書且爲門人作詩追遠仙遊以極奔逸絶塵之想渺渺帝鄉乗白雲而何在依依玄鶴抱黄石以空悲其辭曰道之大原出於天柱史首探玄中玄後人依假土苴傳騰口取説書百千祈禳服食金鼎鉛樓居紫清致神仙全眞獨抉龜玉筌徑以方寸爲福田七子大鑿疏河源龍章鳳質炳後先風聲波動東海堧眞人躍出原月山天禀至性虚靜專一物不獲乃我愆黄流汹汹翻䲔鱣貪噬不已垂饑涎汴人脫死常膠船葬之爾腹誠可冤先生有道光日躔手拂醉袖敗履穿䲔牙笑拔鬚爲編濁浪蹴破爲澄淵遺黎北渡賴以全功成不居世愈賢超出物表冥鴻翻千年喬木鬱紫煙以靈揭宫含至言頭頭具道道眼圓伐柯睨柯開蒙顓門人奉行周且旋如入鄭圃居漆園至今遺照無徼邊皎焉靈臺霜月懸黄鶴一去不復還終南太華空巍然金華元精萬古縁吁嗟世盲誰與痊山中瑶草空芊芊何時眞遊來羽軒赤霄望入崑崙巓我詩刻石不可諼用作華表歸來篇鄧州重陽觀記鄭亭麻九疇撰夫李以冬實尼父書以爲異梨以秋花景佺引以自咎今榜觀以重陽李梨之類乎非也蓋物當落而再華者異乎天者也人已漓而再樸者同乎天者也同乎天者爲天道異乎天者爲人道夫天以氣論人以神論神得之於天神猶氣也天本陽肅物則爲陰矣人本陽接物則爲陰矣天雖暫陰俄反乎陽故天能常天人一逐陰而陽終不復故人不能常神且夫霜之落木曾幾旦晝而陽氣生於黄泉與夫人之大樸已散而放遯自若者豈不大異人能再樸如大凝而霆大昧而暾是則榜觀以重陽者其有以警夫柱下之門者乎柱下以樸爲陽故其言曰復歸於樸後世方士之談不與柱下合舍道而修術故以樸爲陽之説遂泯人之生也樸九而漓一則孩漓九而樸一則殆柱下之學其嬰兒之未孩乎樸非愚也樸猶素也未敗於五色樸猶淡也未爽於五味此冲陽之陽也苟舍是而求陽擊鼓而求亡子者也求陽以樸終南王重陽豈其人耶予不知其何如人見其門弟子曰王重陽諱喆字知明重陽其號也有文武藝當廢齊阜昌間脱落功名日酣於酒歳四十有八遇二異人得證玄理彌復跌宕東邁瀕海從遊者衆既而蜕于汴梁今鄧之鎭防營偏校王立登之蓬萊人幼嘗受誨於其徒自執干戈以衛邊藩蓋數十年今老矣思昔玄言樂於恬退家之南有柱下古祠剪荆築垣乃建斯觀以重陽之門人王道賢韓鍊眞劉志剛住持之蒙國朝恩例得請其額仍其師之號以榜之其椽甓像器蔬畦佃具工役之費凡二萬鏹皆王立爲之一日託其同門于志慧吴通温持予故人王萬山書求子文諸石既不能拒乃取柱下以樸爲陽之意以警之且爲之銘曰樸爲氣母基無形無形之中陽所冥自從六鑿鑿竅成遂使晦魄蝕陽晶何曾一刻收心兵蕉顚鹿倒醒未醒玄珠不覺沉滄溟誰能却作抱中嬰力挽蒼龍還太清粤有畸人黜聰明獨騎元氣朝神京絳霄下瞰潢與星豈有微坌干宫庭陽之重兮大樸盈後嗣作觀師其名嗟我有言空籟鳴無言之言乃眞銘燕京剏建玉清觀碑雲夢趙復撰一介之士苟存心於愛物則於人必有所濟古之君子抱負道德不幸而不得有爲於時猶當行之一邑一鄉以盡己之職分逮其必不得已則以活人爲己任昔陸宣公以仁義之學輔德宗晩貶忠州闢甕牖終日端坐其中書本草製藥物以惠州閭之有疢疾者故叅政范文正公嘗言達願爲帝王師窮願爲良醫仁者以經濟民物爲心蓋未嘗必天下以不遇而遂忘之也燕有隱君子姓馬氏名天麟字君瑞志希其法名也世居上谷之德興自其父祖以上皆以醫學起家而潜德不耀初金國大定明昌中經理北邊桓州開大元師府公之父以醫從行公時年幾冠由曉女眞言擢帥府譯史歷仕諸師皆以幹濟稱積十餘年秩滿罷歸貞祐甲戌杖策渡河校功幕府有司覈按舊蹟補亳州衛眞縣酒稅監滿即投檄不仕居許汴間與里人冲虚大師李公有舊常往來京城之丹陽觀且日與名士大夫遊正大壬辰國破公自許昌挺身北渡抵燕遂納拜於洞眞于眞人爲受業師公既與世不偶乃北踰居庸涉武川乞食昌州境中見營幕錯居感疾者衆類乏醫療公慨念疇昔即發其所祕三折肱之藝煮散餌之病者四起會那演相公避暑嶺外嬰酒積癥病卧帳中命公視之一劑立愈忻然握手相得如平生懽因聯騎南下禮清和老師得印號清夷子公既歸燕直相府之東通衢之北百步而近曰甘泉坊有東嶽行祠居人奉事惟謹及公至虚席請居之因並施焉既又斥地得數畝薙草攦薉延袤如度售材陶甓創建爲玉清觀棲泊道流館穀諸方蓋燕距昌千有余里公夏時而往比秋而還歲卒爲常其所遊者皆名王貴人凡醫術所燼悉歸常住一物不留私囊中那演暨其弟三相公素服公廉靜寡欲咸加禮重常似助其所不給及南庵庵主李公志玄者復相與經營宣力甚多已署正殿四楹將立元始像齋堂寢室可食可居庖湢蔬井可濯可溉高明爽塏魚貫順序焚香燕處希夷無爲以祖述黄老而憲章莊列公之志願能事畢矣公雅與太一知宫李公志通及丹陽大師劉公志安道同德合爲方外采眞之遊一日無故而疾作嘗謂二公曰余年逾從心大期斯迫與公等交遊三十年蹤跡半天下區區營巢一枝者將爲度師眞人諸上足傳道之地耳門人法屬未有畀付玉清後事欲勒諸堅珉以垂不朽幸卒勉之既稽諸宿論僉謂宜允公性資慷慨豁落無隱恭謹博愛輕財好施自從事冠裳律己嚴甚恪守師訓刳形待物昌州當馹騎孔道每歲掌教眞常眞人北觀天庭公必先事經理纖悉備具罔有闕遺則公之用力於斯道可謂廑矣故備術其平生始末而系之以銘其辭曰太虚無形玉清無色道斯强名化寧有極恭皇於穆象帝之先翬飛輪奂棟宇森然黝甓山升梓材魚貫爲國表儀視民容觀翼翼相府維護維呵兟兟有侣宣力孔多得一以盈緒於土苴修之乃眞以福天下污隆既異懷卷無方經生起死折肱之良我闢玄宫以閲衆甫博大宗師神明爲伍西山之東東山之西勒此銘詩爲天下谿德興府秋陽觀碑澶淵張本撰大朝庚辰歲長春眞人丘公卧雲海上以眞風玄行聞於輦轂天子賜近臣金虎符齎手詔來聘仍命使軺所歷聽便宜行事太守郊迎縣令前驅馹馳數萬里以甲騎五百擁衛其行既蒙入見扈從日乆從容賜還衛送之制一如初命將抵燕山駐車於德興且寬跋涉之役也懷來之野積歲連兵遺骨暴露大翮山之羽士韓志久斂而瘞之方修黄籙之祀再拜懇公來尸其事靈應之徵青鸞尋儀山市爲見既竟杖登乎大翮之陽覽山川之勝南望晋山下瞰沃壤極目砥平仰見居庸亂峰仞聳蒸嵐鬱黛如雲軿千乗旌影磨空將會蓬瀛而東背視大翮一帶諸山煙霏林纈蒼翠間錯如張百幅錦屏於葛稚川之居左右兩峰葱翠峭出如碧幢對侍肅肅然聽有所止作山半一泉佶曲而下如玉龍收雨蜿蜿蜒蜒而自容與也公乃停覽倚杖而嘆曰巖壑之僻如此林泉之佳如彼市朝騰沸而莫能干輪蹄旁午而不相及此非洞天之杳杳乎時暑方收秋露甫降千英舍實萬葉翻光炎曦再麗於西成之隙此非秋陽之杲杲乎吾將以仙居搆此山以秋陽名此居來汝志乆其爲我成之羽士既諾而退曰秋陽之見於書者曾子嘗言之矣蘇子亦賦之矣吾師復以此名吾觀者豈非其意欲令我輩内行肅肅如秋之清外貌融融如陽之和二理相涵庶乎道家者流之能事畢矣羽士既服厥命以虚接物以嚴律己披榛伐木陶甓購工親歷艱險雖頃刻之間不敢優游脇沾於席既盈十霜起三清正殿七眞殿兩廡東西方丈中外二門翬飛焕然至於賓館雲庵泉厨蔬圃凡所區處莫不適宜玄鶴朝來白雲夜集棟宇幽敞花木秀陰小有洞中之一天也居徒嘗至七百餘指歲種白糧奉御膳一車入貢以爲常觀其規模創制章章悉備羽士志尚亦可見於兹矣以幣走燕京謁文於僕曰惟先師之志惟小子罔克自度以承之數載於此若履春冰若奉槃水惴惴然惟恐荒墜厥命今其克保厥終惟師之精爽在天無遺其羞先生蓋嘗侍翰林必世之善爲辭令者所言足以傳世幸賜之文以庇我後人圖惟兹不朽也僕亦佳羽士出自燕山韓氏韓實聞族能遽釋於膠以履百艱成其師之志亦可尚也系之以辭曰蓬壺匪遥或寓於塵有發其潜須偶至人大翮之墟萬山鱗鱗朝挹清泉夜宿白雲云何代邈寂爾無聞豈彼開泰亦有其辰誰知秋陽宜俟長春一入品題倍出精神煙嵐改色花木生薰殿宇崛起丈廡區分居能倡玄靜可安仁尺材心計塊石手親非彼羽衣自樂百勤師所志之亦我其伸惟乆則弊匪增莫新尚告將來視此刻文創建眞常觀記翰林學士嘉議大夫知制誥兼修國史王磐撰眞常觀長春宫之别院也眞常李公所創因以名之初宫之西正與朝元閣相直可一里所有廢地一區荆棘瓦礫翳蔽封塞蓋兵火之餘户口稀少居人惡其荒僻無鄰莫肯居焉一日眞常杖屨偶過其處披荆棘躡瓦礫登北阜之上周覽四顧徘徊久之謂從者曰此可居也吾他日得謝事將憩老於兹焉暇日稍稍芟除荆棘輦去瓦礫發地而土壤膏腴鑿井而水泉甘冽遂葺治蔬圃種藝雜木版築斧斤之工未嘗施設而道宫琳宇幽棲高隱之氣象已班班於目中矣及眞常棄世誠明張眞人嗣掌玄教繼眞常遺意搆三清殿九眞堂齋堂厨舍祈眞之壇靈官之祠又搆環堵靜位十餘所以居宫中年德尊高不任事役喜修習靜功者誠明棄世後數年提點冉志誠文侍李志恒等一日會坐堂上顧瞻棟宇之高爽歷覽園圃之清幽相與言曰剪荆棘除瓦礫取衆人之所棄以開勝境者眞常李公之高識也鳩工役庀林用繼先師之遺意以集盛縁者誠明張公之仁心也吾儕託先師之餘陰無所營爲而坐享成功不可使二賢師之善事泯滅無聞也當伐石爲記以傳不朽遂以立觀事跡來求文余曰論事而觀其跡不若遺跡而求其理理得而事不隱矣夫道宫之有别院非以增添棟宇也非以崇飾壯麗也非以豐阜財産也非以資助遊觀也賢者懷高世之情抗遺俗之志道尊而物附德盛而人歸蓋欲高舉遠引而不可得遂焉故即此近便之地閑曠之墟以暫寄其山林棲遁之情耳南華有言聖人鶉居而鷇食夫鶉居者居無定處也鷇食者食不自營也今也掌玄教者蓋與古人不相侔矣居京師住持皇家香火焚修宫觀徒衆千百崇墉華棟連亘街衢京師居人數十萬户齋醮祈禳之事日來而無窮通顯士大夫洎豪家富室慶弔問遺往來之禮水流而不盡而又天下州郡黄冠羽士之流歳時叅請堂下者踵相接而未嘗絶也小闕其禮則疵釁生一不副其所望則怨懟作道宫雖名爲閑靜清高之地而實與一繁劇大官府無異焉故長春之有别院所以爲避喧撥冗之地也歟清心時來憩止退堂則永遂休閑此别院之所可貴可尚而不可無也老氏有云君子終日行不離輜重雖有榮觀燕處超然故别院者君子所以駐輜重而存燕處者歟若夫計地産之肥磽校棟宇之多寡如豪家大族增置財産以厚自封殖而務致富强則非賢者之用心矣予故表而出之至元乙亥歲秋七月十五日記大金陜州修靈虚觀記女几野人辛願撰興定紀號之三禩歲在己卯孟夏四月陜州靈虚觀道士辛姓而希聲其名者因寧海羽客于君揭其地圖及其建置行事之始終以來謁文於予曰希聲世籍河東爲平陽人自幼出家去鄉里遠遊叅九鼎鐵查山雲光洞體玄大師玉陽眞人爲道士頗窺至道之要大師諱處一姓王氏牟平人受道於祖師重陽眞人爲全眞高弟與丘劉譚馬孫郝諸大仙伯比肩知名自世宗皇帝暨章宗東海三朝仍皆蒙禮遇錫號賜服爲吾門光華年七十六厭世蛻形于東牟蓋三年於此矣平生唱道偈頌文字頗多已盡播四方好事之口獨所著五言長韻金丹詩訣一章希聲私藏甚久人無知者今希聲年且老託跡于陜乃與二三同志創兹一居奉爲十方同門往來遊憩膳宿之所載惟先師玄妙之文不可終祕不傳謹已刻石與天下後世修眞之士共之然不得妙於文辭者記其本末則一切曖昧猶不傳也竊聞吾子好爲古文多從方外遊敢敬以請予嘉其誠篤不可辭且必不得免乃不辭而爲之謹按道家源於黄帝老聃至列禦㓂莊周氏廓而大之乃與孔子之道並立爲教於天下而不廢蓋其一死生齋物我會群有於至虚而取其獨爲最妙者而其粃糠之餘猶降而爲天地神明内聖外王之業自司馬子長劉向葛洪之徒號稱閎博皆論著其美而不敢以小而世之昧者往往泥于糟粕以爲聃之書滅絶仁義禮樂不可以訓馴至晋梁君子清談亂國因以異端非聖詆之過矣竊嘗論之今所謂全眞氏雖爲近出大能備該黄帝老聃之藴然則涉世制行殊有可喜者其遜讓似儒其勤苦似墨其慈愛似佛至於塊守質朴澹無營爲則又類夫修混沌者異於畔岸以爲高黠滑以爲通詭誕以爲了驚聾眩瞽盗取聲利抗顔自得而不知愧恥者遠甚間有去此而即彼者皆自其人之無良非道之有不善也然則希聲圖創建立以待學者其意蓋亦出於如此故予有取於是而樂爲稱道庶將來聞其風遵其途以遊黄帝老聃之閫閾者知夫聖人道之大全固有所在不可滯乎一曲而已其觀之基址以畝計之者五而以置其地以承安之壬申聖堂厨所雲寮皆備具於三室而廣其制度不侈不陋是時兵餓方相仍故其措置大略如此其最竭力同事以興是役者武道堅希聲同郡而年甚先今老死已乆其費錢買額贊成之者李拯咸平人世爲宦族清修好道今方以材選爲令於杞于君名道顯淡守中皆與希聲同爲門人云甘水仙源録卷之九
