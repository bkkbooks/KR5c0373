front:
  text: 甘水仙源錄卷之五
  hash: sha256:30b7c480c3b6e6498ff1a0a48a6e9ef828d078568db2a5c97d5c50cd98c8ca5a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_YP-C_27yiji-02-0080a, image: JY295/27yiji-02-0080a.png}
body:
  text: 玄門掌教宗師誠明真人道行碑銘翰林學士嘉議大夫知制誥兼同修國史王磐撰師姓張氏諱志敬字義卿燕京安次人幼淸臞骨骼巉巖寡言笑不喜葷茹見道士輒懽喜迎接聞讀道經則諦聽不忍去父母相謂曰此兒其有方外之宿緣乎八𡻕送入長春宮禮真常李真人爲師給使左右朝夕未嘗離真常本儒者喜文學而師性敏悟善誦習工書翰又謹飭如成人故真常愛之特異恕齋王先生以詩名當世而淸高絶俗棲止道宮真常命師從之學方丈西有堂曰萃玄側有小樓積書萬卷人莫能到真常以鎖鑰付師恣所窺覽師資稟旣異所以涵養成就之者又有本源宜其所造超詣而不凡也甲寅𡻕以師提點教門事後兩年真常示化易簀之際眾以後事爲請真常曰志敬在諸君何慮焉哭臨旣畢眾環師而拜內外翕然欽服中統三年朝廷賜之制書其詞曰玄門掌教真人張志敬自童子身著道士服志行修潔問學淹該甫踰不惑之年純作難能之事增光前輩垂法後人可特賜號光先體道誠明真人尚服新恩益堅素守至元二年聖旨就長春宮建設金籙大醮三千六百分位行事之日有群鶴翔舞下掠壇墠去而復來者累日天子嘉之賜師金冠雲羅法服一襲仍命翰林詞臣作瑞應記刻之碑石嶽瀆廟貌罹金季兵火之餘率多摧毁內府出元寶鈔十萬緡付師雇工繕修師擇道門中廉潔有幹局者量工役多寡給以錢幣使各任其事或剷瓦礫而更造或補罅漏而增修凡再易寒暑四嶽一瀆五廟完成盡還舊觀方將礱磨貞石敘聖代尊崇祀典祇敬山川興壞起廢之盛美而師忽感微疾以至元七年冬十一月十有七日化享年五十有一京師士大夫遠方道俗奉香火致奠禮者填塞街陌累月不已噫全真之教以識心見性爲宗損己利物爲行不資參學不立文字自重陽王真人至李真常凡三傳學者漸知讀書不以文字爲障蔽及師掌教大暢玄旨然後學者皆知講論經典涵泳義理爲真實入門當嗣法之初先輩師德存者尚多師以晩進躐出其上中心不能無少望焉師德度深厚氣貌温和頽然處順不見涯涘疆悍者服其謙恭驕矜者慚其退讓故初雖少咈久乃怗然加以持身精謹遇物通方京師賢士大夫及四方賓客所與遊者靡不得其懽心至元九年三月三日葬五華山道院東襄事畢提點劉志㪟持行狀致嗣教真人王志坦之命來求文謹次第其行實之大略而繫之銘辭銘曰降衷秉彝同此天有生具足都渾全知誘物化中變遷大樸乃始淪虧偏爰有至人起秦川不修不爲口忘言希風遠曁東海壖一驅學者歸湻源流傳四葉道愈妍嗣教乃得誠明賢誠明早有靑霞志善根宿植資稟異髻了初入長春宮三千道流仰標致萃玄堂深人絶跡戢戢千函鎻幽祕師持管鑰恣披番萬卷汪洋在胸臆捷趍徑造浪苦辛博中得約道乃眞眞常門人徧天下齒尊緣熟非無人一朝順化拂衣去心傳密授惟師親將壇高築拜韓信千古盛事驚三軍學道由來在心悟行輩不拘年早暮羽服黃冠十萬餘趨走長春宮下路仙家閱世如流萍空裏浮雲聚散輕適向市朝觀物變忽乘鸞鶴上靑冥玉泉西北煙霞多五華山色高嵳峩飈馭一往同逝波長留仙骨埋山阿千秋風雨荒雲蘿墳前豐碑字不訛湛然子趙先生墓碑京兆路提舉學校官前進士孟攀鱗撰古之有道之士正直其心剛大其氣不爲世故所奪不爲人欲所雜利害憂樂不能惑得失寵辱不能動施於行業著絶俗之善形於言辭見軼眾之美在儒林作儒術之儀範居玄門立玄學之標準非心之正直氣之剛大涵養至到始終全道者其孰與於此哉湛然子趙先生諱九淵字幾道隴州人自幼出家禮丹陽大宗師天資高明德性純淑潔靜精微之理素所深究怪誕虛無之事未之或及知身以神爲主也故力於修鍊知道以文爲用也故寓於著述談不輕易所談必本於公論交不泛濫所交必取於端友至於一篇一詠一贈一答皆所以發揮玄旨暢敘幽情混元洙泗融爲同境由是道望崇重教風周廣於西土矣丁亥中翻然仙去凡爲門徒者久服心訓嗣法子趙公志沖追念先師傳授之恩恨無以報謹捨靜貲特置吉地起墳立石乃勒其文云玄黑戈閹茂𡻕閼逢攝提格月昭陽大淵獻日敬誌終南山靈虛觀冲虛大師呂君墓誌隴山湛然子趙九淵撰道家者流備眞功以光前人修實德以詔來世高蹈物表超出塵寰其亦絶類離倫之所爲乎偉矣哉全眞道教其來尚爾重陽祖師發其源繼有七眞暢其委接其武而開祖庭之基者誰歟冲虛大師呂君其首也君法諱道安家本甯海世爲巨室幼年穎悟志慕玄門仙風道骨稟於天眞功實德資於性善繼丹陽之志遠離東土之逕君也其出家之雄歟事師則夙夜匪懈立志則終始不渝故在祖庭四十餘年撑拄玄教光大前猷建堂殿潔壇場以嚴香火之奉步斗牛頤精神以成靜定之功修外養內積德累行其詔來世之規者何其博哉承安擾攘眞道否閉君也其中流之壺歟不降其志不屈其身回旣倒之瀾挽將傾之棟會玉陽眞人奉勅主掌教事君乃復構基址於是宣賜觀之號曰靈虛制授君之稱曰冲虛披戴門弟子三百餘人祖庭之教粲然復興矣𡻕在興定數絶塵緣一日屬門人以進道之語乃書頌云平生不解道詩篇鍬钁爲朋四十年稍通陰符三百字粗明道德五千言般般放下般般悟物物俱忘物物捐此去不遭閻老喚今朝唯待玉皇宣頌畢翛然羽化享春秋者八十噫嘻出家修道如呂君者信乎絶類離倫之流也已而其法弟畢知常安厝君之靈櫬於祖塋之北丐予爲誌以光潛德因摭其實而爲之記且繼之銘曰載惟呂公崑嵛秀鍾幼脫塵網早登道宮侍師惟謹接物惟恭立志立事有初有終不忝厥祖克修厥躬値厯道否挽回教風啟佑我後規恢實功制授徽號人欽德容大數適至塵緣頓空舟移夜壑珍藏里中揭諸貞石以熾無窮眞靜崔先生傳止軒杜仁傑撰先生姓崔氏諱道演字玄甫觀之修人眞靜其號也賦性雅質無俗韻長讀三教書洞曉大義識者以爲載道之器事父母以純孝聞廬墓三年去家爲道士師東海劉長生甚得其傳頃歸將陵之韋家墅下棲焉假醫術築所謂積善之基富貴者無所取貧窶者反多所給是以四遠無夭折人咸德之粗工王彰嫉甚必欲致之死地而後已一日與先生遇諸曠輒挽裂偃仆以塊封厥吻而去之彰以爲死矣少之復甦過者驚呌問狀曰我每疾作乃如是後亦不復介意居無何弟子劉志恒請布金山昊天觀居焉邊人楊涓畢琳意在有所詰期以仲冬來過是不至時大雨雪畢因擁帚家庭間獲片楮開看乃先生讓二子寒盟之章也復有橫山馬志定路志亨者事先生有日矣將去以詩爲贐扁諸所居之堂堂菑詩奄然在壁間如新染翰者其神異類此當貞祐之亂挺身南渡因僑鞏之純陽觀駐錫未幾屨滿戸外越興定辛巳八月二十九日端坐南向而逝俗壽八十有一凡先生平生所爲所行所得唯門人張志偉獨具其體云贊曰天下所貴乎得道之士者時其來順其去而已矣非直以乘雲氣跨箕尾解水火遺冠舄導以旛幢殿以聲樂然後以爲昇天之證吾讀列仙傳涉此說者甚多夫古之隱者深山窮谷中恬然委蛻千載而下不知幾千百人不幸不爲世所知至於泯滅而無所聞幸而爲好事者紀錄而又過神其事使後世不能盡信惜哉吾復揣隱者之心恐不如是其汲汲於駭一時之觀聽也如先生則不然不內不外非有非無吾以爲黃耶其教戒精嚴有過乎釋氏者吾以爲緇耶其業履忠孝又出乎先儒將前聖之萬法輒混而爲一區間者遺馬路以燎原之頌墮楊畢以雪庭之書聊遊戲乎三昧此亦豈先生之本心也歟要之以慈儉禮讓爲立身之本以詩書語孟爲教人之符及其逝也兀然端坐如宴居浩浩乎同造物者遊悠悠乎將元氣者與俱是以恩綸一出名隸淸都號曰眞靜不亦宜乎冲和真人潘公神道之碑翰林侍講學士少中大夫知制誥兼修國史徒單公履撰自黃帝問道於廣成而神仙之說始興老氏跨殷厯周以道德五千言推極要妙其教被於萬世降秦及漢代有顯人安期赤松張道陵之流或出而不晦或見而不常福奇之徵昭揭於世人之耳目者非一事也涉魏晋隋唐以來蜕跡闤囂凝神碧落者其名不可殫紀至於協陰陽之祕幻集靈異之大成微而草野鄙人幽而深閨稚女一聆其名知其爲列仙者唐吕純陽一人而已盛矣哉其傳之也全眞之教蓋發源於此其流逮於金初祖師王公倡之於前七眞繼起於後而道大行矣惟邱公起東海之濱玄教眞風彌漫洋溢其高弟一十八人世稱爲十八大士者師其一也師姓潘氏諱德冲字仲和冲和其號也淄之齋東人家世業農大父秉政適大安兵興超家爲軍都統戍萊州父楫字濟之以儒爲業辟充益都府學教授世父澤民萊州節度判官自高祖以上及於師九世同居家素饒財嘗遇𡻕凶發粟賑飢民賴以全活者甚衆鄉閭有貧者卽假貸之不責其償其樂施如此一日有術士過其家語之曰是家有陰德必獲陽報當生異子初師之母王氏嘗夢有祥雲入室覆其身良久乃去自爾有娠妊十九月師乃生七𡻕不能言其父憂之忽有一道者來乞食父延之入門問所從來云自東海將適長安師卽從傍與之語慶答如流父駭愕道者曰是子神韻冲粹非凡兒也異日當爲人天師宜善鞠之自此遂能言後稍長警悟敏慧常人莫及讀書日記千餘言後聞父母欲爲娶妻遂宵遁卽往棲霞濱都觀道過濰陽時淸和眞人住持玉淸宫問所適知其將詣長春乃引見焉自是服膺問道得傳心之要長春委師以焚修之事至其暇日則默坐靜室中凝神滌慮物我兩忘一歸於要妙幽玄之境如是者十餘年太祖聖武皇帝親征西域聞長春之名遣仲録劉君齎詔詣海上超之乃從長春西覲風沙萬里不以爲勞也還燕之三年長春仙去眞人尹公嗣法命充燕京都道録兼領宫事眞常復總玄機注倚尤深燕去和林數千里朝覲往返凡十有三供擬之費皆倚辦於師一無所闕所以玄教眞風恢張誕布薄海内外無所不至者師與有力焉師之内誠外方各有所任道並行而不相悖者又可見於此𡻕乙未平遥官長梁公偕同僚懇疏請淸和眞人重修興國觀眞人命師往甫踰年撤其舊而新之壬寅署師諸路道教都提舉仍兼本路道録甲辰河東水樂祠堂災祠蓋吕純陽之仙蹟也朝議以爲純陽之顯道如此祠而祀之事涉簡陋可改爲純陽萬壽宫命李眞常遴選道望隆盛人所具瞻者崇建焉先是長春自西域囘抵蓋里泊夜與諸門弟子談語次謂師曰汝緣他年當在西南此時永樂吾道矣至是眞常泊淸和二宗師集衆言曰純陽吾教之祖也今朝廷崇飭如此孰可任其事者衆以師德望幹才綽有餘裕卽欲堪其役無踰於師况長春蓋里泊之言已嘗命之矣乃署師爲河東南北兩路道教都提點命往營之師率其徒至永樂百工勸緣源源而來如子之趨父事陶甓伐木雲集川流於是略基址度遠邇程功能平枝榦合事庀徒百堵皆作不數稔新宮告成堂殿廊廡齋厨廐庫下至於寮舍湢浴之屬各有位置莫不煥然一新北踰一舍有山曰九峯土人云此純陽得道處也遣其徒劉若水起純陽上宮及於宮側剏下院十餘區市良田竹𥯤及蔬圃果園舟車碾磑𡻕充常住百色之費至於四方賓侶過謁宮下者周爰四顧見其嚴飭壯盛儼敬之心油然而生夫撤祠宇而爲宮庭其崇卑相去奚啻萬萬然於純陽之本眞何加損益但致飭之道斯其行者遠矣而人之觀感異焉此象教所以不可廢於後世聳天下耳目於見聞之際而絶其褻易之心嚴乎外者所以佐乎內象之所以崇者道之所以尊也由是言之師之恢大盛緣作新崇構豈徒以誇其壯麗也哉己酉秋中宮懿旨凡海嶽靈山及玄教師堂遣近侍護師悉降香以禮之乃增葺濰陽玉淸宮至崑嵛山麻姑洞取厯代誥冊刋之石以彰靈蹟壬子夏四月真常因奉朝命祀嶽瀆過永樂見其規模宏敞喜謂師曰非師不能畢此勝緣乃傾帑以助其經費明旦與師同躋九峯之巓見其秀拔如椅遂易其名曰玉椅峯甲寅春聖天子在藩邸命設普天醮於長春宮於是召四方羽侶道行淸高者畢集師首與其選致彩雲鸞鶴之瑞眞常曰此瑞公適當之遂以淸和眞人所遺金冠錦服爲贈事畢還永樂丙辰夏四月適上宮至五月朔旦忽謂左右曰吾幼遇長春師授以祕傳終身誦之粗有所得繼而淸和眞常以純陽師祖世緣見付吾比年經營略有次第今世緣道念亦庶幾兼修而並舉無復事矣吾其行乎眾不知所謂二十六日將返下宮時方盛夏畏日載途從者咸以爲病師曰汝眾弟行無傷也忽陰霧四合抵下宮四十餘里人不知暑此尤可訝初純陽殿前有古柿二本根𠏉盤錯枝葉茂盛一夕無風自折眾方驚悟曰此柿無風而折可謂大異吾師前日之言其兆於此矣是夜二更將盡師忽扶杖而出面四方誦咒語隨卽以灰摻之露坐移時若有所待尋復入以湯頮其面卽易衣索筆書頌一篇旣畢乃就枕翛然而逝春秋六十有六門人奔訃於掌教誠明眞人遣提點孟公賻賵甚厚庚申歲三月初五日葬於宮之乾位仍建別祠令嗣事者以奉𡻕時香火報本反始之道也旣而誠明疏師之德上於朝賜冲和微妙眞人之號師性資仁裕戒履修潔雖居道流然樂善好施中條東西居民每𡻕初或有貸粟於宮者數踰千石適時凶荒道侶不贍眾議欲徵之師曰𡻕荒人飢奪彼與此是豈仁人之用心哉負者聞而德之後每於純陽誕日相率設會獻香資以致報𡻕以爲常癸丑春旱總管徐德祿拉諸耆老禱於師師爲誦靈寶經不旬日致甘澍盈尺師嘗居九峯純陽上宮又號九峯老人門人三宮提點淵靜大師劉若水乃於師誦經處築臺志之曰九峯老人誦經臺因狀其行付提點純陽萬壽宮事文志通自永樂走燕凡二千里拉知宮劉志復詣予而言曰師之道行如此然神隧之石未有所紀敢請予以不敏辭凡四五往返請益堅予以志通尊其師也篤而託於予也專是可嘉已乃爲述其始終而次第之因系之以說焉夫道之爲教尚矣小而始於鍊度之微大而極於性命之奧無非事者至於營葺宮宇惠鮮貧乏此但觸物應緣隨感而動勞而不有施而不報特神化之糟粕耳非師之至也與接爲構紛紛擾擾殆多事矣然遊神於淡合氣於漠超然獨觀以自出於塵境之外者彼何足土苴芥蔕乎其間也耶故自從師海上締構諸方跡與世俱道隨神運固未嘗一日不接於事爲亦未嘗一日不在乎悠然泊然之中也世徒見師之揆日作室不少輟於斯須之頃以爲若是而止耳豈知至人循其故然無所事事寂感一致虛中泛應之心跡也哉道一而已自隨其所見而名之者蓋不止於一而已也試以四者言之曰微曰妙曰玄曰通謂之微者以其杳冥恍惚不可爲象者也謂之妙者以其變化不測莫知所以然也玄者深而不可探也通者其化無不徧也模狀形容固亦至矣然智者之智仁者之仁雖所見殊方會歸則一亦豈有二本哉渾淪圓周無所玷缺在山滿山在河滿河道之全也極六合之內外盡萬物之洪纖雖神變無方而莫非實理道之眞也由是而爲命由是而爲性由是而爲心又由是而之於情或源也或委也引而伸之亦將何有不全何有不眞者乎然則全也眞也一而二二而一者也其萬化之本根一元之統體歟長春之傳於師者蓋如此師則有以推而廣之是可銘也銘曰渾淪妙理含元精先天後天無壞成一真融冶儲萬形繄誰不足誰奇贏于于天樂誠難名無何七鑿情竇萌以智相軋機相傾紛然百僞無一誠風頽俗靡三千齡何人椅挈還大庭豈謂否極時方亨粵有奇人悼含靈因心悟理開聵盲爾全爾眞性爾情若醉而醒昏而酲六塵瑩徹神珠明維師啟鑰通玄扃十年動息靜不凝外營擾擾中常甯功成羽化何冷冷乘風萬里遊太淸俯視八極塵冥冥中條之山鬱葱青黃流宛轉相抱縈紀師盛德存吾銘無爲抱道素德眞人夏公道行碑記紫微野人姬志眞撰公姓夏諱志誠號淸貧道人濟南章邱人世本農家以積善稱於鄉里非義不爲厯祖宗未嘗有及公訟之門者蓋以分守傳家焉父珍有三子公其長也生而簡靜體貌魁偉賦性㪟厚希言笑自髫齓便有方外之志甫弱冠不願有室常以生死性命事爲虞俟二弟成人俱爲之婚姻教以奉養二嚴自求出家人初不之許泰和改元公固辭父母亦知不能奪其志從之徑詣棲霞太虛觀師體長春宗師參求玄理遂親炙左右得一善則服膺朝夕不替公不讀世間書然進修道德之語日記千言恒若不識不知者但躬勤庶務而已蓋行眾人之所難爲也貞祐中四夷雲擾有大寇據海州州之道眾無計可出宗師命公往救之卽不辭而去旣至方便援引獲免者甚眾觀其從命專直雖經虎兕甲兵而無所避忌蓋敬信之心致一也己卯國朝遣使召宗師公亦從北行居延沙漠迢遞數萬里眾有倦行役者公以已乘之騎付之而自徒步蓋苦已利他之行如此也及行在居無幾復從宗師還燕肇闢玄門眞風大振遠近炷香參謁者如市公有所得珍玩財賄雖過目不問其所以人求則與之而無恡宗師以公愿慤命主玉虛觀事不數𡻕還宮曳杖拂袖而來囊橐俱棄蓋不以物介意也復命主白雲觀事公率眾勉力皆服其德丁亥秋七月宗師厭世繼而淸和主盟玄教壬辰以公提點長春宮事雜處稠人未嘗有尊大之心無問則終日不語有問則怡然而應惟勸人行道而已其在紛紜曹雜中不擇乞兒皂隸及門弟之末行者雖狂童對坐爾汝談笑與貴戚大人不分等類蓋其心無彼此也壬寅秋領宮事已十餘年以老乞閑眾猶戀之不已固辭方免雖退居閑處云爲普請則以身先之蓋忘我之至也在宗師左右始終恒若一日其事上之心無時少替常危坐終日介然如石雖對喧悖淆混若無聞見如土木偶其不識者目以爲愚或叩以方外先天之說厯厯皆明其要而未之嘗言蓋涵養深厚攖而能甯者也詳夫莅事則專行身則真視財則疎處眾則寬奉上則敬接人則誠一皆出於道德之純正戊申掌教眞常眞人以恩例授無爲抱道素德淸虛大師兼賜金冠錦服公乙卯年八月初六日化享年八十三門人奉其衣冠葬於五華之仙塋禮也辛酉王庭嘉其德遣使持旨追贈今號予嘗試論之昔田子方之師曰東郭順子其爲人也眞人貌而天虛緣而葆眞淸而容物物無道正容以悟之使人之意也消而田子方未嘗譽之以其德之難言也素德眞人若東郭之爲人何如是之同也原自弱冠以迄於終身步趨玄域而無一毫利欲之私至於以身率物未嘗詰責傷割於彼其專心致志內不失己外不失物往來塵境幻化之間而無礙所謂人貌而天淸而容物者宜矣至論公行無妄跡言無愧辭手橈指顧無不任眞語默作止無不從實此皆以跡求之而已其在玄門六十餘年有所密受於眞師者未易以示人所謂聖智造迷鬼神莫測之事將與天地相終始矣是豈輿人所得而輕議哉後之人聞公淸靜眞實平澹之風勉而效之未有放其心而不復者久而肖焉與道幾矣中統閼逢困㪟姑洗旣望謹齋沐頓首勉爲誌云冲虛大師于公墓碣銘太原李鼎撰師姓于名志可字顯道冲虛其號也甯海人漢高門于公之後父諱江子六人師其幼也雅好淡淨齠齓有出塵之志承安初長生劉眞人以道接人於武官師聞之往焉於顧盻之間似有所契雖爲父兄約制不得卽從之長往而默相感召之機已動而不能自止矣年甫十九乃决意往事之席下居無幾長生歸眞遂求法於長春宗師宗師知其爲受道器乃授之師旣得法因服炊爨之役十餘年期服厚德時亦以嚴潔見稱後從宗師應詔回處燕京大長春宮宗師仙去淸和眞人嗣教乃命提點本宮事六年常住物業有增益而無廢壞上下協穆內外甯謐如空冥中有扶持之者後以老得閑至乙卯春二月庚午朏越五日甲戌託以微疾歛息曲肱安然順化於白雲觀寢室中葬之五華之眾仙塋春秋七十有一眾耆宿相與言曰此老自宗師仙去之後受淸和眞常二大宗師託以提點宮門事如彼其久當時常日用度或出或納物之充溢流轉於前者可勝計耶及兹小歛之際一衲一袍之外無長物可稱者一也又從在道門以來五十餘年衣不解帶脇不沾席可稱者二也其臨化之時門人問及喪葬安措事乃拒之曰吾將往矣淸濁各有所歸兹一聚塵沉焚露瘞無所不可又何足問任爾所爲可稱者三也至如其餘於語默動靜之間謙柔誠敬之德日積月累見之於所行者多矣不必徧舉姑以兹三事占之明見善守其傳之於師者精確純正而外物不能溷也乃曁門弟子眾人等謀爲不朽計狀其師平昔所行之大槪請文於予將刻之石子亦重師之有道乃因其實而編次之屬之以銘曰萬善之美藏之於誠何以占之觀其所行五十餘年脇不沾席胡不少轉我心匪石財貨泉如人事絲如胡不少溷我心本虛曲肱歛息不昧所得今果何存溪聲山色假者見假眞者見眞吾玄門中偉哉若人耆宿門弟謀不朽計刻此銘辭昭示後世玄門弘教白雲眞人綦公道行碑京兆府學教授少華李庭撰書曰吉人爲善惟日不足謂心無所爲而爲之也易曰積善之家必有餘慶謂天無不報也夫人有奇偉卓絶之行而不得享樂於其身者必有其子孫竊觀白雲眞人綦公之父修仁行義孜孜不懈其於賑貧周急若飮食然勤亦至矣是以上天降監挺生善人仍命仙眞周旋誘掖卒使蟬蛻污濁之中坐享淸淨之福者垂五十年所謂有積於冥冥獲報於昭昭者甯不信歟公諱志遠字子玄萊州掖縣人高祖元亨嘗厯官至安化軍節度使曾祖貞祖得中皆雅志邱園潛德不耀父遵性明毅慷慨胸次洞然無畦畛初綦氏世爲著姓宗族嘗至萬指中有孤惸其征徭不能力給者皆身任之事旣濟未嘗纖毫有德色里中人有以飛語被繫有司者義其無辜卽爲代之在囹圄中復能以恩信感動獄吏因縱其出入凡獄之𡨚者多從容設策理出之未幾已亦以恩獲免大定丁亥重陽祖師挈諸師眞西遊乃館穀于其家因語之曰汝將來必有一子爲羽衣遂卽其里建龍翔觀朝夕香火敬奉天眞泰和乙丑𡻕飢民有菜色因發私廪爲粥以給之賴以全活者甚眾癸酉兵凶之後遺骸徧野親犯寒苦悉以收瘞數獲遺物甚腆必伺其主而歸之無則皆散之以周不給母張氏亦有淑德事舅姑以敬願稱旣而生公氣質沉厚寡言笑舉止不凡至十五𡻕嘗使之學辭曰性非所好乃所願則神仙輕舉之事父母欲力奪之卽屏居一室自潔其形祖師先見之明於斯驗矣乃辭家禮長春大宗師邱公爲師戊寅奉宗師教住持萊州昊天觀大元龍興太祖聖武皇帝天資仁聖志慕玄風己卯冬遣近臣劉仲祿齎手詔駕安車東抵海濱就徵宗師明年春啟行仍率高第弟子一十八人與之偕公卽其一也當時櫛風沐雨胼手胝足跋涉數萬里見上於西域雪山之陽因承虛己之問乃答以民爲邦本本固邦甯既來之卽安之此濟世之要術也是言旣奏深契上心玉音奬諭惟恨相見之晩因被旨佩虎符宗主天下道流比回駐車金山之巓顧謂淸和尹公曰綦公從我以來山行水宿日益恭敬可謂勤矣觀其氣象將來弘吾教者必斯人矣尹公曰然至燕宗師住持太極宮尋改大長春宮委公總知宮門事授淸眞大師號洎以助國救民經籙付之度道士呉志決等以備灑掃宗師旣仙去遺命淸和嗣教門事公左右維持終始未嘗怠甲午春淸和委以山東諸路行緣所至老師宿德望風迎迓輦粟帛委堂下者動以千計非誠心妙行有以動人悟物能若是乎戊戌春太宗英文皇帝詔選高道從掌教眞常李公被詔赴闕是𡻕冬奉旨輔洞眞于公偕無欲李公復立終南祖庭提點陜西教事庚子春遂入長安從府僚之請也建立大玄都萬壽宮若驪山之白鹿終南之太一樊川之白雲鳳棲原之長生藍田之金山皆斥其舊而新之其餘宮觀修廢補弊不可殫紀秋太傅移刺公總管田侯各差官從公持疏詣燕邀請淸和大葬祖師旣畢甲辰春先鋒使夾谷公祖庭設羅天大醮禮請于洞眞宋披雲薛太霞洎公與李無欲共成五位眞人攝行醮事會皇子永昌王遣使趙崇簡設金籙大醮爲國祈祥遂復同諸公莅事觀其進奏精嚴靈異昭著使回具啟其事因引見待之敬禮甚厚進與醮五眞人徽號公例加玄門弘教白雲眞人丁未冬太傅移刺公就佑德觀設黃籙大醮臨壇仆體者百餘人戊申春皇太后遣使楊仲明齎旨寵錫金符冠服仍命領職如故辛亥𡻕夏憲宗皇帝即位遣使唐古出持璽晝宣諭倚付掌管關中道教癸丑皇太弟遣使脫懼馳驛諭旨待以師禮乙卯六月無疾晨興忽集眾謂門人申志信曰吾將行矣汝當嗣吾職主張後事仍命經營喪具至七月二十四日順化而終享年六十有六明年改葬於祖庭西北隅仙塋之次己未冬門人將樹碑志信偕本宮提舉郭德山李志希等狀其行實來謁文於庭辭再三不獲已謹次序其事按公之爲人恂恂謙退似不能言至論及救時利物之事屹然山立辭色俱厲言必有據眾皆心服以是宗師獨爲倚重及來關中道價日益隆尋常以恬淡自持未嘗出怪誕之語以誘愚俗一時達官聞人翕然歸仰四方學徒不可勝數故能名動闕庭叠蒙奬賚非踐履純實何以及此今夫世之人所以陷溺其心者欲與利耳而公能斷然絶之其視財貨不啻若涕唾然蓋其天姿過人遠甚故碑之無疑仍繫之以銘曰綦爲著姓居海濱兮世載潛德生哲人兮天與之性含元湻兮不雕不飾全其眞兮有來提警繄長春兮玄言祕訣授受親兮刳心去智專精神兮始終一節無緇磷兮聖皇嚮道起隱淪兮萬里逐師謁紫宸兮一言止殺如其仁兮功塞兩儀孰與倫兮推其緒餘淑吾秦兮餐和飮惠鷙猛馴兮列聖相承教益振兮金冠鶴氅寵渥新兮高堂大厦奐且輪兮逍遙宴處終其身兮功成厭世乃上賓兮往來翛然肘屈伸兮有不亡者壽無垠兮門人紀德刋翠珉兮千秋萬𡻕仰光塵兮
