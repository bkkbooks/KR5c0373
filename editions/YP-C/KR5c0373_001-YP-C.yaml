front:
  text: 重刋道藏輯要甘水仙源録卷之一
  hash: sha256:bc7e2b23d11a81f7075edde12f6259b15ca78b692775ce77612698c48ab0a410
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_YP-C_27yiji-02-0002a, image: JY295/27yiji-02-0002a.png}
body:
  text: 夷門天樂道人李道謙集詔書皇帝若曰大道開明可致無爲之化至眞在宥迄成不宰之功朕以祖宗獲承基構若稽昭代雅慕玄風自東華垂教之餘至重陽開化之始眞眞不昧代代相承有感遂通無遠弗屆雖前代累承於襃贈在朕心猶慊於追崇乃命儒臣進加徽號惟東華已稱帝君但增紫府少陽之字其正陽純陽海蟾重陽宜錫眞君之名丹陽以下七眞俱號眞人載在方册傳之萬世噫漢世之張道陵唐朝之葉法善俱錫天師之號永爲道紀之榮當代不聞異辭後來立爲定制朕之所慕或庶幾焉東華教主可贈東華紫府少陽帝君正陽鍾離眞人可贈正陽開悟傳道眞君純陽呂眞人可贈純陽演正警化眞君海蟾劉眞人可贈海蟾明悟弘道眞君重陽王眞人可贈重陽全眞開化眞君丹陽馬先生可贈丹陽抱一無爲眞人長眞譚先生可贈長眞雲水蘊德眞人長生劉先生可贈長生輔化明德眞人長春邱先生可贈長春演道主教眞人玉陽王先生可贈玉陽體玄廣度眞人廣甯先生郝大通可贈廣甯通玄太古眞人淸淨散人孫不二可贈淸淨淵貞順德眞人宜令掌教光先體道誠明眞人張志敬執行准此至元六年正月日碑文終南山神仙重陽眞人全眞教祖碑開府儀同三司上柱國密國公金源璹撰皇圖啟運必生異人大定隆興道圓賢哲夫三教各有至言妙理釋教得佛之心者達摩也其教名之曰禪儒教傳孔子之家學者子思也其書名之曰中庸道教通五千言之至理不言而傳不行而至若太上老子無爲眞常之道者重陽子王眞人也其教名之曰全眞屏去幻妄獨全其眞者神仙也眞人名喆字知明應現於咸陽大魏村仙母孕二十四月又十八日按二十四氣餘土氣而成眞人也眞人美鬚髯大目身長六尺餘寸氣豪言辯以此得眾家業豐厚以粟貸貧人惠之者半其濟物之心畧可見矣弱冠修進士舉業籍京兆府學又善武畧聖朝天眷間收復陜西英豪獲用眞人於是捐文場應武舉易名德威字世雄其志足可以知還被道氣充餘善根積著天遣文武之進兩無成焉於是慨然入道改今之名字矣會廢齊攝事秦民未附𡻕又饑饉時有羣㓂刦眞人家財一空其大父訴之統府大索於鄰里三百余戸其所亡者金幣頗復得焉又獲賊之渠魁眞人勉之曰此乃鄉黨饑荒譬如乞諸其鄰者亦非眞盜也安忍陷於死地縱捨使去里人以此敬仰眞人愈甚咸陽醴泉二邑賴眞人得安是後於終南劉蔣村剏別業居之置家事不問半醉高吟曰昔日龎居士如今王害風於是鄉里見眞人曰害風來也眞人卽應之蓋因自命而人云正隆己卯季夏旣望於甘河鎮醉中啗肉有兩衣氊者繼至屠肆中其二人形質一同眞人驚異從至僻處虔禱作禮其二仙徐而言曰此子可教矣遂授以口訣其後愈狂詠詩曰四旬八上始遭逢口訣傳來便有功明年再遇於醴泉邀飲肆中酒家問之鄉貫年姓答曰濮人年二十有二姓則不知也其異歟留歌頌五命眞人讀餘火之文載全眞集中自此棄妻子攜幼女送姻家曰他家人口我與養大弗議婚禮留之而去又爲詩故以猥賤語詈辱其子孫其末後句云相違地肺成懽樂撞入南京便得眞後別號重陽子於南時村作穴室居之名曰活死人墓後遷居劉蔣村北寓水中坻凡肆口而發皆塵外句鄉人唯以害風謔而未始詢其意遇遊則挈一壺行歌且飲有乞飲者亦不拒或以壺取水與人但覺其釀香冽異常後復遇至人飮以神糞因止酒唯飲水焉人聞眞人口鼻間醺酣之氣而已醉矣大定丁亥四月忽自焚其庵村民驚救見眞人狂舞於火邊其歌語傳中具載又云三年之後別有人來修此庵口占詩有修庵人來比我風流之句凌晨東邁過關攜鐵罐一枚隨路乞化而言曰我東方有緣爾七月至山東甯海州郡豪有馬從義者先夢南園仙鶴飛翥俄頃眞人至馬公信猶未篤眞人於鶴起處築全眞庵鎖門百日化之或食或不食又絶水火庵至馬宅幾百步復隔重街馬公寢於宅中樓上門戸扃閉眞人遇夜親對談論不知從何而來人欲寫其神左目右轉右目左轉或現老少肥瘠黃朱靑白形色無定人不能狀之馬夢母曰有一客呂馬通未嘗語人次日眞人訓馬公名曰通有馬復夢有梓匠周生者傳道與馬卽辭乃尊有關中之行披席出家見一道士入族人馬戸曹邸馬亦隨入見眞人與道人對坐有馬九官人者求術於二老眞人目公曰教馬哥代我於是馬公誦歌一首約二百餘字夢覺唯記歌尾三兩句云燒得白鍊得黃便是長生不死方翌日眞人訓馬公法名曰鈺號丹陽子又夢隨眞人入山及旦眞人便呼馬公曰山侗至於出神入夢感化非一有譚哥者患大瘋疾垂死乞爲弟子眞人以滌面餘水賜之盥竟眉鬚儼然如舊頓覺道炁瀟灑訓名處端號長眞子又有登州棲霞縣邱哥者幼亡父母未嘗讀書來禮眞人使掌文翰自後日記千餘字亦善吟詠訓名處機號長春子者是也後願禮師者雲集眞人誚罵捶楚以磨鍊之往往散去得眞人道者馬譚邱而已八年三月鑿洞於崑嵛山於嶺上採石爲用不意有巨石飛落人皆悚慄眞人振威大喝其石屹然而止山間樵蘇者懽呼作禮遠近服其神變又或餐瓦石或現二首坐庵中人見遊於肆或留之飯預言來餽者何神通應物不可槪舉至八月間遷居文登姜氏庵在張氏家食童子輩見目前琉璃瑪瑙珍珠眾寶競來乞取餘人則不能見於文登建三教七寶會九年己丑四月甯海周伯通者邀眞人住庵榜曰金蓮堂夜有神光照耀如晝人以爲火災近之見眞人行光明中甯海水至鹹鹵眞人呪庵之井至今人享其甘潔於是就庵建三教金蓮會至福山縣又立三教三光會至登州遊蓬萊閣下觀海忽發颶風人見眞人隨風吹入海中驚訝間有頃復躍出唯遺失簪冠而已移時卻見逐水波汎汎而出或言眞人目秀者卽示以病眸或誇眞人無漏者卽於州衙前登溷凡爲變異人不可測者皆此類也在登州建三教玉華會至萊州起三教平等會凡立會必以三教名之者厥有旨哉眞人者蓋子思達摩之徒歟足見其冲虛明妙靜寂圓融不獨居一教也萊人從之者眾獨納劉處玄者號長生子有釣罷將歸又見鰲之什此四子者世所謂邱劉譚馬也又於甯海塗中眞人擲油傘於空傘乘風而起至查山王處一庵其傘始墜至擲處已二百餘里也其傘柄內有傘陽子號王自髫齔間嘗過玄庭宮主空中警化今呼云玉陽子是也與甯海州署相對有卜隱郝生鬻肆眞人倒坐於其間郝曰請眞人囘頭眞人曰爾不回頭拂袖而去郝亦隨悟乃廣甯郝大通也馬公之妻孫不二者亦同入道早明心地世云孫仙姑者四哲之亞眞人門人又有此三大士矣眞人一日告眾曰時將至矣明日西行道友乞詩詞自旦至夜留詩曰登途上路不由吾雲霧相招本性甦萬里淸風常作伴一輪明月每爲徒山靑水綠程程送酒白粱黃旋旋沽今夜一杯如有意放開紅燭照氷壺筆尚未投從外有史公者來送酒一座大驚眞人勸人誦般若心經道德淸靜經及孝經云可以修證明日率馬公等四人徑入大梁於瓷器王家旅邸中宿止時遇𡻕除與眾別曰我將歸矣眾乞留頌眞人曰我於長安欒村呂道人庵壁上書矣枕左肱而逝眾皆號慟眞人復起曰何哭乎於是呼馬公附耳密語使向關中化人入道至十年庚寅正月四日口授頌曰地肺重陽子呼名王害風來時長日月去後任西東作伴雲和水爲鄰虛與空一靈眞性在不與眾人同頌畢儼然而終是後馬公傳道四海大行伏遇世宗皇帝知眞人道德高明二十八年戊申二月遣使訪其門人應命者邱與王也命邱主萬春節醮事職高功五月見於壽安宮長松島講論至道聖情大悅命居於官庵又命塑純陽重陽丹陽三師像於官庵正位邱累進詩曲其辭備載磻溪集中八月懇辭還山至承安丁巳六月章宗再詔王處一至闕下特賜號體玄大師及賜修貞觀一所十月召劉處玄至命待詔天長觀自重陽丹陽長春曁諸師皆有文集傳於世嗚呼眞人起西州化行山東道滿於天下名聞天子開發後人使盡逍遙之遊豈不偉歟後眞人五十六年嗣法孫汴京嘉祥觀提點眞常子李志源中太一宮提點洞眞子于善慶二大士眞實道行弘揚祖道者也慇勤求記於玉陽子友人樗軒居士居士援筆爲之銘曰咸陽之屬曰大魏村山川温麗實生異人幼之發秀長而不羣工乎談笑妙於斯文又善騎射健勇絶倫以文非時復意于武戡定禍亂志欲斯舉文武二進天不我與蓋公宿緣道氣爲主慨然入道眞仙自遇頃刻授之口訣祕語人呼害風眞人承當或歌或舞以酒倘徉維摩非病接輿非狂肆口而發皆成文章燒卻庵舍拂袖關中乞化而往全眞道東甯海因緣萊陽通融亟顯神異東人畢從陶汰眞實杜絶虛假鍛鍊百端捶楚怒罵餘鄙解散四子傳化四子爲誰邱劉譚馬德其亞者王郝與孫共成七賢贊我眞人玉陽長春大啟其門遭遇聖朝爲王之賓眞人高躅望若星雲瀛海渺然仙跡宛存此道大行逍遙乎眞終南山重陽祖師仙跡記翰林修撰嘉議大夫同知制誥上輕車都尉彭城郡開國伯食邑七百戸賜紫金魚袋劉祖謙撰孔老之教並行乎中國根源乎至道際六合無內外極萬物無洪纖真理常全無有欠餘固不可以淺識窺測或者剖强名之原指成器之跡互相排斥是此而非彼而二家之言遂爭長於天下是不知天下無二道聖人不兩心所以積行立功建一切法導迪人心使之遷善遠罪洋洋乎大同之域其於佐理帝王一也爲老氏者曰吾寶慈儉又曰常善救物與夫孔聖本仁祖義之說若合符契今觀終南山重陽祖師始於業儒其卒成道凡接人初機必先使讀孝經道德經又教之以孝謹純一及其立說多引六經爲證據其在文登寍海萊州嘗率其徒演法建會者凡五皆所以明正心誠意少私寡欲之理不主一相不居一教也師咸陽人姓王氏名喆字知明重陽其號母孕二十四月而生美鬚髯目長於口形質魁偉任氣而好俠少讀書係學籍又隸名武選當天眷之初以財雄鄉里𡻕且飢人多殍亡有盜盡劫其資以去一日適因物色得盜終不之問遠近以爲長者正隆己卯間忽遇至人於甘河以師爲可教密付口訣及飲以神水自是盡斷諸緣同塵萬有佯狂垢污人益叵測慮夫大音不入俚耳至言不契眾心故多爲玩世辭語使人喜聞而易入其變異譎詭千態萬狀不可窮詰嗚呼箕子狂九疇敘接輿狂鳳歌出權智倒橫直堅均於扶世立教良有以也師後於南時村掘地爲隧封高數尺榜曰活死人墓又於四隅各植海棠一株曰吾將來使四海教風爲一家耳居三年復自實之遂遷於劉蔣與和李二眞人爲友各結茅居之至大定丁亥夏復焚其居人爭赴救師婆娑舞於火邊且作歌以見意詰旦東邁徑達甯海首會馬鈺於怡老亭馬亦儒流中豪傑者初未易許師故懇師庵居固其扃鐍率數日不給食縱與食之亦未嘗見水火跡或時夜就馬語莫知其所由來及去追之不及扃鐍如故間與魂交夢警分梨賜栗之化不一馬於是始加敬信與其家人孫氏俱執弟子禮又得譚處端劉處玄邱處機王處一郝大通等七人多類此號馬曰丹陽譚曰長眞劉曰長生邱曰長春王曰玉陽郝曰廣甯孫曰淸靜散人並結爲方外眷屬迨己丑季秋留王郝於崑嵛山攜四子西歸抵汴寓王氏逆旅無幾何呼丹陽付密語無疾而逝春秋五十有八四子歸其柩葬於劉蔣故庵之側丹陽因廬於墓次今之祖庭是也師先自六年前於長安欒村庵壁留題云害風害風舊病發壽命不過五十八乃知仙齡有期非偶然也有詩詞千餘篇分爲全眞前後集傳于世玉峯老人胡光謙爲之傳及丹陽嗣教從之者益眾其徒遂滿天下丹陽東歸長春因劉蔣故庵大加營葺玉陽又請額爲靈虛觀凡住持者始受度爲道士以奉香火世宗皇帝素欽其名嘗遣使訪焉戊申春長春玉陽應命至京師賜以冠巾絛服命居天長觀尋又徵至北宮長松島與語大悅詔於島西築官庵居之承安泰和間道陵亦屢召玉陽長生至闕下賜居修眞觀以待召問玉陽得號體玄大師自丹陽而下所爲歌詩各有集而郝廣寧獨邃於易備見于太古集中至正大初密國公璹讚云全眞道東四子傳化四子謂誰邱劉譚馬德其亞者王郝與孫共成七賢贊我眞人玉陽長春大啟其門遭遇聖朝爲王之賓瀛海渺然仙跡宛存細玩此讚其師資道業槪可見矣僕適承乏翰林與捉點嘉祥觀沖虛大師李志源及提點中太一宮沖虛大師于善慶無欲子李志常爲方外友因索鄙文以紀重陽仙跡僕往年從事鄠亭密邇靈虛宿聞眞風故就爲之說使後之學者知師出處之蹟其功用及物若是之大得以考觀而推行焉若其出神入夢擲傘投冠其他騰凌滅没之事皆其權智非師之本教學者期聞大道無溺於方技可矣是不得以固陋辭天興元年九月重陽日謹記丹陽眞人馬公登眞記邑子張子翼撰眞人世間之異人也稟天仙之姿應期運之數明哲聰敏沖粹夷曠學窮六藝行包九德夫其器量弘深襟宇豁達邈乎人不可及已然棲遲衡門不苟祿仕常喜詩酒陶陶自樂而不屑世務一日重陽眞人西來授以秘訣則頓然而悟視妻子如脱屣於是捐千金之產偕爲水雲之遊遡洛入關結廬於太一之下修真功積真行服紙麻之服食糲糧之食隆冬祁寒露體跣足恬然不之顧惟一志于道且手不接人一錢積有年矣至於出口成章咳唾珠璣多至數千百篇無非發揮玄奧冥合於希夷之趣者布於四方人人傳誦其安心定性則淸虛澹泊其接物導人則慈愛愷悌由是遠近趨風士大夫爭欽慕而師友之於斯時也踴金臺劉公顯武榮任京兆之運勾一見真人傾蓋如故自公退食揮塵淸談懽然相得每期異日同爲蓬閬之客居無幾何真人會有鄉關之行乃怱怱執別及抵山東凡在三州五會之眾傾赴雲集懽喜踴躍不啻如見慈父乃起黃籙爭虔懇延致以爲濟度師焉癸卯冬閏赴萊陽之請乃館於遊仙觀之環庵席不及暖遽然卽真越明年夏六月顯武公來宰斯邑下車之日獲聞真人於此登真也卽躬詣靈殯流淚拜伏不勝哀悼徐謂道眾曰真人上昇之際得無遺教乎當具告我翌日曹瑱劉真一乃奉上真人遺跡仍畧之曰先師前冬臘月旣望遽示歸真之意越七日癸未適遇重陽真人生朝方陳設供養纔初鼓震雷忽奮聞重陽真人言曰子仙期已及不當淹久及中夜卽枕左肱而化矣旣而復神遊於酒監郭復中家留頌二十字且言在世無人識之意墨跡在焉又往劉錫之居復書一絶有風馬升仙之言洎吾邑黃籙感應之祥蓬萊真容出現之異其靈顯之事孔多蓋不可以縷指數公嗟嘆良久曰異哉真人行跡神妙如此近古希有苟不刻於翠琰傳之來世良爲可惜汝等其奈之何答曰弟子不肖安能傳播師父功行之萬一大可罪也予雖然竊聞古人有云布衣之士不附青雲烏能施名於後世哉今日幸遇我公豈非自有宿緣乎公曰我聞命乃召邑子張子翼謂曰丹陽師父仙去之跡吾將勒石以傳不朽聞子遊全真之門久矣子其爲我記之子翼承命驚悸伏謝駑材不足以仰承重委願選諸能者公曰子無牢讓子翼因不敢復辭乃伏思而言曰在昔西京曹參之來相齊也盡召諸耆老問所以安集百姓者然人人言異殊未知所定聞膠西蓋公善治黃老言乃使人厚幣請之旣見爲言治道貴淸靜而民自定推此類具言之於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相今我顯武公之來令是邑也暫淹驥足聊用牛刀視事月餘闔境稱治向之𡨚抑無訴者得以伸其屈奸猾抵獻者無所肆其惡百姓懽然均賴其福加之淸廉公正無一毫之私雖魯仲康之令中牟西門豹之治鄴縣不能過也且萊陽素爲劇縣號稱難治今庭無留事居多暇日乃延請道眾若鐵查山玉陽子輩引居便坐講道論德探淸靜無爲之本窮修真養性之術庭館蕭然殊不覺有官況旣散則復治事如初從旦達瞑畧不知倦然夫公之高才絶能剸裁如流而淸靜之道抑不爲無助也由是觀之與夫曹參之禮蓋公何所異哉矧乎同僚皆一時之賢恊心戮力贊成美政主簿夾谷昭信朱勾課最戸無逋租仙尉蒲察武功綵棒威行盜奔他境遂使一邑之內皆攝然安生曾無所擾其道治化宣聲遠近靡不景仰其德政矣且夫公之爲京兆運幕也與真人道契彌篤已見之於初及真人登真於萊陽也值公復宰斯邑與諸僚佐特命樹碑勒文垂示無窮以張大全真之教復成之於末竊觀初末遇合之因緣殆爲大幸實非人力所能及也賤子不敏因摭其相遇之實得非并記云大定二十五年𡻕次乙巳正月十五日己亥謹記全真第二代丹陽抱一無爲真人馬宗師道行碑翰林直學士中順大夫陜西漢中道提刑按察副使王利用撰天地無爲而全道至人悟道以全真廣大簡易不見其朕資生資始而弗能主名道全於內者其天地乎屈伸消長莫測其變德參化育而必臻其極真全於內者其至人乎丹陽馬宗師瑞金蓮於東海根玄教於重陽起跡於金源氏全盛之時流派於我大元開創之始與夫廣成鳴道於上古混元垂教於姬周冲虛南華立言於戰國之世者無以異也師諱從義字宜甫世業儒系出京兆扶風漢伏波將軍援之後五季兵亂東遷甯海因家焉祖覺字萃叟以孝行稱父師楊字希賢容儀可觀沉默有度事親爲學綽有父風客或驚走以紬複擲於家者視之兼金也白於父藏之以待旬日客至卽付之客謝曰吾呂仙也居幽谷村以淘採爲業積金兩鎰將鬻於市逼於監稅者賴公獲免願中分以報希賢固卻之呂曰公有黃向風義後當有高士出焉他日訪幽谷人無姓呂者始知其異人也師將育母唐氏夢麻姑賜丹一粒吞之覺而分瑞金天會元年癸卯五月二十日也昆季五人以仁義禮智信命之故號五常馬氏師次子也童時常誦乘雲駕鶴之語及長善文學不喜進取適李無夢鍊大丹於崑嵛山幾三載矣曰仙至則丹可成一日師遊其側無夢見而異之曰是子額有三山手垂過膝真大仙之才因爲之贊曰身體堂堂面圓耳長眉修目俊凖直口方相好具足頂有神光宜甫受記同步蓬庄旣而丹果成忠顯孫君惜師才德以其子妻之凡三息曰庭珍庭瑞庭珪師嘗補試郡庠夜夢二衣褐者一素補兩肩跪且泣曰我輩十萬餘命在公所主言訖而去逐之入屠者劉淸圈中壁有字云我輩己亥十萬人太半已經辛巳殺此門若是不慈悲世世軸頭常厮抹旣覺聞屠猪聲往視之則淸之子阿澤屠二猪其一肩白欲止則弗及也始悟己亥猪也辛巳淸之𡻕屬也詣術士孫子元占之以決其惑因稽壽幾何曰君壽不踰四十九師嘆曰死生固不在人曷若親有道爲長生計已而與客奕棊乃失聲曰此一著下得是不死矣大定七年丁亥秋七月師偕高巨才戰法師飲于范明叔之怡老亭酒酣賦詩曰抱元守一是工夫懶漢如今一也無終日衘杯暢神思醉中卻有那人扶中元後復會重陽祖師造其席戰師曰布袍竹笠冒暑而來何勤如焉曰宿緣仙契徑來訪謁與之瓜即從蔕食詢其故曰甘向苦中來復曰奚自曰終南不遠三千里特來扶醉人師心自謂曰前所作有醉中人扶之語此公何以得之就叩何名曰道曰五行不到處父母未生時席間談道多與師合乃邀居私第出示所述羅漢頌一十六首祖師賡和宛若宿成遂心服而師事之先是師夢南園地中一鶴湧出今兹欲爲祖師結庵祖師即指鶴出之地師大異之庵旣構字之曰全真師欲從祖師西遊以累重難之祖師乃盛陳離鄉遠遊之樂以開釋焉是𡻕十月朔祖師令師鎖庵齋居百日日止一餐雖隆冬祁寒唯筆硯几席布衣草屨而已形神和暢若寒谷回春者焉八年春正月十有一日庵始啟鑰祖師謂師曰將謂汝三數日從我西遊直鎖害風百日仍作一場奇怪師悟以資產付庭珍輩以離書付孫氏遂易服而道焉祖師因師夢中歌有燒得白鍊得黃便是長生不死方之句命師更名鈺字玄寶號丹陽子師又夢從祖師入山及旦祖師呼曰山侗因爲小字焉居崑嵛之煙霞洞師忽患頭痛殆若無所遁者祖師令醫於家一日謂門弟子曰昨日馬公飮酒其破道乎使候之師蓋藥用酒引不覺過量疾甚人復曰馬公將死矣祖師拊掌嘆曰吾遠尋知友緣信道不篤而至此耶乃以鍊心語療之曰凡人入道必戒酒色財氣攀緣愛念憂愁思慮此外更無良藥矣疾遂愈其年十月朔令師焚誓狀于文登蘇氏庵師從祖師至汴寓王氏之旅邸飲食起居悉以仙機示之鍛鍊旣久遂承祕印十年春正月四日祖師將昇師請曰鈺當爲吾師服祖師曰可赴終南劉蔣之故居囑以後事而逝師曁譚劉邱三道友入關謁和李二真人詣劉蔣祖庵居之十二年春化自然錢於長安市中復護仙柩自汴之秦歸葬劉蔣遵遺命也師居廬頭分三髻三髻者三吉字祖師之諱也十四年秋夕師與三道友言志於秦渡鎭真武廟師曰鬬貧譚曰鬬是劉曰鬬志邱曰鬬閑翌日乃別師復歸劉蔣構一廣庭爲環居之所手書祖庭心死以表其顏庵爲祖庭自此始也師謂門人曰一晝夜凡幾時對曰十二曰十二時中天運造化曾少停息否對曰無師曰學道者亦如是矣十八年就化華亭劉昭信李大乘不果乃賦詩曰錦鱗不得空澇漉收拾綸竿歸去來大乘卽悟遂執弟子禮賜以靈陽子之號十九年春二月師築環華亭大乘亦與焉墻外來禽一株枯已久矣四月十四日移植環內以水沃之曰今日純陽降世辰也予生於五月二十日至日此樹生葉矣仍作頌曰天上三十六地下三十六天地入寶瓶七十二候足大乘請釋其旨曰此隱語也其應有日矣及期綠葉敷榮始知移植之日至五月二十相去三十有六是天地晝夜合爲七十二候也大乘因作異木記以誌之秋八月遷居隴州佑德觀解元李子和輩願執几杖以從繼而棄俗歸道者不啻百餘人二十年春東還祖庭適長安居蓬萊庵從善友趙恩請也秋八月旱師祈雨詩云一犁沾足待何時五五不過二十五至日果雨二十一年冬師謂門人來靈玉曰世所稱衣服舊弊重修潔者何名曰拆洗師曰東方教法年深弊壞吾當往拆洗之未浹旬官中有牒發事遂以關中教事付邱長春爲主張焉仙仗東歸過濟南有韓淘淸甫者慕康節之爲人所居號安樂園禮師乞垂開發師曰夫道以無心爲體忘言爲用柔弱爲本淸淨爲基節飲食絶思慮靜坐以調息安寢以養氣心不馳則性定形不勞則精全神不擾則丹結然後滅情於虛甯神於極不出戸庭而妙道得矣淘謝曰大道鴻濛無所扣詰今聞至言得其門而入矣師嘗說四體用云行則措足於坦途住則疑神於太虛坐則匀鼻端之息臥則抱臍下之珠類此甚多蓋言道人分內事也二十二年夏四月至甯海未幾行化於文登之七寶庵門人穿井九尺而大石障之師乃云穿鑿須加二尺深甘泉自有應淸吟及疏鑿尺有八寸泉乃湧出冬十二月晦師謂門弟子曰今日有非常之喜遂乃歌舞自娛二十三年春正月報者云仙姑孫不二返真於洛陽矣冬十月下元日文登令尼龎古武節請師作九幽醮師謂姚鉉來靈玉曰空中報祖師至靑巾白袍坐白龜於碧蓮葉上龜曳其尾見於雲表道俗懽呼焚香致拜居無何回首側臥東南而去十二月師赴萊陽遊仙觀忽肆筆書委形贊其畧云大哉登真路入靑冥麟隨絳節鳳撁朱軿鳴鑾佩玉履虛步雲超受真誥上登玉辰特寓其歸真之意耳是月二十二日祖師誕辰師仰瞻天表曹瑱問其故曰祖師偕和師叔至當赴仙會矣于知一曰教門洪大胡不愸遺師曰堂堂歸去也作箇快活仙謂劉真一曰汝等欲作神仙須要積功累行縱遇千魔百難慎勿退惰果爾然後知吾言不妄矣又曰我開眼也見瞑目也見元來不在眼但心中了然無所不見耳汝緣在北方可往矣時將二鼓師東首枕肱而蛻是夜於劉錫屋壁間留一頌云三陽會裏行功圓風馬乘風已作仙勸汝降伏龍與虎自然有分亦登天俄頃人云師已仙矣方悟留題蓋師之神也初崑嵛紫金山東華庵有松數株變靑爲白師曰松之白殆爲我乎不半載師果逝焉長生玉陽二宗師來莅喪事七日而卜兆於遊仙觀而安厝之二十五年邑人疑仙骨陜右門人盜去萊陽宰武節劉公啟柩視之貌如生乃更衣於金玉堂復葬之師幼習儒長克家有不貲之產而樂周急故得輕財好施名禮所謂積而能散者此也雖爲碩士接一童子必致敬焉老氏所謂不敢爲天下先者此也承師訓以闡化援門人以歸眞雖寓形於寰海以濟眾爲己任語所謂人能弘道者此也一遇至人得傳心法日經鍛鍊而不弛其志孟軻氏所謂樂取於人以爲善者此也以致感海市之瑞像變苦泉爲靈液劉淸毀屠具而改行欒周焚漁網以向風所過者化狂恣革其非心所存者神耋稚爲之雲集果行西秦飛舄東海凡五道場弘師教也故曹瑱雷大通劉眞一于洞庭等數十人實修眞達道扶宗翊教之士悉出師陶鑄之手譚長眞劉長生邱長春皆祖師之高弟尊師曰叔師處之裕如也生平所作歌詩皆出塵絕俗之語而沾丐後人者亦多矣至元六年春正月璽書加贈丹陽抱一無爲眞人之號十九年秋八月朔住持終南山重陽萬壽宮眞人李天樂持師道行之狀致懇於僕曰吾嫡祖丹陽宗師葬于萊陽進士張子翼作登眞記已識之矣而祖師成巳成物盛德大業師能纘承之乘風御氣長生久視之道師能揄揚之祖庭會眞實本諸此不以貞珉載其道行以詔後人殆爲闕如子無靳其文庶傳其不朽也僕惟道德之源繼續承承不迷於後世者丹陽師之力也牢辭其可乎乃繫之以銘其辭曰乾坤大道法自然至人一出千百年道非人弘道不傳人能弘道道始全重陽飽飲甘河泉道眼直視東海壖金焰爍爍開七蓮慨然捉馬揮玉鞭丹陽鴻儒宿有緣行功鍛鍊方且圓涣然氷釋歸眞仙詞源落紙如雲煙機發於踵崑邱巓降龍伏虎秘法玄知知覺覺無後先道場五闡教乃宣秉風御氣遊八埏下視塵世猶天淵若子若孫稱大賢胸中氷雪壺中天傳心嗣法無窮邊長眞子譚眞人仙跡碑銘開府儀同三司上柱國密國公金源璹撰昔人有言仙語無詞心傳道見神丹之訣洞簫之音流注於玄虛渺漠之間其得之者又不知幾何人哉隱之則紅霞丹景出之則琳宮金簡如斯人輩似有爲之士也士至於無爲無不爲攜壺曳履落魄于逆旅酒家之間吟嘯忘懷與風月爲莫逆此亦近乎大隱者矣德不孤必有隣道不我須及人黃秦晁張東坡門下之四賢也詩文雄深筆力雅健故能弘先生之教馬譚邱劉重陽門下之四仙也道用沖虛處心淸寂故能明祖師之道教何以弘道何以明其實皆一心也其虛心明道者誰長眞子譚公眞人也師諱處端字通正山東甯海州人其父卽鏐鐐之工於權衡出納之間無非平實輟巳生資以濟貧窘積善累行備餘慶而生先生公幼而秀發聲韻琅然人知其非常兒也甫及六𡻕因戲墮於井中人急下井救之見公安坐水上隨挈而出畧無傷焉又所居遺火巨棟碎於榻前公方寢熟呼而起之神情自若蓋有道之士非水火所能殞越也至十有五齡而志於學詠物警策其葡萄篇已膾炙人口及弱冠乃尊以玉名之遂涉獵詩書工諸草隸一朝因醉遇雪臥於途中卽感風痺之疾公喟然嘆曰玉平昔爲行於世畧無鮮益中復遇奇疾必非藥石可療之惟暗誦北斗經以求濟忽夢大席橫空公飛昇欲據之見北斗星君冠服而坐公叩首作禮間恍然而覺自兹奉道之必篤矣至大定丁亥𡻕仲秋聞重陽真人度馬宜甫爲門生公徑赴真人所祈請棄俗服羽執弟子禮真人付之以頌便宿於庵中時嚴冬飛雪丹竈灰冷藉海藻而寐寒可墮指真人遂展足令抱之少頃汗流被體如置身炊甑中拂曉真人以盥洗餘水使公滌面從滌之月餘宿疾頓愈於是公推心敬而事之其妻嚴氏詣庵呼歸公怒而黜之公拜禱真人求道之日用真人以四字祕訣授之遂立今之名字焉又道號長真子師命公赴維陽與馬邱劉同處真人步虛詞中有達真譚玉之語味之豈小許哉真人至汴遺訓命四子主掌教門及重陽仙遊公與三大士負師遺蛻徑歸關中瘞之于劉蔣村祖庵之西隅供祭盡師資之禮頃有請長真齋者公不避嚴凝涉溪而往氷介於鳧舄之間足無所苦人咸異之後寓跡於河朔獲䴥縣府君廟之新庵一日先生鎖庵而出云往衞州至夕廟官温生者見庵中光輝照映卽窗隙而窺之見先生逼火而坐温驚疑潛退未曉默遣人趨州託乞藥於師其人至衞見先生於臥內尚未起授藥而還復視庵中燃火猶未畢燼與薊子訓厯諸家之說異世而同科爾先生行業頗多不能遍舉姑畧而論數事于後忍折齒之憤德也施夢中之藥神也知巨僚之見訪明也書龜蛇以辟火靈也爲人德能通神明可濟靈非仙而何歟又聞先生不擇貴賤賢鄙不異山林城市俱以道化無非晏然作歌詩百餘篇目之曰水雲集宿慕洛陽天中之土人多道心有意作丹成之所因見洛南之朝元宮昔朗然子之故居也愛其山水明秀遺跡尚存有道士張永壽者時主觀事卽以宮之東隙地數畝遺之先生誅茅拾礫而庵焉有洛人朱氏者奉道構庵請公居之先生於朱庵中神遊間似與重陽丹陽遇報以仙期旋復返朝元之故居卽今之棲霞觀也觀在後長春邱公真人立名至大定乙巳𡻕孟夏朔日無疾留頌而逝異香凝室者數日世壽六十三昔嘗畫龜蛇者蓋己年己月己時歸真之預知也其門人王道明董尚志自童稚禮先生盡負汲香火之勤先生馭鸞之後數十年居仙瑩之側王生主棲霞觀事與董生始終醮祭無惰擬行改葬因李公都運先生曁四大道師李公志源于公善慶王公志淵陳公無染以碑銘見囑於老夫敬喜而筆之銘曰重陽真人大道之師長真先生攝衣從之以心傳心神鬼不知我知至人生於聖時人貴其異我敬其實東齊發揮西洛留跡語見歌詩名傳金石霞舉玄風雲開丹液野鶴昂藏靈龜寶章伏火制水順陰調陽分形入夢道術彌彰先生未亡千載馨香
