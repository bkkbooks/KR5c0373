front:
  text: 重刻甘水仙源錄卷之十
  hash: sha256:1cf4345ceb41426530c7032f421c7c9f9e5480d2973d2e6c7d668e0a5a3149e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_YP-C_27yiji-03-0081a, image: JY295/27yiji-03-0081a.png}
body:
  text: 修建開陽觀碑翰林張本撰丁酉之春仲月旣望景州開陽觀之羽士以燕京長春宮提點大師張志素爲介玄衣白簡晨蹐於門再拜稽首而言曰景之開陽觀惟先師通玄大師以德起築實經其始惟長春真人以師之厥德克配實賜之名其聲問發越之所從本根封殖之所由日月駸駸遂奄以殁惟小子實任其責夙夜孔懷恐遺前人之羞敢狀其事以告閽者惟先生蓋嘗侍翰林必世之名善爲文辭者所作足以垂後幸寵之珍文刻諸玄名以爲不朽之傳僕亦義其門弟子能述其師之志理不得讓系之以辭曰通玄姓楊諱至道灤州馬城縣之靈泉人其師號通玄前金之賜書也自明昌庚戌改衣入道朗然先生之所引度也旣陪杖屨三年尋有四方之志抵武淸居於圜堵不接人事者三易寒暑起過惠州經靈巖人有以非意酷相加者不爲之辯及知其巖之可以棲真也脫冠跣足穴石作洞首鼠十年服勤如一及洞成有泉出焉今之所謂滴水洞也惠州神山縣官屬耆德尚其志操疏邀至境遂起太淸觀實泰和丁卯𡻕也貞祐改元復雲水於興平之間大朝本觀功德主燕京行省參謀國家奴景州牧王仲温倅陳玫潤州牧李濟曁諸僚佐稔聞道價願得以親灸丁丑𡻕以狀奉州之蘇家莊隙地南北二十東西三里爲奇左龍岡右混河前抵鐵山後連鵰嶺聽其耕鑿卜築惟意於其間始披榛伐木陶甓輦石內以玄行風動所居外以艱苦身倡其徒不盈十稔營三淸正殿及雲堂於西香積於東翬飛粲然方壺賓館靜密得宜蔬圃翼張果林圜列紫戸扃雲秀陰蔽日小有洞中之一天也其闢土墾田積十餘頃雖居徒數百指其饘粥之計未嘗人有所攖拂適觀之落成長春眞人以中㫖賜還遂趨赴謁名得以開陽命之夫陽之爲德固仁明剛健然其一消一盈亦嘗累於時之所變遷也剝之六五爲比則五陰方進爲用則一復未萌此非困於消乎乾之上九爲德則太剛欲折爲候則炎炎將焚此非逼於盈乎有以全剛明之德成施生之功者其惟開陽之謂歟於時爲春於德爲生於氣爲和於數爲中前已離乎虛空不用之地後不至於亢極有悔之時吾觀之得以此命者豈其通玄之德柔不至息剛不至絶中有以髣髴長春擬議以正其名也通玄父諱冲常言先世相襲惟一子四葉以來曁以陰德自力至通玄兄弟六人其次曰伯義奉其先人之祀季早世自其長曰伯和又其次曰道夷次曰志堅及通玄皆爲羽衣通玄性剛明有志節然能循循自撙抑故見於眉宇者常穆如也爲人推誠不喜以囊橐相覆掩凡厯艱險必率先諸人其館穀往來羽流雖傾囊倒囷而樂爲之故生平無私積遠近受業餘三百人壬辰𡻕十二月初三日示微疾說偈而終門人營祠於觀之東偏而葬之𡻕時來會祭奠不輟銘曰闢戸曰乾如陽之開粹宇之命胡爲來哉通玄卜築實肖其德長春合之球琳一色於戲通玄今爲飛仙彼居之安無恃吾前陽不可亢亢則凶極委靡循循亦幾於息擇乎兩端日麗春熙惟其有者是以似之或承之羞中乾面澤貽此刻文服之無斁順德府通真觀碑平章政事宋子貞撰夫道家者流推老氏爲始祖老氏之教主之以太一建之以常無有以冲虛恬淡養其內以柔弱謙下濟其外蓋將使人窮天地之始會萬物之終刳心去智動合於自然以之修身則壽而康以之齊家則吉而昌以之治國平天下則民安而祚久長非有甚高難行之論幻怪詭異之觀也世旣下降傳之者或異一變而爲秦漢之方藥再變而爲魏晉之虛玄三變而爲隋唐之禳禬使五千言之玄訓束之高閣以爲無用之具矣金正隆間重陽祖師王公以師心自得之學闡化於關右制以强名謂之全真當時未甚知貴國朝啟運之初其門人邱長春首被徵聘仍付之道教天下翕然宗之由一以化百由百以化千由千以化萬雖十族之鄉百家之閭莫不有玄學以相師授而况大都大邑者哉此通真觀之所以作也謹按其觀在郡城之西南隅始𡻕在辛巳同塵真人李志柔依城隍廟聚徒而居之尋購地其傍廣以爲觀因得今額纔構一室以爲講論之所會以掌教尹淸和之命俾居終南之宗聖宮卽以觀事囑之於弟志雍曁韓志久而二人者皆道念深重能守師訓又得郡守安國軍節度使趙侯伯元爲功德主於是遠近響應緣力日振首建大殿於其東以像三淸次築祖堂於其西以祀七真然後齋堂方丈靜位散室饍饈之㕑雲眾之居相望而作至於井竈廐庫級甃綵繪罔有不備拓庭而能寬植木而能疎沉沉焉洞洞焉真高人之雅居而列仙之別館也觀之南別置蔬圃以資道眾其爲屋凡四十間爲像凡二十一軀爲地合六十畝始大殿告成而志雍遽蛻去餘皆志久爲之庚申之夏余自覃懷應聘於上都亦嘗一過其地故特書之使千載而下居其室食其功者知有所自來矣同塵洺水人自其父志微素喜沖澹嘗事開玄真人李志實故同塵亦在弟子之列及學成行尊而其兄志端弟志藏志雍皆從之遊俱嘗隸籍是觀同塵性湻至早𡻕得鍊氣訣隱居於仙翁廣陽兩山之間絶跡人間者蓋十有二年及聞長春宗師奉詔南下乃迎謁於燕山玄關祕鎖迎刃而解其後傳道四方遊無定所及住持終南道價益重遂以朝命得今真人之號并黃金冠服陶鑄之下率多成德其化行一鄉行孚一邑其爲方所者若宮若觀若庵殆百餘區然猶以通真爲指南志久潞之長子人實與余同里閈雅爲大宗師李真常之所知因以承制之命賜號通真大師及今誠明真人張公嗣掌道教又令綱紀順德洺磁威四州之眾其爲人蓋可知銘曰乾坤肇判雞子封恍惚有象存其中化育萬有初無功混混浩浩始復終廣成多言坐崆峒陽和泄地一脉通函關鬱鬱紫炁充兩篇道德開盲聾言各有師師有宗子孫異日紛相攻終南躍起重陽公淨掃浮雲還太空天皇下降開玄風一竅吹作萬不同襄城道士得小童平地幻出蓬萊宮地周千里歸帡幪物不疵癘年穀豐𡻕時筐筥走媪翁自今以始傳無窮重修太淸觀記奉天王奐撰地勝而後境勝理之必然者也方此之時以洽水之陽北負梁山東肘黃河獨無名宮傑觀乎連年會道者馬志玄於燕於薊門不遠數千里請記太淸之頂末扣其所以然則曰創之者先師喬鍊師也潛道其名德光其字平陽人天資恬淡純厚而躭林泉之樂初𡻕入關中得法於丹陽宗師旣而丐隱縣市爲劉戸部好謙所知一日拉同志李君淸虛遊故城之東北隅趙氏園面太華而嘆曰修真之地孰踰於此歟趙聞而施其地乃與淸虛結茅以居蓋大定十七年也後因庵而觀土木工技競以時集殿宇像設之嚴指顧告成至於賓客棲止廚藏廐圃之所莫不畢具天興之亂掃然矣曰復之者熙真先生吉志通鍊陽子張志洞也始於丙申訖於辛丑甫五六載而丹雘斑斑然鍾磬鏘鏘然簪裾濟濟然向之瓦礫荆棘之場一還舊觀矣實縣宰白侯玉主之而邑民杜恩等翼成之也其大槪如是余亦竊有感焉嗚呼人心何嘗不善而所以爲善者顧時之何如耳方功利馳逐之秋而矰繳已施陷穽步設則高舉遐飛之士不得不隱於塵外此又必然之理也然則古之所謂避地避言者其今之全真之教所由興耶或者例以跡而疑其心是殆見其善者機也使有志於世者誠能審涵養勤恪之爲常達推移擴充之爲變率其子弟如全真之屬重道尊師化其鄰里如全真之徒真履實踐朝夕以無間舉動以相先而能不失其孝悌忠信之實則一身之計可以移之於一家一家之事可以移之於一國一國之政可以充之於天下矣雖坐進夫三代唐虞之治而使民之仁壽物之蕃昌猶指諸掌然則敢問其要自正心誠意始壬子正月戊戌日記淵靜觀記河東高鳴撰恒山爲中國巨鎮稽之書實有虞氏朔巡狩之地後代相承寘祠于大茂峰之絶頂以備封祀世因謂之神尖距神尖而東不兩舍抵石門有谷曰帶耳厥土衍沃崇崗限其陰磵水絡之淙淙然東南流可以湘濯灌漑環望千金鐵冠諸嶺巖岫厯厯如在掌上四時變化雲煙草樹濃淡覆露殊愜人思致殆亦天壤間一嘉處也全真重顯子築觀於其中額曰淵靜於是乎一山之勝槪盡爲淵靜几閣之供矣初重顯子自武川來將徧遊南方設教度人唐司倉張瑋輩傾心事之旣日聞道妙咸有社稷尸祝之意重顯子曰吾得一把茅一盂飯足矣何苦以膠膠羨物爲哉所慊者聖真無象設之宇門弟子無以揭香火之處大眾雜然曰謹受教𡻕己丑瑋割世業膏腴田三十畝始基之輸幣入粟者道路不絶及庀工董役火西流而載旬三浹而成其用簡其功速若有神陰相之者儼大殿於端掖西以堂又掖東以庖危墉屹乎四周不華不質不庳不侈曲中儀軌凡若干楹雖城邑名構窮土木金碧之盛以山林泉石左映右帶而氣象有出乎其表者矣蓋重顯子生有淑性兒時已不茹葷血大定間同郡靈真子爲引度卽許以法器靈真子實丹陽馬公之高弟惟傳授有源又嘗尸居環堵久於鍊化故其得道甚敏及謁長春宗師又知修行之要獨善其身不若廣建道場爲大利益事用是所至之方苟緣契有在必盡心焉區以計之如淵靜者百有奇至謂幽深高潔爲仙家福地如小有洞天者皆不敢與淵靜齒懿哉若重顯子可謂篤道自信不負玄門者矣後二十年門人等合謀曰物理有廢興世代有遷革惟金石可以傳不朽夫吾師之功載卓卓如此不自以爲功其任責在後人爾今師已矣爲後人者不務光揚襃大不幸當不能逃數之時視遺跡泯焉無據則負負其何言盍請工文辭者以卒事旣數踵門余甚憐其勤厚意遂爲著其始末云重顯子其自號也姓陳諱志益單州琴臺人嘗住侍葛公山淸虛宮壬辰春順化享齒八十有一贈洞虛真人自餘高風異行曁所度弟子名氏有淸虛之碑在茲畧而不書癸丑二月二十有二日記神淸觀記北平王粹撰凡道觀之稱於世者或占山水之秀或擅宮宇之盛非宮宇則無以示教非山水則無以遠俗是二者難於兼得雖使兼之非有道德之士亦莫能與焉崞之神淸觀通玄大師雲陽子柳志春之所居也其山水則五臺滹水在其東崞山正陽在其西南有金山天涯陽武前高北有鴈門地角大和如野其宮宇則三淸之殿七真之堂真官山祇之祠雲堂丈室齋廚廪廐之屬飾之以金碧樹之以松槐環之以園圃輝映遠近崞人崇奉之日久矣始塗陽王朴與州長閻鎮諸公協力興建疏邀雲陽子住持累年而成名曰神淸淸和真人賜之也乙未春會真人適終南道由忻崞之間雲陽子偕耆宿官僚迎謁至則憩於神淸者月餘遂以其觀歸之汾晉諸觀歸於真人者神淸其首也未幾真人還長春宮雲陽子承命以楊志應知觀事庚子秋九月雲陽子從綦淸真抵燕請真人西行改葬重陽師祖於劉蔣間稽首堂下言曰志春賴父師道蔭灑掃神淸已數年矣今棟宇粗備簪褐幸集𡻕屢熟而人安且和及此閑暇無文以紀之竊懼其事跡之冺没於後也俄以知長春宮事抱真大師張德方爲介來乞文勤甚粹蓋嘗察雲陽子爲人矣心淳而氣和量弘而行峻眾中混然不自露見然四方耆舊咸推其爲有道之士茲神淸所由興也山水之秀又皆萃於觀之左右前後豈天設福地必俟有道之士而授之耶廟貌旣盛教風旣行雲陽子不敢以爲己有會遇大宗師而出之若王樸閻鎭與其一時耆宿官僚贊成道緣者皆當大書特書而播淸芬於無窮也然神淸之爲觀也亦美矣有山水之秀有宮宇之盛又有道德之士表而出之兼是三者餘所罕及卒被大宗師之光明造化將見卓然立於天壤之中亘千百世而獨存者矣粹嘗許雲陽子觀記久而未暇爲也聞其歸時囑抱眞者辭意懇切故爲之書其大畧如此惜乎雲陽子已西欲問其祥不可復得他日倘能西遊過雲陽子於神淸瞻其宮宇覽其山水苟斯文有所未盡者尚當增益冬十月二十八日記隴州汧陽縣新修玉淸觀記臨潢李邦獻撰爲山九仞功虧一簣聖人之所深惜也物有垂成而不遂者君子見之亦豈無慨然傷悼而欲遂成之心汧陽玉淸觀營建有日矣旣成而後謀記之於石以延安令常元亨爲文期日刻之適西北寇至以是遂輟今猶未克模勒是可嘆也頃西省郎中粘割公子陽被檄自朝那入於鳳鳴道經是邑其宰導而謁之旣至堂廡淸肅門壇閴寂檜柏森密竹木叢蔚而又汧水北來石壁當其衝勢若窘束不得逞迴折而流湧湍激射若雷之殷殷然其區處域別皆有嘉趣或面山而廬或枕流而軒山光在目水聲在耳四顧灑落殆若世塵所不到悵然眷戀而不忍去周行徧厯見素碑瑩鏡而無字刻詰諸主觀因得常令所爲文然邊幅破裂字形漫滅絶去者十二三讀至行盡每每句不相續至於經始落成猶不見其日但未見爲文之始泰和丁卯𡻕爾公曰石旣礱矣文旣成矣何待而不遽立也主觀答以兵革之故公執紙惋嘆卷而懷之因許以補亡葺罅而後命工開鎸必爲若輩終是業也一日僕以事詣府謁公於普照方丈公以此文示僕因命考之其大略曰縣之東南抵汧之石岸岸相對如門土人謂之石門或傳導汧入渭禹之所鑿也瀕岸而北藉石臨水有地廣袤數畝始全眞蒲察師卜庵於此師操行淸高刻苦於道由是人敬仰之旣而羽衣黃冠爭築室於其側皆願執庚桑楚之役他日師集其眾而告曰吾與若輩兀兀然日無所爲而棲此煙霞之勝境具何福緣而享此樂也與夫作一己修眞之地曷若爲萬民祈福之宮吾欲於此起觀宇使神明有所依止不亦可乎眾伏膺師訓唯諾而退皆願協力而贊成之乃相與行化於縣人於是遠近響應結緣而來者絡繹如市富以其財貧以其力故材木塼甓凡所當用者刻期而備殿宇像設與其所當修起者不日而成旣而請額於朝廷而勅賜曰玉淸居無幾何師忽不疾而逝纊息不屬而視之宛然如生同學于善慶與門弟子思師之德龕其像而事之其始終可見者如此而已而公徐曰子爲我因其舊文而更新之僕以初未嘗親厯其地且所誌者不詳而欲固辭因語公曰道家者流而以淸靜無爲爲本今師勞人之力而靡土木之費非所謂知其本者也何以文爲公曰不然常善救人故無棄人老氏之微旨也師佩是言而有度人之心然人之稟賦各異天資厚者善由中出而易入於道薄者扞格而不能合故假神明之像使日知所敬以畏其外由之以厚其中也師豈好爲浮誇侈靡者哉况因夫人之所欲爲而爲之非能力使强歛烏得以是而訿師也且夫物有旣成而微闕者因而成之亦士君子之美事也又何辭焉聞公之言卽公之心則知廢者皆可以興墜者皆可以起因援筆而粗書之正大乙酉季冬二十有七日記大都淸逸觀碑正奉大夫參知政事商挺撰己卯之𡻕長春邱公來自海上應太祖皇帝之聘越金山而入西域也弟子從行者十八人各有科品隸琴書科則有眞人冲和潘公焉及南歸至蓋里泊夜宣教語謂眾曰今大兵之後人民塗炭居無室行無食者皆是也立觀度人時不可失此修行之先務人人當銘諸心長春旣居燕士庶之託跡四方道侶之來歸依者不啻千數宮中爲之嗔咽公曰吾師之言不可忘也乃擇勝地以爲長春別館壬辰𡻕廣陽坊居民有貨其居者公往相焉曰土厚木茂淸幽之氣蔚然眞道宮也遂捐資以貿之建正殿翼左右二室以居天尊洎諸神像講堂齋庖方丈客寮靡不有所亦門人韓郭尹劉諸人善繼其志而後有成也仍築琴臺於殿之陰今朝有名琴二曰春雷曰玉振皆在承華殿貞祐之變玉振爲長春所得命公蓄之故以名其臺而又葺蔬圃以供𡻕計植花木爲遊觀之所觀成之日實城西南之觀求額於淸和眞人故以淸逸名之至元丙戌秋門人王志和偕同輩二三人狀觀之顚末來求文以刻之石有以淸逸名額之意爲問者予應之曰天地之氣有淸有燭人受所賦則淸者賢而濁者愚世之賢者有避世之士焉薄功名而不爲輕世位而不居寄形於寂寞之濱委心於紛華之外者靜安閑適以自樂其所樂耳潘公之修是觀也靜而深有山林之趣幽而雅無金碧之華琴臺足以寓意庭柯足以怡顏四時花木足以招徠賓客門巷蕭條俗駕稀而市聲遠人之至也猶若脫塵羈逃世網其心放焉而有忘其歸者况家於其中也哉彼戀功名嗜富貴縈內疚以汨心志圖外觀以維車服而疲憊精神於車塵馬足間視淸逸者爲何如作者喟然嘆曰淸和之言旨哉請以是說書之石用告來者於是乎書公諱德冲字仲和淄州齋東人方在娠母夢祥雲覆其體妊十九月乃生七𡻕猶不言忽有一道者過其門而丐焉卽從傍與語家人遂驚道者曰道器也令其父教之讀書日誦千餘言將娶婦遂潛往棲霞濱都觀請謁長春師過濰陽玉淸宮淸和尹公爲紹介焉初號冲和後領河東道教事居純陽上宮又號九峯老人賜號玄都廣道冲和眞人銘曰淸逸之觀何隆隆乾坤淸氣公所鍾祥雲覆母身乃降道氣大受超凡庸神仙宮府聊相從翛然遠引追喬松石壇月高曉露濃滿庭花木春融融利名不到蓬萊中抗塵走俗嗟樊籠琴臺千古遺高風自愧老筆銘新宮增修華淸宮記參知政事陜西四川等路行中書省事商挺撰始余從先大夫右司君宦遊長安道過華淸周行廊廡間因讀唐宋以來名賢石刻其間興廢沿革炳然如在目前重樓延閣層臺邃沼雖不迨承平盛時而規模制度宛然故在迨天兵南下居民東遷所在宮觀例墮灰刼秦爲兵衝焚毁尤甚所謂華淸者亦不免莽爲薉區矣𡻕癸丑奉命西來復過故宮意謂蕩然無復向日及見其屋宇修整階序廓大爲殿者八曰三淸曰紫微曰御容曰四聖曰三官曰列祖曰眞武曰玉女爲閣者二曰朝元曰經藏爲湯所者二曰九龍曰芙蓉鐘鼓有樓靈官有堂星壇雲室蔬圃水輪以次而具丹堊藻繪粲然一新若初未毁而又有加焉者詰其故主宮趙志古等合辭言曰辛丑春先師淸平老人趙公志淵自洺州從淸和宗師會葬祖庭還過驪山四顧彷徨憫宮室之彫廢遂慨然以修復爲事乃命其徒剪榛棘礱柱礎陶瓴甓勤垣墉於是四方道侶各執其藝來會宮下鼓舞忻躍咸願薦力土木之功以時竟舉斜傾者起之腐敗者易之破缺者完之漫漶者飾之又得太傅移刺公總管田公輸貲助役相與翼成稍稍興葺僅見倫敘事未竟不幸先師捐館命弟子張志靜主之無何張亦厭世志古等才謭力綿大懼不任以墜宗緒自是脇不沾席食不甘味飢寒疾苦不以累其業者逾十五年始克有成敢以記請庶徵石書辭俾先師之功勤永有傳焉屬時多故辭未能也中統改元與平章廉公再被隆委殿邦坤隅志古輩復以其師行實來謁且迫促前記余謂秦中名山水多矣可取者唯華淸爲最闢門可以瞰淸渭登高可以臨商於高甍巨棟綿亘盤鬱寒藤老樹蒙絡搖綴而漢唐之離宮別館咸在焉斯則華淸之奇觀也前人述之備矣又况東西奔走實當衝要而能潔齋館以待賓僚蓄芻藁以備傳客饑者食之寒者隩之疲者休之小大畢慰其意咸充然若有所得此其與時遷徙應物變化隨俗施事無所往而不宜者也向非淸平玄應感人曷能新宮宇還舊觀非志古輩竭力盡悴曷能勤堂構紹宗風而喑無一言是使師弟子之功冺默而不傳也聊推次營造之始末俾刻諸石用紀𡻕月云時中統二年九月日記七眞傳序南至封龍山樵李冶仁卿撰山車垂鈎不雕不幾之謂眞嬰啼孺慕與生俱生之謂眞上皇之世一眞大全其化淵淵其俗平平標枝野鹿同歸自然物與無妄夫何爲乎雖接子之或使亦季眞之莫爲已世旣下衰道術幅裂一眞內潰萬僞𧥄𧥄猖狂恣雎謾讕佹僪剖姦劂詐沂鄂太素於斯時也不有至人濟之無假之津返之邃古之宅則日塡月積積習生常氓之蚩蚩將爲異物天可倚杵初不待千𡻕之遼是故帝鴻世有廣成之救姬周世有混元之救戰國世有南華冲虛之救而七眞繼踵曡爲近世之救所遇雖殊其爲救一也自重陽始祖開眞筌於金源氏正隆大定之初長春老仙翁眞風於我國朝啟運建極之際中間陶鑄羣生使之保合太和各正性命蓋千萬數而俘鹵之餘齒凍餒之殘喘狴犴之假息所以起尸肉骼膏枯已痛俾人蒙安樂之福者又莫得而周知然則七眞之救世也眞叶上帝之心也上帝之愛民也眞藉七眞之教也不然何爲天生聖皇出甯四海天生長春左右大命相與聚精會神而同始共終哉長春上賓淸和勅藏之眞常發揮之今而誠明布濩之則夫七眞之盛跡炳如日月在天矣雖無文字纂述固不没没况傳贊精確仙語琅琅耶諸君敘列曲折備盡然走復贅談其傍亦側聽陽阿從而和之耳乃若虛舟靈風飄蕩變化日新之說此又玄中之玄走雖老尚獲一漑之益詩云招招舟子人涉卬否人涉卬否卬須我友稽首誠明母曰子非其人𡻕至元乙丑日序送眞人于公如北京引戊戌𡻕三月初吉北京司鑰萬戸烏公遣介紹抵長春奉玄纁致書邀眞人洞眞老以矜式其國人旣可所請四月望日公復躬親備車馬來逆僕聞洞眞甯海人自齠齓入道居關中五十餘年里閈不一遊其苦節厲志行軰鮮儷潔行仁聲遠近著聞正大間被中旨提點汴京中太一宮越壬辰大軍南渡燕京長春宮諸耆宿莫不懸懸於懷後聞嚴行臺護歸東平莫不相慶因至燕謁處順堂宮人懇留不獲南歸五年矣羽士服其精嚴如奉神人都人瞻其容止如覩列仙一日命駕猿鶴爲之怨驚松菊爲之寂寞眾設堅議以阻其行其信不可奪也至欲有以力挽而俾不得去者僕曰至人兼善之心視斯世如一常以其有餘補其所不足長春淸和留西堂李眞常主法席其餘耆德不可槪舉比輟此老以及遠方正如海藏雖去一珠吾光無所損施之他室照夜爲有餘矣又况白霫土厚人純勸善易入聞道易行加之烏使君侯漕臺輩身先奉篲能致有德先覺以師範之視變故俗如反掌耳或謂洞眞澹如白雲去往無心安能規規語汝誨汝俾汝悠悠者果從其訓耶僕曰明月一出卽現諸水月何期於水水亦不能逃夫月者大明以臨之至寂以感之心領神受中有不能已者何事䂓䂓其間洞眞胸中自有明月人性猶水天下一也何獨白霫之疑哉眾聞之雖其元老見奪爲私弔復以君子所居者化爲兹道賀也於是相與開賓館設祖席作歌詩餞送以寵其行張本引之且贈詩眞人白霫行長官執其御富貴不敢驕熏鍊竊思預誰謂霧豹隱忽與雲鴻翥祖餞何徘徊未忍別離遽煙柳望長亭茫茫正飛絮眞常李志常臨岐執別春始歸桃花將盡柳花飛望中車馬健如疾何時再見丁令威又心去意難留乘春賦遠遊秋風吹素髮猿鶴替人愁定庵呉章祖席相看手屢持東風無奈思依依慣聞玄鶴幽庭唳忽作仙鳧獨自飛苑北佳遊何日再終南舊隱幾時歸因君喚起家山興不覺臨風賦式微馮翊馮志亨古汴玄宮久住持眞仙無地不歸依水中一月隨方現天上孤雲到處飛蕙帳夜寒添鶴怨祖庭春暖待師歸此行莫負關山約早占終南冷翠微河東段天常華表千年鶴翩翩復舊遊遼天快空廓燕市謝淹留輕舉師先得高飛我未由望窮雲海路不斷暮煙愁終南山甘河鎭遇仙宮詩序太原虛舟道人李鼎撰雄雞一鳴六合出其昏闇薰琴一奏萬物遂其長養天下之事有廣大至於充塞霄壤而感發之機初或起於毫末者何哉蓋一物之細而至理之所寓實有不知所以然而然者存焉耳甘之一水其用有如此者我重陽祖師之道其傳而當至於百千萬世之無窮予不得而預言之始以正隆以來百年三四傳中眾所同見者而觀之其出自門下登眞者自邱劉譚馬數師眞以降不知其幾百千人其賴以生死肉骨者不知其幾千萬人其宮觀不知其幾千百所凡顱圓趾方號物之靈者苟能撤胸中之自蔽而向之莫不在大光明中隨求而隨給信乎其充塞霄壤也原其始動之機實自此水遇二仙飲以一杯之力而發之故洞眞眞人于公卽其地立其宮以志之也而洪儒鉅筆復賦詩以美之天樂道人李公和甫請予爲序予乃爲之說曰水之爲物自兩儀奠位之始人非水火不生活其濟世之用水又居火之先是有利於世者莫過於水雖然此但水之常也物莫不有常亦莫不有變變則神常則不必論變則有所論至論水之變又於神與非神之間有不可測之理學道者不可不講也謂水之神耶貪泉之水不能改夷齊之淸若之何而神謂水之不神耶上池之水而能化扁鵲之醫若之何而不神予謂此神化天運之機祖師本全之於未始有物之前伏而不發若有所待一旦遇此可發之地鶴鳴子和自相感召莫之能禦是以有今日之大也如曰不然自有此水以來其飲之者可勝計耶何獨私於我祖師焉易曰神而明之存乎其人其斯之謂歟中統辛酉𡻕上元日稽首載拜序題甘河遇仙宮正奉大夫參知政事商挺撰子房志亡秦曾進橋下屨佐漢開鴻基矻然天一柱要伴赤松遊功成拂衣去異人與異書造物不輕付重陽起全眞高視仍闊步矯矯英雄姿乘時或割據妄跡復知非收心活死墓人傳入道初二仙此相遇于今終南下殿閣凌煙霧我經大患餘一洗塵世慮巾車儻西歸擬借茅庵住明月淸風前曳杖甘河路陜西行中書省左右司郎中張𧗼上樓閣崢嶸甘水濱重陽曾此遇天眞瓊漿一滌迷雲散醉眼初開道日新遠別西秦勞玉趾徑歸東海釣金鱗存神過化如時雨重與玄元繼後塵翰林待制孟攀鱗上道源將啟寓眞筌會際因緣豈偶然雲本無心閑出岫珠由罔象得成玄二仙秘訣歸親授一飲神機已默傳唯有善淵流派遠紛紛滄海幾桑田京兆府學教授李庭上湛湛溪流漬古苔仙眞相遇此徘徊一瓢玉液逡巡就七朶金蓮次第開雲海難尋歸去路乾坤惟有刼餘灰只應華表千年鶴會爲家山一再來陜西漢中道提刑按察使王博文上才出山垠可濫觴派流至此便汪洋前滋琪樹七珠秀後長金蓮萬朵芳勾漏莫誇丹井味南陽休詫菊潭香問津誰有重陽志試酌淸泠正脉嘗宣授樞密院參議陳邃上蒼髯如戟眼如冰凜凜丰標漢𡻕星應是老仙元有分更遭羽客解通靈一瓢神糞開玄境萬古中原拜祖庭聞道刼餘糜爛者多因此水救來醒翰林直學士中順大夫王利用上外全乎人內全乎天白玉在石玄珠在淵海蟾一照重陽卽仙道以水悟水乃道筌人勿自棄甘河有泉洛陽宰沂上休羡曹溪一勺甘西江吸盡是空談遇仙橋下洋洋水正派元來有指南派出終南不少休源泉混混遍中州反涇合渭東歸海要向蓬萊頂上流未遇仙眞可奈何易牙有口謾蹉跎操瓢試向橋邊飲水味過於酒味多翰林直學士知制誥姚燧上終南山下甘泉水我挈瓶嘗井泉比如何仙翁酌飲人一唾世上無醪醴是何濡軌不成川北流赴渭朝宗然東海相絶幾千里餘波開七黃金蓮河之源委人不見味更幽眇人豈辨仙翁乘雲能再來醉棄餘杯須一吮嘉議大夫安西路總管府尹李頍上大道茫茫隔幾塵世途何處問迷津自從一飲天瓢水迴首西風已悟眞魏叟求仙萬死中長房何苦遇壺公爭如一滴甘河水便有超凡入聖功安西路總管府同知王贇上玄元遺教五千言萬古應難得正傳大道杳冥還有本至人遭遇豈無緣堪嗟漢武空巡海可笑王喬浪學仙誰識終南山下路一瓢甘水是眞筌安西路總管府判官寇元德上布衣落託酒錢麤曾遇仙翁倒玉壺鉛汞有蒙傳祕訣聖凡從此頓殊途消冰作水元非異點鐵成金信不無千古甘河河上路紅塵擾擾嘆吾徒安西王府說書劉汾題何人畫仙翁醉飲甘河水重陽豐骨變四海玄風起東有丹陽師心從祖庭死長春抱奇氣佐命猶壁壘大教開全眞向慕風草靡全眞有眞樂將相安足擬鬱鬱三神宮分據如鼎峙人間此水在此意能有幾憶昔臨河堤淸映石齒齒雲雷鼓前浪妄意圖染指後派更雄深仰慙天樂子長安客喬在上樓觀森羅紫極雄仙眞去後彩霞空不緣一酌簞瓢水誰解千年五祖功金闕儼遺泰甸月石壇高起漢陵風殷勤重展三薰敬復許驂鸞會故宮陜西興元等路教門提點何道甯上重陽師祖遇純陽秘訣初傳大地香海上七株琪樹秀世間萬朵玉蓮芳天人混合同三昧薪火圓融共一光滾滾甘河東未已了知源遠派流長夷門天樂道人李道謙上萬疊晴嵐倚碧空紫雲深鎖遇仙宮三山飛劍人歸後四海全眞道化洪夢斷鶴鳴丹井露醮餘旛舞石壇風世間萬朵金蓮秀盡出甘泉灌溉功前諸路道教提舉衞致夷上開張道運發天機邂逅眞人若有期紫極寶圖陰付授玄元神鼎重扶持陶君謾訝遷都水扁鵲虛勞飲上池一自甘濱遭際後仙風弘衍遍華夷安西路道門提點孫德彧上鄭圃南華去不還猶龍心法失眞傳道微千古傷分裂天挺重陽出大全甘水降神冥海外至人相契赤明前誰知一醉玄風起吹綻黃金萬朵蓮後序門人建安張好古撰紀錄之作多矣雖復窮今極古波委雲集而事或繁冗言必瑣細識者病焉吾師天樂眞人自養浩祖庭典教秦蜀應事接物之暇每以著述爲心獨念重陽祖師開化以來教法如此其盛其出自全眞門下者名師耆德項背相望仙鄉道館什百爲耦金石之所載莫不流芳於無窮然大而天下遠而四方人固罕得而徧窺之也乃因所厯遇有當世名賢所修之文親手抄錄若道行若宮觀其爲碑記傳贊凡九十餘篇皆事跡超邁辭章雄雅足以取信於天下後世者裒爲一編目之曰甘水仙源錄蓋甘水者祖師遇眞之地仙源者全眞正派之傳是編之作亦猶道學諸公所著伊洛淵源之謂其取名也甚宜矣近方鋟梓以廣其傳予小子忝任校讎之責自夏及冬首尾厯二十有六旬有六日工旣訖功復以後序見命予思師之用心其所以扶植玄綱弘揚祖道誠非小補使有志之士新獲覩是書不惟有以知前人功業之盛又固足以見諸儒信與之公不出戸庭而玄元之心法求之有餘師矣源流靡已何代無人後之視今焉知不如今之視昔嗣而緝之庶幾斯傳之不朽也𡻕在己丑冬至後六日拜手稽首謹書重刻甘水仙源錄卷之十
