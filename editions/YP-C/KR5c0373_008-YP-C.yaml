front:
  text: 甘水仙源錄卷之八
  hash: sha256:1bbbc6d02266083386eba332c0ff6362752ed49f2f645e9f826f90c58cf9ce26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_YP-C_27yiji-03-0040a, image: JY295/27yiji-03-0040a.png}
body:
  text: 純成子李君墓誌銘宣授懷孟路提學李蔚慶之撰講師李君没其友申公都提舉以告且曰講師操履堅正德業冲粹人所共知臨終以後事見託經營宅兆今已安措不有銘辭無以慰諸幽願詳其所聞而誌之講師諱志全字鼎臣太原太谷人少業進士父洵直以經義中明昌五年第講師挺志不羣守箕裘之舊孜孜講習視富貴如探囊中物也當立之年不意世變干戈日尋無復進取遑遑如也當時天子好長生之道不遠萬里召見邱長春賓禮至厚玄風大振聞者皆興故講師所以歸心依河陽張尊師爲引度長春西迴策杖徒步謁見于奉聖龍陽觀授以道妙曁諱名自是山居有年名聞籍甚其後東萊宋披雲以所在道書焚於劫火奉朝旨收拾於灰燼之餘散亂無復可考求博洽異聞之士俾校讎之迺得講師始終十年朝夕不倦三洞靈文號爲完書功亦不細教主李真常奉恩例賜公純成大師提舉燕京玄學未幾復還天壇舊隱徜徉巖壑將終老焉忽以昇聞中統二年六月日也享年七十有一平昔著述號酎泉集三十卷行于世又集七真及已下諸師詩賦二十卷目曰修真文苑嗚呼士嘗論之以君才學取一第不爲難矣世方擾攘河朔尤甚自保不暇度日如年壯志衰謝甘埋於塵土誰爲知者冺滅無疑也迴視埋没于草萊湮滅無聞者爲何如哉乃作銘曰于嗟純成幼戴儒冠讀書幾載校藝秋官誓將一舉九萬鵬搏運有定厄世無常安幡然學道秉心如丹長春西迴景星爭觀徒步千里一見相懽授以道妙佩服馨蘭苦心修鍊幾換炎寒要遊玉京此事無難三洞寶典灰燼遺殘校讐十稔書始爲完拂衣高蹈雅志林巒卻歸舊隱終老盤桓無何仙去聞者悲酸刻諸琬琰過者詳看當知道中自有鳳鸞洞觀普濟圓明真人高君道行碑安西王府文學姚燧撰我元自太祖聖武皇帝視邱長春有道聘爲玄門宗厥後太定憲三宗及今皇帝皆稟孝自天善繼以述雖長春返真不虛其位命尹淸和李真常張誠明王純真與今張玄逸嗣焉而迭居之如邱在太祖世其徒認縣官崇禮斯道之盛語其師之居不敢斥必曰堂下然堂下治京師而祖師之藏與夫成道之廬則在今終南山之劉蔣自堂下視之猶木根而水源必茂浚乎此乃始不憂傳脈之不盛故凡四方走幣堂下爲香火之奉者必割畀而實之祖庭待以興化弘教之須豈惟是爲然惟人亦然苟可以任興化弘教之責亦必擢置祖庭受事之際不令拱手肆志于無用之地嗚呼才有大細故任有重輕德有著微故居有久近自秦而夏而梁而蜀治轄恒半堂下其任如彼其重也自庚子從洞真入關今兹四十年職道教者獨再紀其居如此其久也則夫爲才之大爲德之著尚待言說而始白之人耶君姓高氏諱道寬字裕之應之懷仁人其世夙豪於財而系則不詳幼業讀書能通大義焉長爲吏長安丁內外艱始棄室爲黃冠師其從受學三人始則安蓬萊淪其源繼則李冲虛大其流終則于洞真會其融而導其歸故遊洞真門最久洞真亦恃君有受而克大其傳也旣告以道德之微言又授上淸紫虛之籙賜號圓明子署知重陽萬壽宮及提點甘河遇仙宮𡻕壬子真常擢爲京兆道錄者十年中統辛酉誠明薦之朝制以爲提點陜西興元等路道教兼領重陽萬壽宮事至元辛未純真易子爲尊師加知常抱德於圓明之上丙子天后皇子安西王各錫黃金雲羅冠服一被教令又益以西蜀道教猶仍圓明第易知常抱德爲洞觀普濟尊師爲真人以明年丁丑春正月二十有五日上征逆而推之盡金明昌乙卯秋七月十有九日爲閱春秋八十有三而藏冠屨於仙蛻之園云其年五月嗣真人李天樂實狀其行俾道錄郭志祥持示燧曰真人之德宜顯詩之將維子是請也燧曰嗣真人與道錄之言不可辭讓況及先真人風槩之一際乎乃遂詩之其辭曰緊昔君生應之懷仁後由兵興避走而秦幼知讀書長而試吏束於親存供爲子事棘棘時艱風樹悲纏乃斬慈愛一志求仙中夜耿光天門啟奧瓊屋磊嵬飛揚葆纛是皆平日積想之爲初匪高高善幻爲斯以君達觀能不是覺蓋以自信精神之確伊誰云師迺卽安君望粗有見要眇靳聞久之于于東亂汴水丹陽之孫冲虛是倚及門不屑示教多方軋以擊摧觀其競疆納以濁垢察其茹受積久不移用視持守投畀井臼臧獲所難人勉於暫君久益安積信冲虛待目日改作新授付已密有在洞真徵車旣牽旣膏庭議具虞翩其避逃乃勅冲虛悃欵相布使就其徒擇爲行輔冲虛戒君中使與西曰惟若人丹陽耳提穴石吳嶽聞道日躋彼伏鵠卵知求魯鷄子今幸際猶昇有梯竟偕洞真自隴而汴趍風後塵聞見再變洞真留主中太一宮君遂不去几舄與同玉步旣改君始北邁結廬德興規以自晦洞真逾燕挈徒而東衍教白霫召君來從曰子爲道輕世自足偃蹇雲山其過乖物其反子者同塵無猒徵逐府寺其歸附炎二者揆道無一而可由先失人後則忘我安知至人與世斡流浚其靈臺與理充周余也誰昔子外之病教之無爲恬澹虛靜上而人天性命之原欲子內服玄聖之言子守是說膠轕拘礙囿於一小曾未聞大修身有得及物利生鈞之爲德何害並行勉出酬應無憚而退若金用礪磨鈍而銳小子識之劬心自荷君拜稽首受訓不那又從會葬祖師劉蔣關中刳兵所在榛莽白骨陵邱熊虎爲羣作室幾時雄樓切雲後爲終南勝槩之甲君時佐用身任寡乏行裒四方言能動頑虛馬與輿出以實還勞則夥矣略而不有鼓鍾于宮譽者盈口洞真亦期可振玄風署知重陽甘河兩宮真常拔之俾錄道教廣員千里實長京兆蝟磔琳宮簡其條章草靡風行教益奮張誠明奏制提點延慶隴秦山南治轄之廣孰非開府皇子異諸裂地之多古先有無帝曰欽哉汝有河外官惟其能承制自拜乃降教令益之兩川蜀凡道流曰始願焉嘗觀爲治教難政易政恃賞刑民有勸避教以道民孝悌之興難也烏在身先未能矧乎教道難者之又如適斷髮鬻髢求售彼捐彝倫何有於師無賞以訹無刑以隨來則受之去不越逐總總而居從厥攸欲自非其道不今而從孰久不斁賤貴歸心嗟君居此厯逾再紀年八十三隤乎順委冠屨安墳仙蛻有園誰其嗣君君有顧言旣謂天樂子余所厚匪我私之子藴之茂畀汝印奩賜服命書子欲不取人疇汝踰高風日邈皇子悼怛卽命天樂從君顧託立君之位師君之爲猗哉皇子終使君知北山之石貫古不朽有龜作趺有螭絡首于以樹之淸渭之陰刻此銘詩式耀來今太華真隱楮君傳安西王府文學姚燧編靈臺真隱楮君幼業儒長而遭時艱求所以託焉而逃者寄跡老子法中受學劉真常棲遲不在城邑多名山中如保之葛洪瑯瑘之七峯應之嶽神無常居焉後由真常主華陰之雲臺宮始從之西真常逝而徙上方留弟子主雲臺華嶽也爲山益奇上方又天下之絶險自趾望之石壁切雲霄峻削正矗非恃鐵絙不得緣縋上下不知鐵絙成於何代何人意者古能險之聖也將至其顛下臨壑谷深數里盲煙羃翳其中非神完氣勁鮮不視眩而魄震君負食上下自給如由堂適奧嬉然不爲艱薄寒則上下負食益勤爲禦冬備一𡻕偶未集氷雪塞山門計廪纔得常冬之半始服氣減食爲胎息遠或數日一炊明年山門開弟子往哭求其屍見步履話言不衰他時方神其爲非庸人伺下山止之曰不可復有往也已設向師食不繼僵死氷雪弟子雖有啄何說自白其能孝於天下必勿復往也已君難逆其請指牛心谷曰此漢太尉楊公震授徒之槐市也或聞而稽疑其傳止得公嘗教授胡不見其居華陰者不識君何據曰然谷南直中方入行二許里深林奇石泉淺淺鳴其下墾地盈畝構室延袤不足尋丈環蒔佳花美箭人之來者始則愛其蕭爽不自知置身塵埃之外居不移晷旣已欠伸佗然而思去矣君又屏弟子獨居或勸宜留一人自佐曰吾居此樂彼居此戚所安先不同猶疆而留之能勉期月之外要終相棄去吾故與之爲約非舂糧採薪之至絶而繼具而去亦古之君子以人望人不竭忠也其出山還雲台必以水氷無所仰飲十月爲候二月還谷性嗜讀書逾熟左氏博議日食數龠飲酒未醺而止不盡醉也人家得名酒爭攜餉之至則沉罌泉中時依林坐石引瓢獨酌日入則入室而休或坐罷寢覺起行庭中一夕如聞林間行聲戛戛君則曰獸也雖不得其名可試而知引石投之曰麋鹿哉將驚而奔或止而不去者虎耳果止聽不去明旦視樊垣外虎跡縱橫再夜走行如前夕不以自戒而止聞而談者神明之亦有他土樵人獵夫之適山初未聞君爲孰何人責之具炊寢則假榻甚者易而詬咄隨之益勤以安無難色忿言其外若職宜然者去或問姓名惟他語不告終問之則曰吾求知人耶必求人知而求若知耶吾居此在人所不問而吾所不告也人見其苦身不近人情如是然不違俗上自王公而下及臺皂爭以一際顏色爲快燧亦嘗一再造廬焉告以人間聲利泛如秋風之過耳噤不酬應叩之山間爲樂何如必盡舉平生所見好石幽樹佳泉危棧亹亹忘罷若幸夫人一往而我能先之者相舍以出覺胷臆塵鄙如雪之見睍消釋無留餘者數日益信夫遊方之外有恬愉靜退之士如君者罕類例求也君名志通字伯達名聞天聰俾禱水旱有應不爲沴賜號佑德真人提點嶽祠灝靈宮又以嶽祠風雨將騫內出鈔萬八千鏹爲完輯費三年物易而新飾漶爲翬過者改觀始有應務之才特韜之耳年八十德益深聞益彰聖皇思見益急當𡻕己卯至元十六年詔中使起之北面受命稽首曰草莽之臣通也自知審矣疇昔壯也言不足以資廊廟擇力不足以疆禦侮今老矣先狗馬填溝壑晨夕雖蒙冒龍光力疾以行終不達恐傷陛下仁及草木之化是以昧死請中使竟虛車而返今李大參公號知君深且樂誦人善者戒燧傳之無俾不聞於今而泯於後焉公名德輝字仲實前北京等路行中書省今以中奉大夫出相安西府云洞玄子史公道行錄慎獨老人東明前進士王鶚撰公名志經字天緯絳州翼城人世習儒業祖彬字執中父公佐字良臣皆隱德不耀公以泰和壬戌𡻕生生而夙慧雅有道緣六𡻕從里人吉德居讀書屬句天資穎悟夐出儕輩貞祐甲戌翼城再䧟流寓于雲中主完顏氏家渠見其不凡養以如子興定辛巳遁跡投玄禮恒嶽劉真常爲師師一見器之事必諮委𡻕癸未長春大宗師應詔東還公從其師拜于阿不罕私第長春訓以今名自後道行日隆盤桓于蔚代朔應間研精問學弊衣糲食晏如也丙申淸和老仙洎京兆總管田侯議葺西嶽雲臺觀勸請真常師師許之間遣門人輩斧荆榛輿瓦礫不數年漸至完美雲臺道眾擬公住持而未許也辛丑專价持書控馬來邀公雅意西遊欣然就道秋八月達華封公以華山名嶽靈跡甚多兵戈相尋至于湮没乃搜奇訪異親厯見聞至古今名士所作碑記表傳詩文極力求之期于必得而後已於是著爲華山志十有四卷丙午真常羽化公詣渾源哭之且心喪三年己酉拜于洞真真人參受經籙庚戌掌教李真人屢以書請辭不獲已來燕玄學講餘間受易老微旨辛亥從真人北覲例賜紫衣加號弘真宣義大師壬子復從真人徧祀嶽瀆戊午東遊海濱謁七真故居訪重陽祖師行化遺跡癸亥春自登萊還燕公平生喜著述爲文不事雕篆率皆真實語前後累數百萬言皆有理致可觀無長語浮辭惟華山一志纖悉備具尤爲盡心在他人不可及觀者當自知之方劉真常之將歸也遺言葬諸翛然堂襄事旣畢公自來燕因魏學士邦彥禱予作記時已飽公之名予頃年往來長春與公良晤乘閑求予作華山志序予謂龍谿孟駕之旣作之于前而蓮峯太霞老三洞講經趙法師又皆發明于後予再言之贅也惟公平昔道價至老益振於是不可不書乃爲書其出處大略使後之學者可以述追遐軌而執筆誌高道者或有考焉𡻕旃蒙赤奮若春正月丁酉謹錄史講師道行錄後跋文筠溪天樂道人夷山李道謙撰講師洞玄史公余自弱冠始識芝眉于太華後旣會於終南又復會於燕山中間音容契遇簡牘往來者逾三十載公以至元癸酉冬自燕還雲臺再年甲戌秋七月仙仗來終南炷香祖庭出所述長春宗師慶會圖託余爲序而彌綸其闕因得與公焚香談道樽酒論文從遊乎數月逮季冬初吉座中屢出長別之語幡然東歸而堅不可留今年乙亥春聞公於正月四日以後事囑諸嗣師寂然楮君神遊于所居之松菊堂矣享春秋七十有四嗚呼異哉公先自庚戌𡻕承掌教真人命遨遊四方遠越二紀以著述經傳扶植玄教爲己任高名揚海宇偉跡徧天下老年轍還故隱翛然仙去可謂人能弘道道不負人者也是𡻕日南至公之門人劉志新持翰林學士承旨王君作公道行錄丐余續其後事將刊貞珉以垂不朽余亦景仰公之有道故樂爲之書泰安阜上張氏先瑩記濟南杜仁傑撰布山之陽有邸曰阜上阜上之民有張氏家以財穀雄里社當前金正隆間人夥地狹往往無所資衣食唯張氏有田若干畝有牛若干角然能周急繼困過客無問貴賤館之如一當時遂有長者之稱張氏冡男諱林者因卜新塋於阜之西南三里許卜者尹通實相其事林問通曰是葬也有何徵兆通曰比襄事時有一縞兎起巽方走乾位及窆果應續謂林曰君家三世之後當有異人出子不復能見矣林生彬生仙祚胤始大仙生四子孟曰榮仲曰平季曰山其第四子方在孕未朞月母劉氏見茹葷者輙掩鼻而去及劬勞之日若昏聵然有人疾呼曰長老在門首汝當敬謁遂出見一僧坐馬上合爪言曰我必飯于而家覺而舉一子骨法殊不類凡兒甫齓並不飲食肉人乳亦異哉六𡻕習神童誦五經畧皆上口然不樂居家十二去父母入山學道禮真靜崔先生爲師得法諱志偉號天倪子發辭吐氣已不在丫蓬老輩下不數年道價騰滿齊魯間時東西諸侯皆出於武弁見之無不屈膝東平嚴武惠公以𡨴海范普照住持萬壽上淸宮輿議以謂治軍民如武惠掌道教如普照可謂無前矣必得峻潔知辦如張志偉者以貳宮政斯可矣至三謁然後惠然居無幾廢者興缺者完惰者勤慢者敬凡所應用無一不備僉曰稱哉已而驛稟朝廷賜號崇真保德大師授紫衣緣以金襴報之也于是慨然拂衣復還布山之舊隱間與故人畢淸卿對榻以談方偃息間頃縁泰山之阿入西溪谷若有人前導者由淵濟公祠至竹林寺樓觀參差如在天上從者四五輩皆素所不識覺而告之畢曰果有是耶其年七月武惠公以書來召因論泰安之爲郡蓋前古帝王對禪之所其宮衞其輦輅其祠宇自經劫火之後百不一存良可悼惜下官忝在其境不粗爲修葺之甚非所謂事神之義也敢以大師道廕爲我綱維是事乃所願也師傴僂致辭曰某一空山食菜道人何敢承當武惠答以工匠之役木石之資與夫綵繪丹雘之費我盡領之師無讓爲遂諾之經構迄今三十餘年無空日故自絶頂大新玉女祠倍於故殿三之二取東海白玉石爲像如人然一稱殿之廣袤天門舊無屋又剏立之下至會真宮玉帝殿及聖祖殿方丈廊廡齋㕑皆不與焉外則岱嶽朝元等觀皆增修有數抑亦勞哉若夫師之寢處衣食與役夫等是以人忘其死而成師之志雖國朝爲之亦不能齊一如此有司聞之特加崇眞明道圓融大師之號兼提點泰安州教門事復於中統四年蒙燕都大長春宮掌教誠明真人專使齎奉聖訓委師提舉修飾東嶽廟事予自壬辰北渡後往來於奉高者有年矣夤緣得與師交際其相與之意甚厚且嘗有同老泰山之約一日以乃祖先塋記見祝予敢不敬從如吾師者退然才中人癯瘁若不能勝衣然問無不知叩無不應若乃芥納須彌囊括宇宙不足喻其胷次橫闊之萬一乃以區區土木之功相溷何其不知師之甚耶雖然諺有之一子愛恩祿及滿家一人成道超昇九族或有此理向之所謂白兔之示現老僧之託化泰山之神遊今則驗之噫信乎其爲張氏之異人也明矣他日委蛻而去羽化而仙凡爲而徒者如欲紀其出處之大畧請以先塋記爲證云終南劉先生事蹟先生姓劉氏諱志源道號淸泠子相臺固縣人也家故饒財夙喪其父昆季三人奉孀母以居先生自幼不凡有瀟灑出塵之想及母氏終天盡三年之喪於是徑詣澶州洪洋山郎尊師席下改衣入道自此心地益明志行苦卓嘗往來於開滑間衣弊足跣人不堪其憂先生自以爲樂也其兄聞之初未之信一日以縑一東置於路潜隱窺之先生過而不顧兄乃嘆異始加敬服崇慶間東遊鐵查山謁玉陽真人得授祕訣無幾金天失馭山東郡縣自相屠戮時先生丐食於賢堌堌地頗高其下有穴可容數百人北兵奄至近堌之民俱潛穴中先生端坐其上寇亦莫能爲害如是數年一方賴以全活民到于今稱之先生又于澶淵之鴈華臺鑿龕而處時大軍之後豺狼徧野晝而食人先生泰然不以爲怖龕之左右常有數狼馴狎似相守衞之狀老氏所謂善攝生者虎無所措其爪兵無所容其刃先生有之癸未冬長春宗師奉詔南下先生迓於宣德長春一見深許授之以履令勿跣步仍委提舉大名路教門事由是道價益隆度門弟子數百人建立庵觀百有餘所乙未淸和真人祀香祖庭明年還燕召先生謂之曰終南山上淸太平宮乃翊聖真君示現聖跡宋朝勅修名宮也兵亂以來偶墮灰劫非得福大緣深之士莫能興復公可往任其責且以輔翼祖庭爲務先生承命遂挈徒入關至則披荆剪棘伐木購工數年之間殿堂廊廡粲然一新遠近莫不稱羨噫若先生者其在玄門亦可謂有功者矣癸卯秋九月二十三日留頌委蛻而逝享壽七十有四葬於終南縣城之南長春觀壬子掌教真常李真人祀香祖庭奉朝命追贈爲純德妙成真人云淸平子趙先生道行碑祖庭大重陽萬壽宮講經師張好古撰全真之道一言可以盡之曰誠而已誠者實之謂也厯觀重陽祖師以下諸仙真或立觀度人或扶宗翊教所以積功累行而令名無窮非誠實無妄其孰能與於此乎淸平子趙先生卽其人也先生諱志淵單州人自幼舉止不凡雅好恬澹甫及冠父母俱喪聞滕州靈真子馬尊師有道之士徑往參訪願留而受業於門靈真厯試諸難以苦其志薰鍊旣久玄機祕訣悉以傳之先生於是辭雪巖遊𡨴海玉陽一見器許而道價日增矣大安崇慶間先生避兵王屋山草衣木食不變所守後聞河朔旣定行化諸方以誠感人所至景慕大元癸未長春宗師奉詔南下詣謁於燕山特蒙奬異且以修真觀俾居之先生每日一造師席聽受談演故於九轉七返深根固蔕之妙了無疑障及長春昇始從洺州僚庶之請主持神霄萬壽宮先生應物無心到卽緣契至若大名磁相之間度學者凡數百人立庵觀十有餘所然猶執謙樂退未嘗以師名自居乙未掌教淸和真人祀香祖庭先生亦來就見明年淸和還燕留先生充提舉時關中兵革甫定𡻕且飢祖庭道眾屢欲委去賴先生訓以功行化以罪福方便誘掖內外帖然丁酉淸和以書遺先生曰驪山華淸宮古仙聖跡自來國家崇奉祈福之地若非門下老成人孰能主張君年深在道有力於教門可以提點事任修復之責因賜淸虛大師號先生旣受命乃率其徒芟剪荆榛葺整屋宇丹堊藻繪粲然一新又建遇仙觀於終南山之蔡村以輔翼祖庭之勝跡其他一庵一宇在在有之辛丑會葬祖師畢東歸洺州癸卯神霄宮大殿告成天爲降瑞眾皆稱賀先生亦不以爲異初先生之在祖庭也與淸泠子劉先生爲莫逆友是年冬淸泠之門人有自魏府來者報其師已於九月二十三日返真于終南矣先生以季冬朔旦啟行欲詣魏府致遙奠之禮暮宿廣平遽然嘆曰觀物之化不知化及我也卽還宮召門弟子曰昨夜師真有命令吾速歸祖庭吾其逝乎遂以後事付張志靜索紙筆留頌曰修行端的要工夫鍊就丹砂不用鑪擺手便歸雲外路高穹風月自如如置筆而化實初三日也春秋七十有七葬於州城南之道院後四十六年至元戊子春華淸宮提點李志通遇仙觀尊宿楊志素提領蘇道常等以其法屬講師呂志真爲介紹持狀來謁曰吾祖淸平老人𡨴神于東州有年矣惟是陜右門徒設祠置像以奉𡻕時之香火雖未嘗絶然道行之碑至今未有能立者豈非不敏之過歟敢再拜以銘辭爲請予謂銘所以紀德也先生之德有足銘者蓋先生爲人純素篤實藴之爲德行行之爲事業終身出處無一毫牽合之私以是觀之真可銘也已若夫主醮之際鶴現於邯鄲示寂之時神遊於京兆改葬而容貌不變設齋而丹童遐臨其靈異類此者甚夥是皆出乎自然非先生之本心故直敘其大槩而銘之銘曰大哉至道初無形中藏妙用由人弘重陽扶起先天局開化獨以全真名群仙瑞世相繼承扶宗翊教教乃興粵有人焉號淸平善根宿植粹且精妙齡學道已有聲再遇長春心益明內丹養就居磁洺門徒濟濟來不停拂衣遂作關中行淸和一見稱老成華淸久廢託主盟坐視瓦礫成丹青遇仙創始親經營至今勝槩光祖庭功成東歸遽飛昇乘風馭氣何泠泠先生之名莫與京先生之行純乎誠我作銘詩非虛稱庶幾來者永有徵知常姬真人事蹟師姓姬名翼字輔之澤州高平縣人系出長安雍氏有唐故孝義雍睦前沔州別駕雍府君卽其祖也後有官是邑有因而家焉至金世宗卽位避御諱易爲今姓師始生其母夢仙人授一玉石吞之覺而卽孕師自幼雅重識者知其不凡四𡻕讀書九𡻕考妣俱喪比年十三而能詩賦甫弱冠天文地理陰陽律厯之學無不精究辛巳天兵下河東澤潞居民半爲俘虜師孑然一身流離竄徒寓冀州之南宮甲午棲雲王真人演教諸方道出於此師一言相契遂執弟子禮賜名志真號知常子自是從遊盤山頤真養浩大蒙印可壬子𡻕掌教真常李君起置玄學於燕京大長春宮師亦與其請日與四方師德遞主法席後學之士多賴進益甲寅春棲雲來燕赴普天醮事禮竟挈師還汴梁居朝元宮無幾棲雲登真以師嗣主教事至元丁卯春二月聖主降詔云姬志真德行貞良文學優贍易垂直解道入總章早師萬壽於盤山晚主朝元於汴水稔聞操履宜先褒崇可特賜文醇德懿知常真人之號尚體綸章永祈國算師以明年十二月三十日示微疾而逝春秋七十有六所著詩文曰雲山集及道德經總章周易直解行于世云延安路趙先生本行記朝列大夫守延安治中賜紫金魚袋張子獻撰夫人之所以得大自在者以其了達生死去來不有凝滯而然也昔禦寇乘風而行泠然善也南華以爲猶有所待若夫乘天地之正御六氣之辯以遊無窮者彼且惡乎待哉今延安趙先生所謂無待之人也先生名抱淵道號還元子俗呼曰魔哥延安之鷄川人家世業農屨積陰德先生自幼不凡志在方外嘗遇有道之士謂之曰汝夙有善緣我今傳汝祕訣勉自修習終當有成遂結庵以居事母至孝鄉黨共稱之後因戴柏高師父引詣劉真人席下得授心印隱居陽山一紀不出先生素不讀書忽一日夢真君召賜金一席辭而弗受復以道德二篇付之先生卽吞之入腹自此性天明朗心地開通聞所不聞知所不知詩詞歌詠若湧泉之流注因述歌云昨日庵前遇莊列二人點我長生訣又云尋箇知音尋不得野人獨步下秦川遂來終南參重陽祖師玄機密旨大蒙啟證後厯名山勝境落魄不羈寓意於詩酒之間自稱太上弟子至晩年還鄉於迎祥觀住坐泰和五年甘泉縣道友敦請先生住庵乃作無夢令詞答之其末句云相別相別來𡻕春分時節時人莫曉其意俄爾次年二月初四日上遺二使者奉冠服召先生赴闕先生固辭曰吾一老村夫耳莫難行焉使者堅索登程先生與道友党珍及門弟子言我且當迴避遂沐浴正衣冠而坐至三更忽覩電光滿室聲震如雷眾皆驚駭奔往視之則先生儼然而逝矣留頌云松梢皓鶴向風冷只有翻雲歸去心萬里青天一片雪儘教華表柱頭尋是夜正屬春分之際誠有驗於詞中之語享年七十有二平生述作集爲混成篇傳於世噫昔先生陽山養浩一紀不出豈非御六氣之辯者哉捨綸召之榮而蛻殻飛昇又豈非乘天地之正哉斯不亦無待之人獨往獨來而得自在者予故曰人之所以得大自在者以其了達生死去來不有凝滯而然也庸不信夫先生示滅之後來使繪真容以復上命時先生已預赴闕矣使者具告其事朝廷莫不驚嘆復遺使馬進章齎持賻物與合郡官僚卜於迎祥觀西鑿石爲洞高棺厚葬建祠樹碑用彰仙跡使有四時香火之奉焉來使索予作記以傳不朽僕自顧不才安敢當此然忝竊朝廷之祿敢違來使之命且景仰先生之高風恨不得再見於是乎奮筆以書其實事云洞元虛靜大師申公提點墓誌銘建安張好古撰公名志貞字正之澤州高平縣人幼讀書中經童舉辭後流寓太原遂廢干祿之學易衣入道初從超然子王君遊後處燕京大長春宮禮真常李真人爲師真常得公甚喜授洞元子號且以詩贈之曰一志守其貞出塵功可畢時恕齋王先生納庵張內翰以宏才碩學棲止道宮公復於暇日就聽講論由是德日進而名亦彰矣庚子真常宗師委公任官門事號稱幹濟甲辰宣差裴天民奉詔諸路降香以公爲輔行還燕陞宮門知宮蓋嘉之也戊申宗師以恩例賜紫衣遷充宮門提舉辛亥奉旨代宗師詣東嶽作醮禮成投簡龍潭殊獲徵應甲寅以提舉教門事從宗師徧祀嶽瀆明年復從宗師北覲又明年宗師猒世誠明嗣教命公宗主天壇上方紫微宮事因自號雲叟逍遙山林若將終身焉中統壬戌永甯王邸久聞道譽特賜洞元虛靜大師之號至元四年丁卯太原府天慶宮懇公主持師席七年冬誠明屢書邀致堂下未幾誠明上仙淳和真人復以道教都提點强公不得已而起隨曳杖南遁厯并汾憩河中所至留請者甚眾壬午西遊祖庭增葺終南山傳村長春觀以爲菟裘焉忽以微疾順正而化享年七十有五實甲申𡻕七月二十三日也公爲人儀貌秀整器識宏遠所與遊悉聞人名士雖真常掌教凡事必委于公而公亦以輔翼玄教爲己任至若朝覲往來厯陰山數萬里之險略不以艱苦爲念人或訝之則曰吾不爲玄門肯如是乎在燕之日未嘗不用力於祖庭良以報本故也平生不移所守故凡得喪禍福無足以撓其心者閑居則左琴右書自適其樂又善於應接無問貴賤長幼莫不得其懽心然察公所行皆當理事所言惟真實語畧無纖毫貪徇之意方之古人斯亦可以無愧矣旣殁門人魯志興集所爲詩文得一十六卷號曰濩澤蒙齋集傳于世一日志興具狀以墓銘見請予方固辭而天樂真人亦爲予言曰此老在教門中可謂盡力者汝其銘之毋讓予曰諾遂敘而銘之銘曰嗟哉申公氣大而剛作事可法出言有章由我者吾而道義是守不我者天而得喪俱亡若人者將盡力玄門歸而愬諸帝旁耶吾知其挈所有乘所遇以遊于世而卒返其鄉者也
