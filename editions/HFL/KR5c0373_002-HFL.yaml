front:
  text: 甘水仙源録卷之二息二
  hash: sha256:dc9e70404f9b558b2ea31434ccc2d79b3e03516cb1113595ce0aee9d990eff9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_HFL_002-001a, image: hfl/0611/0611-070.png}
body:
  text: 夷門天樂道人李道謙集長生眞人劉宗師道行碑秦志安撰夫欲襲氣母含元精探混茫窺杳冥縮地脉抽天扃毫芒太虚塵芥無垠鞭烈缺笞靊窿躐汗漫肩鴻濛萬物之所待而成一化之所係而靈者豈尋常下士蹇淺小夫之所能哉今夫東萊長生眞人卯金右族炎漢遺英矯矯雲翮堂堂嶽精湖海不足以盡其涵容星斗不足以極其高明乃祖乃父世居武官好陰德樂推恩恤寒餒惠孤惸捨良田八十餘頃與龍興巨刹以爲常住種福之根當前宋太平興國間朝廷嘉厥孝義旌表門閭蠲免租征光照連郡天不負仁自紅霞丹景中選擇其仙材之精明者降瑞於掖城既挺世也謹事孀母特以孝聞誓不婚宦憎華醜榮清淨自守希夷若昏顧世間物無足以撼其胸中之誠屨辭故山欲訪異人而慈親盻盻然未之許也大定己丑之春忽於鄰居壁間人所不能及處揮灑二頌而墨跡尚新不留姓名其末句云武官養性眞仙地須有長生不死人先生嘆賞其筆力遒勁疑神物之所化成而未能决其信情是歲九月霜寒露清重陽祖師杖屨西行携丘譚馬三仙之英度海島歷山城先生聞之竭蹶而趨香火而迎祖師顧而笑曰壁間墨痕汝知之乎三子者亦相視而冰哂方悟其頌乃神通變現之所以相驚也於是鏤肝荐誠刻骨效盟負几杖執巾瓶左右惟命死生自程祖師愛其殷勤美其專精顧其神彩之不群乃嘆曰松之月竹之雪故不受於黄塵贈之詩曰釣罷歸來又見鰲已知有分列仙曹鳴榔相唤知予意躍出洪波萬丈高仍取壁間語意以長生爲之號處玄爲之諱通妙爲之字時方弱冠之明年也丘劉譚馬之名充塞乎九野八絃遊汴梁寓夷門乞食鍊形隱姓理名朝叩暮請行薰坐蒸委曲而挑斡玄機丁寧而啓迪丹經掃惑雲泮迷冰祖師既盡付其四象五行乃遺物離人而退藏于天所謂得知友而赴蓬瀛也四子乃負仙骸報洪恩叩咸陽歷華陰寧神於劉蔣舊廬之坰四子之志各異先生獨遁跡於洛京鍊性於塵埃混合之中養素於市廛雜沓之叢管絃不足以滑其和花柳不足以撓其精心灰爲之益寒形木爲之不春人饋則食不饋則殊無愠容人問則對之以手不問則終日純純定力圓滿天光發明乃遷於雲溪之濱門人爲之穿洞室於巖垠忽遇石井寒泉泠泠衆駭其異先生笑曰不遠數尺更有二井乃我宿生修鍊之所經營也鑿之果然迄今洞宫號爲三泉逮丙申歲復還武官往拜母氏相見甚懽卜太基之陰麓建靈虚之祖堂手植檜柏蒼翠成行居無何鄉里誣告先生殺人輒不辭而就縛坐狴犴者近將十旬純陽祖師聽玉漏駕蒼麟下碧霄入幽囹就枷尾付管城教之習文後殺人者自首先生得以免縲絏之刑比其岀也翰墨絶妙有龍蛇飛舉之形大定戊申主醮于昌陽綵雲覆壇白鶴舞庭是歲也秋旱如焚復披禱雨之誠既登厥壇四望無雲曰來朝巳午之交當有甘澍如傾言如有徵如影響之應形聲自後東州醮壇獨師主盟必有祥風泠泠捲楮幣而上騰其感應也如神迄今諸郡石刻猶存至承安之三年也章宗聞其道價鏗鍧乃遣使者徵之鶴板蒲輪接於紫宸待如上賓賜以琳宇名曰修眞官僚士庶絡繹相仍户外之屨無時不盈明年三月乞還故山天子不敢臣額賜靈虚寵光祖庭迨癸亥歳二月仲春初六吉辰鳴鼓集衆告之以閬苑之行曲眠左肱翛然返眞祥光氤氲瑞氣紛綸所有遺文仙樂太虚盤陽同塵安閑修眞仍注道德演陰符述黄庭奥涉理窟條達聖眞足以爲萬世之規繩披雲宋君龔教軫承法輪吸月之髓餐日之魂啓玄牝交谷神不忘千劫之恩乃紀跨鸞之盛跡勒蒼山之翠珉其銘曰長生老仙主張化權吞虚無吐自然乘紫雲而下遊碧海之邊遇甲子天元之會契重陽多劫之縁撞百關通九泉驅四獸耕三田坐洛陽之市井鑿雲溪之洞天融白雪以成粉熟玄霜而不煙聲名篁鼓於鳳州光華照耀於金蓮構靈虚之紺宇拜朝廷之紫宣還斷東萊之宿債然後骨肉都融而遊宴八騫也長春眞人本行碑寂通居士陳時可撰戊子之秋八月丙午余自山東抵京城館于長春宫者六旬將徙居清和子尹公謂余曰我先師眞人既葬矣當有碑知先師者君最深願得君之詞刻之以示來世余再讓于耆宿且以晚塗思涸不足以發明老仙爲解弗從也乃命其法弟玄通大師李君浩然狀老仙之行謁文于余曰父師長春子姓丘氏諱處機字通密登州棲霞人幼聰敏日記千餘言能久而不忘未冠學道遇祖師重陽子于崑嵛山之煙霞洞祖師知其非常人也以金鱗頌贈之遂執弟子禮尋長生劉公長眞譚公丹陽馬公皆造席下相視莫逆世謂之丘劉譚馬焉大定九年從祖師遊梁明年祖師猒世十有二年師洎丹陽公護仙骨歸終南葬于其故里師乃入磻溪穴居日乞一食行則一簑雖簞瓢不置也人謂之簑衣先生晝夜不寐者六年既而隱隴州龍門山七年如在磻溪時其志道如此道既成遠方學者咸依之京兆統軍夾谷公奉疏請還祖師之舊隱師既至構祖堂輪奂餘悉稱是諸方謂之祖庵玄風愈振二十八年春師以道德升聞徵赴京師官建庵于萬寧宫之西以便咨訪夏五月召見于長松島秋七月復見師剖析至理進瑶臺第一層曲眷遇至渥翌日遣中使賜上林桃師不食茶果十餘年矣至是取其一啖之重上賜也八月得㫖還終南仍賜錢十萬表辭之爾後復居祖庵明昌二年東歸棲霞乃大建琳宫勑賜其額曰太虚氣象雄偉爲東方道林之冠泰和間元妃重道遥禮師禁中遺道經一藏師既居海上達官貴人敬奉者日益多定海軍節度使劉公師魯鄒公應中二老當代名臣皆相與友貞祐甲戌之秋山東亂駙馬都尉僕散公將兵討之時登及寧海未服公請師撫諭所至皆投戈拜命二州遂定己卯之冬成吉思皇帝命侍臣劉仲禄持詔迎師明年春啓行夏四月道出居庸夜遇群盜于其北皆稽顙以退且曰無驚父師是年十月師在武川進表使回復有勑書促師西行稱之曰師曰眞人其見重如此又明年春踰嶺而北壬午之四月甫達印度見皇帝于大雪山之陽問以長生藥師但舉衛生之經以對他日又數論仁孝皇帝以其實嘉之癸未之三月車駕至賽藍詔許師東歸且賜以贐禮師固辭曰臣歸途萬餘里得馹騎館穀足矣制可其奏因盡蠲其徒之賦役師之馳傳往返也所過迎者動數千人所居户外之屨滿矣所去至有擁馬首以泣者其感人心如此及入漢地四方道流不遠千里而來所歷城郭皆挽留八月至宣德元帥邀師居眞州之朝元觀明年春住燕京大天長觀行省請也自爾使者赴行宫皇帝必問神仙安否還即有宣諭語嘗曰朕所有地其欲居者居之繼而行省又施瓊華島爲觀兵革而來天長已殘廢島尤甚師葺之工物不假化縁皆遠邇自獻者三年一新師之在天長也靜侣雲集參叩玄㫖旁門異户靡不向風每醮輒鶴見熒惑犯尾宿師攘之即退舍旱魃爲民虐師祈之則兩應京人歸慕建長春等八會教行四方丁亥之五月有㫖以瓊華島爲萬安宫天長觀爲長春宫且授使者金虎牌持護教門六月二十有三日雷雨大作太液池之南岸崩裂水入東湖聲聞數里魚鱉悉去北口山亦摧人有亦是報者師筦爾而笑曰山摧池枯吾將與之俱乎七月四日顧謂門人曰昔丹陽公嘗記余曰吾殁之後教門當大興四方往往化爲道鄉公正當其時也公又當住持大宫觀其言一一皆驗吾歸無遺恨矣俄而示疾數如偃中侍者止之師曰吾不欲勞人汝等猶有分别在且偃寢奚異哉七日提舉宋道安輩請師登堂慰會衆之望師曰吾九日上堂去及是日留頌葆光而歸眞焉春秋八十明年七夕前一日將葬群弟子啓棺視之師儼然如生道俗瞻禮者三日日萬人悉嘆異之九日醮畢閟仙蜕于白雲觀之處順堂師誠明慈儉凡將帥來謁必方便勸以不殺人有急必周之士有俘于人者必援而出之士馬所至以師與之名脫欲兵之禍者甚衆度弟子皆視其才何如高者挈以道其次訓以功行又其次化以罪福罔有遺者故其生也四方之門人丹青其像事之其殁也近者號慕遠者駿奔如考妣焉及其葬也會者又萬人近世之高道福德兼備未有如師者師於道經無所不讀儒書梵典亦歷歷上口又喜屬文賦詩然未始起藁大率以提唱玄要爲意雖不事雕鑴而自然成文有磻溪鳴道二集行于世云嗚呼浩然君能述其父師之道行若是昭昭然可謂能子矣又豈待鄙夫文之而後著耶雖然舉其大者論之可也我老仙生能無欲没能不壤百世異人也又能以一介黄冠上而動人主如此下而感人心如彼非至誠粹德能然乎長松之見道已崇矣及乎至自印度教門益闢求之古人大略與寇天師相似至校其出處之道大有不同者何哉謙之之受知魏主也自言嘗遇老子授以辟穀輕身之術及科戒使之清整道教又遇老子之玄孫授以圖籙眞經天宫靜輪之法使之輔佐北方太平眞君且有崔浩贊之帝始崇奉老仙則不爾方其未召也澹然海上其與世相忘乆矣一日有詔迎致誠出自然非有以要之也又其所以奏對者皆以道由是推之賢於謙之遠甚是已足銘矣而況道眼之具道行之圓乎宜乎嗣得其人世有如尹公者接跡而出以光揚妙道俾無墜耳謹系之以銘其辭曰全眞一派道爲之源鼻祖其誰聖哉玄元誰其導之重陽伊始誰其大之子長春子子居皤溪一簑六年簞瓢無有人皆曰賢廬于龍門亦復如是羽服來歸如渴于水子誠眞仙道林之天退然其中氣吞大千世宗問道再見松島俄聽還山煙蘿甘老章廟之世作宫海濱帝妃遺經寳藏一新干戈既舉一炬焦土子率其徒往來雲嶼龍興北庭召以使星逮乎東歸道乃益弘方其生也世繪其像忽焉没兮高堂厚葬有子克嗣尹公其人福德兩全偉哉長春祭文定庵吴章撰維丁亥歳七月十五日燕京儒學官孫周等謹以香茶之奠致祭于長春眞人丘仙翁之靈嗟嗟仙翁早歳出家壯而成道九八仙而五四皓無書不覽無事不知九經庫而五總龜天下之老天子之師籍在仙班猒居塵寰舉臂汗漫騎鶴三山名滿世間千秋萬古何者爲住何者爲去嗣教門人結縁道友衰經滿堂如喪父母吾屬蹉跎蒙知最重奠拜靈筵器之爲慟嗚呼哀哉君壽國安師能致之含靈耳目師能啓之水旱爲沴師能攘之師爲飛仙何日忘之嗚呼哀哉尚饗玉陽體玄廣度眞人王宗師道行碑銘并序前翰林直學士奉政大夫知制誥同修國史姚燧撰至元二十有四年歲丁亥秋九月提點秦蜀九路道教天樂眞人李道謙偕終南上清太平宫提點賀志冲李志眞來言伏讀六年詔書令掌教光先體道誠明眞人張志敬執行省節文皇帝若曰自東華垂教至重陽開化朕心慊於追崇乃命儒臣進加徽號教主可贈東華紫府少陽帝君鍾離正陽開悟傳道眞君吕眞人純陽演正警化眞君劉眞人海蟾明悟弘道眞君王眞人重陽全眞開化眞君馬鈺丹陽抱一無爲眞人譚處端長眞雲水藴德眞人劉處玄長生輔化明德眞人丘處機長春演道主教眞人王處一玉陽體玄廣度眞人郝大通廣寧通玄太古眞人孫不二清靜淵貞順德眞人其於誄德述道聖謨天出稱情適中死濡生被道紀光賴永永萬年重惟重陽眞君七弟子有婦人者一餘六眞平生求道之確成道之難尚恐行實流之人間者不託金石無以聞之將來久遠用是以禱詞臣并眞君既傳六人獨是玉陽尚無屬筆敢以累君燧繇職史館以來嘗思古者史臣不要死者之或知不必生者之見求於德於功於事於言見書見而聞書聞信傳信而疑傳疑實録直致俾觀者自判是非於千載下細及龜筮貨殖方技滑稽隱逸卓行猶特傳之況聖皇下詔褒崇有道之眞人哉固宜有述不可以吾儒者不爲其道非職而辭也按事狀及顯異録眞人王姓名處一寧海東牟人以金熙宗皇統壬戌三月十八日母夢丹霞被身而生七歲無疾死而復生由是若知死生說後遇異人坐大石來前撫首與言又聞空中神自名玄庭宫主歸乃敝服赤脚狂歌市中人謂或病失心或識爲無疾將收歛冠巾妻之不可遂與母皆爲老氏法世宗大定八年年二十七聞開化眞君至州願厠弟子列眞君知可授其道爲制今名從居崑嵛煙霞洞又名其母曰德清號玄靖散人明年辭居查山眞君從其徒馬無爲譚藴德丘演道郝太古四眞人者自文登將歸寧海徑龍泉去查山二百里時炎暑眞君持傘自手飛出未脯墜查山柄得陽子三字識其師蹟字書所無若眞君特制之以號眞人後有詩竹通爲七箇又若爲本字五人合竹二人爲七者後居雲光洞志行確苦嘗俯大壑一足跂立觀者目瞚毛堅舌撟然而不能下稱爲鐵脚仙洞居九年制練形魂其長春爲詩頌曰九夏迎陽立三冬抱雪眠亦庶幾其跨火不焦入水不濡之徒歟遨遊齊魯間大肆其術度人逐鬼踣盗碎石出神入夢召雨揺峰烹雞降鶴起死嘘枯麾訶嗾斥一方千里白叟黄童竭蹶其廬或以爲善幻誣民因召飮可鴆眞人出門戒其徒先鑿池灌水撓而濁之往則持杯盡飲曰吾貧人也無嘗從人丐取今幸見招願丐餘杯以盡君懽與之又盡飮歸解衣浴池中有頃池水沸涸以故不死猶鬚髮髠鬝不纓不能受冠二十七年徵至燕京居之天長觀嘗問衛生爲治對曰含精以養神恭己以無爲雖廣成復生爲陛下言無易臣者世宗嘉之繼問飲鴆對曰臣素無取仇人者良由得疾致然或曰或謂異人或讒善幻世宗試而鴆之見不可殺悔怒而逐讒者當時諱之謬云然也明年爲修眞觀居不踰時求還山世宗贐之委去其年世宗不豫復來徵眞人對使者曰吾不難斯行誠不及一仰清光矣明年正月三日下車世宗崩已一日章宗留爲醮資大行冥福其年復還山萊陽富人劉植無子六月爲供致眞人而薄其酒曰取汝其室藏樽煮酒來植依求之則其妻密置人初不知者飲已留書四四應眞字曰以是嗣汝明年四月十四日眞君降辰植果育子舉家喜曰四四眞人指月日爲告耶即求子名眞人曰吾已名之應眞矣承安二年再徵至便殿問衛生對如告世宗者賜紫號體玄大師居之崇福觀月給錢二百緡是時吕道安將建祖庭蓋眞君故廬以無勑額不敢集衆眞人奏立觀靈虚賜道安冲虚大師而祖庭造建始盛以母玄靖年九十求還山侍厚贐遣之泰和改元及三年詔兩設普天醮於毫州太清宫度民爲道士千餘人其年玄靖逝七年居聖水玉虚觀元妃送道經一藏大安改元北京請居華陽觀庚午醮薊州玉田縣謂其徒曰若聞空中劍楯擊撞聲乎北方氣運將回生齒必有横罹其毒者是年果天兵南牧丙子文登請居天寳觀明年丁丑四月二十三日沐浴衣冠拜上下四旁以逝年七十六有雲光集行世爲其言者條分派出多於六宗數不啻萬丘演道弟子尹清和眞人爲道大宗視眞人爲叔歳乙未擇其孫清泠子劉志源俾建上清太平宫蓋由盩厔民張守眞能誦翊聖保德眞君語必爲今及當來休咎徵且授九壇三劎之法以捕逐鬼物宋太宗嘗勑有司作宫千柱以妥景靈金季蕩焚木灰瓦屑清泠翦棘誅茅以居時日薄西山纔構孚佑一殿卒其弟子陳志玄朱志彦趙志古張志隱李志宗李志明崔志安趙志眞及今賀李兩君十人相嗣爲之歷四十五年構通明紫微七元三殿虚皇一壇凌霄一門靈官演法湛然傳應法師祠四堂鍾樓齋庖廡廪將二百楹位置雖劣祖庭猶足爲自關而西名山福地土木之冠嗚呼上清作爲宋太平興國中出内幣殫西土財力爲之既其毁也乃復於道流數人之身眞人生逝於金而見贈於皇元眞人生逝皆在山東其徒教行關西擇勝地以祠其祖亦事理之不可必究者也彼眞人者果能不死排空御氣載營而西顧不抵掌雲中曰吾孫若曾亦有可才如是者耶詩曰少正純重兮四君皆陽生不並時兮名相襲芳豈以陽者兮本天親上輕舉凌空兮易爲向往何獨一君兮海蟾自名將取月魄兮隨日受明日月爲易兮衛生要訣世微五君兮奥疑誰析又嘗思之兮少正蟾純歷世綿邈兮絶學無人嗚呼重陽兮纔七弟子有婦人焉兮六人而已父雄子良兮中有玉陽體玄廣度兮始人爲狂行歌市中兮望道未見從學崑嵛兮識習一變離隱查山兮旋徙雲光冬眠抱雪兮夏立迎陽九年德就兮鬼盜避逐騰神入夢兮群異傍出莫毒匪鴆兮持飮如漿名藹燕都兮徵來天長衛生爲治兮宸扆問益鴻言剖疑兮中夜前席别建修眞兮還山固求鳳翼承旂兮邈不可留歸軫經時兮世宗不豫章廟累超兮奏章帝所惟不拒人兮崇福玉虚華陽天寳兮不恒其居在在授業兮其出一户繇子暨孫兮獨踰萬數東海之波兮百里涵濡今焉西流兮溢及鎬都太平之宫兮古仙聖宅一孫十曾兮翦棘攸作身生不西兮逝未百年而教之西兮他門孰先碑其平生兮道行彌晰爾祖爾思兮來裔無斁廣寧通玄太古眞人郝宗師道行碑嘉議大夫嶺北湖南道提刑按察使東平徐琰撰大元有天下好賢樂善度越前古凡有德之士不及用者必加寵數以旌顯之初無間於道俗存亡之異也中統二年詔賜盤山棲雲道人王志謹之號曰惠慈利物至德眞人至元六年韶贈棲雲之師廣寧郝大通之號曰廣寧通玄太古眞人至元二十三年詔賜棲雲弟子洞陽徐志根之號曰崇玄誠德洞陽眞人旌有德也是年三月予將赴官湖南道出汴梁時洞陽掌本宗教住朝元宫率其屬來見請於予曰貧道出家無過人之行誤蒙聖朝采録錫以徽稱使得簉於師眞之列皆吾先師棲雲之訓也棲雲之所以表見於世者獨非先師太古之澤也歟二師道行卓異在人耳目孰不知之必得文士與之紀述庶幾可以傳信後來昭示永乆棲雲則有翰林承㫖愼獨王公之作已勒之石若夫太古之碑義不可後而今尚缺然是則嗣教者不敏之過願屬筆於子儻辱惠顧我曹之責塞矣予自惟懦生昧於玄學叙事遣辭或致抵捂徒取誚於識者牢讓再三竟不獲已又洞陽與予同宗見待素厚難於終拒乃據洞陽所録宗師行實採摭綴緝以付之仍繫以銘詩俾步虚者歌之以頌師德師姓郝名大通字太古道號廣寧子寧海人家故饒財爲州首户兄俊彦登進士第官至朝列大夫昌邑縣令師初諱昇少孤事母孝禀賦穎異識度夷曠蕭然有出塵之資讀書喜易研精尤甚因洞曉陰陽律曆之術不樂仕進慕司馬季主嚴君平之爲人以卜筮自晦大定七年重陽眞君王祖師自關西寧海遊行於市見師言動不凡仙質可度思所以感發之者遂背肆而坐師曰請先生回頭眞君應聲曰君何爲不回頭耶師悚然異之眞君出師閉肆從之及於館所而請教焉眞君授以二詞師大悟不覺下拜自是日往親炙以有老母未即入道明年母捐館師乃棄家入崑嵛山禮眞君於煙霞洞求爲弟子眞君納之賜名璘號恬然子仍解衲衣去其袖而與之曰勿患無袖汝當自成蓋傳法之意也九年寧海人有構金蓮堂以待眞君挈其徒西歸居之師携瓦罐乞食誤觸之碎眞君别授一罐題頌其上云撲碎眞灰罐却得害風觀直待悟殘餘有箇人人唤未幾師辭眞君去與王玉陽往居查山眞君亦赴汴京馬丹陽譚長眞劉長生丘長春四子實從十一年師聞眞君上仙四子已入關遂西遊以訪之十二年葬眞君於祖庭師欲與四子同廬墓側長眞激之曰隨人脚跟轉可乎師明日遂行至岐山遇神人授今名字及道號十二年度大慶關而東翱翔趙魏間十五年坐於沃州石橋之下緘口不語河水泛溢身不少移水亦弗及人饋之食則食無則已雖祁寒盛暑兀然無變身槁木而心死灰如是者六年昌邑君之季女嫁爲眞定郭長倩之夫人長倩夫婦過沃州知師在橋下駐車拜謁贈之衣物所以存慰者甚厚師藐然若不相識一無所受夫人感泣長清嗟異而去二十二年師過灤城又與神人遇受大易秘義自爾爲人言未來事不差毫髮至鎮陽居觀升堂演道遠近來聽者常數百人已而闡化諸方專以利物度人爲務由是郝太古之名聞天下明昌初東還寧海一日欲作易圖遽索紙筆適粥熟弟子不即與請俟食已師曰速持來我方得意何暇食粥筆入手布紙揮染疾若風雨不終朝成三十三圖其㫖意皆天人之藴奥昔賢所未發者咸平高士王賢佐占筮素精見師推服盡棄其學而學焉由是技進名動闕庭其他靈異之跡如天長預告侯子眞之火恩州夜入王鎮國之夢者尚多有之不可殫紀春秋七十有三以崇慶元年臘月晦日仙蛻於州之先天觀前此三年勑其徒預營塚壙告以死期及是果然平生製作有三教入易論一卷示教直言一卷心經解一卷救苦經解一卷周易叅同契簡要釋義詩賦雜文樂府及所作易圖號太古集凡十五卷行于世噫道家者流其源出於老莊後之人失其本㫖派而爲方術爲符籙爲燒鍊爲章醮派愈分而迷愈遠其來乆矣迨乎金季重陽眞君不階師友一悟絶人殆若天授起於終南達於崑嵛招其同類而開導之鍜鍊之創立一家之教曰全眞其修持大略以識心見性除情去欲忍恥含垢苦己利人爲之宗老氏所謂知其雄守其雌知其白守其黑知其榮守其辱爲道日損損之又損以至無爲莊生所謂游心於淡合炁於漠純純常常乃比於狂外天地遺萬物深根寧極才全而德不形者全眞有之老莊之道於是乎始合重陽唱之馬譚劉丘王郝六子和之天下之道流祖之是謂七眞師其一也非天授之其孰能與於此哉師逝之後弟子行縁四出能世其業者甚衆高弟范玄通與棲雲王宗師又其尤者當中原板蕩國朝隆興之初一居東平一往來乎燕汴建琳宇開玄壇聚徒講說貴賤欽仰宗風大振道價增崇不减太古今洞陽耆艾敦厖剛毅木訥食師之德幹父之蠱當釋道紛爭摧敗挫衄之際寂然湛然守之以謙冲安之以委順處之以鎮靜操修無方精進不輟用能上取聖知特隆璽書褒美較其難易又不出於棲雲之下謂非太古之澤將何歸乎凡今之人欲知太古請觀其子欲知其子請觀其孫銘曰東方雲海空復空群仙出没空明中此語常怪東坡公神仙有則八表同不應秀止東方鐘崑嵛山高天比崇左顧右瞰搏桑宫上有一洞煙霞封重陽發之麾鬼工紫炁直與閻浮通馬譚劉丘王郝從六子矯矯皆人雄縹緲至自蓬萊峰驚見碧海磨青銅煌煌七朵金芙蓉信哉仙人出於東就中郝公鸞鳳龍洗心以易虚玲瓏藏用於密退以冲粃糠富貴不掛胸剛决物莫嬰其鋒訓練復遇王元戎衲衣一傳神契融有袖無袖由人縫同門之朋稑與穜脚跟不必隨渠儂沃州石橋張果蹤亘如虹蜺插蒼穹大道在此南北衝何須遠走巢雲松止而不動吾非慵艮乃萬物之始絡結跏趺坐爲瘖聾朝觀日出光隴曈吞霞入腹丹火紅暮觀流波朝彼宗河車挽水玄霜蓬有人問之趨下風如以寸莛撞巨鍾揺手使去妨吾功過橋行人抗塵容僵名仆利不有躬見公視世猶蟻蜂形骸土木心冥鴻顙必有泚羞頑庸反求於身當發蒙撙貪節愛瘳癏恫憧憧往來秋夏冬百感一二亦已豐如此利益誰能窮確乎六年眞苦攻養成姹女連嬰童奮袖起舞知德充願以所餘及倥侗普度一切超樊籠泥在鈞兮金在鎔螟蛉蜾蠃無常蟲功成朝元去怱怱飛霞佩玉鳴冬隆雲裝煙駕滄溟重弱水萬里昏濛濛淮南小山空桂叢黄芽欲種須圃農公不可見憂心冲棲雲老仙亦難逢住世賴有徐神翁七眞讚北平王粹子正述重陽王眞人出應道運豪雄絶倫甘河得遇兀若狂人挈還四師大開全眞巍巍法教東海西秦丹陽馬眞人晚契奇因盡捨家貲千朝得道三髻承師風雷示化金玉垂辭邈矣前躅如何可追長眞譚眞人一見師眞痼疾頓愈决烈入道水雲爲侣歸櫬終南聚徒洛土教風既弘蜕然高舉長生劉眞人童眞之力聖賢所扶風姿秀異洛市工夫中遭厄鬱所守不渝聲名卒顯被召海隅長春丘眞人猗歟長者不可復得三朝推尊才學功德愍此兵戈遠涉西北九九乃終世人莫測玉陽王眞人幼遇玄庭再禮重陽飛傘送號金蓮共芳跡多神異名動帝王高山景行千載雲光廣寧郝眞人雖出閥閲獨喜林泉兩詞一衲終始師傳神示易祕沃橋六年化縁逆順悉合自然甘水仙源録卷之二
