front:
  text: 甘水仙源錄卷之四
  hash: sha256:06b0987540ba8f6c37e37a94c9f1078ee1044d69e05b53357e3bf9a96093e4fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_CK-KZ_02p060a, image: JY295/CK-KZ_JY295_02p060a.png}
body:
  text: 真常子李真人碑銘朝請大夫翰林修撰同知制誥賜紫金魚袋張邦直撰學道之難大要有三一曰悟理二曰弘教三曰付畀得人能備是者其真常真人乎真人之所學卽世之所謂全真者也是道之傳古所未有倡始於重陽王君門弟子得其傳者馬丹陽玄寶洎其室孫淸淨不二譚長真通正劉長生通妙邱長春通密王玉陽體玄郝廣甯大通七人而已厥後學者徧天下無慮數千萬人而習他教者爲衰嗚呼盛哉真人之時馬已謝世而邱劉王郝尚無恙真人厯扣四君見者皆以爲可教乃抽關啓鑰不少靳固真人會集微妙淵停海涵無一不具由是心益明了而其道坐進矣性好山林乘興卽往然未嘗留滯一處始在燕薊間尋之登之萊之嵩之河秦旣而卽大梁之丹陽觀居焉所至則徒眾奔走往來願受教門下者無虛日真人一皆接納飲食教誨略無倦容故人人咸自以爲有得而依歸之誠益堅真人一日遣人詣郿之五姓邀甯海于公伯祥主中太乙宮且曰于吾友也風神灑落識度夷曠衣褐懷玉而不願人知蓋吾先師長春子所密授者他日興吾教者其斯人歟及癸巳之春大朝遣使徵真人旣受命治裝行有日忽顧謂其眾曰天將興治古之道而吾不及見吾向所以邀于者正謂今日也遂以後事付于而問曰日景午未侍者曰午矣乃枕肱而逝享年八十有三真人德興人諱志源李其氏真常蓋邱師所賜號云其他神異之事當世名公鉅人載之詳矣故不復具系之以銘曰維昔重陽倡此全真孰承孰傳作者七人迨及真人會同諸師微顯闡幽于南之陲聲聞於天大朝來徵受命旣還忽焉遐登真人嘗云甯海之于他日興教在斯人歟出言必酬如響應聲所以前知得於至誠維生有聞維後有傳槩之古人不幾乎全夷山之陽汴水之湄刻我銘詩以求厥垂離峯子于公墓銘遺山元好問撰有爲全真之言者衞致夷狀其師離峯之行請予爲墓道之碑曰始吾離峯子事長生劉君年未二十便能以苦自力丐食齊魯間雖腐敗委棄蠅蚋之餘不少厭不置廬舍爲定居計城市道途昏暮卽止風雨寒暑不卹也吾全真家禁睡眠謂之鍊陰魔向上諸人有脇不沾席數十年者吾離峯子行丐至許昌寄嶽祠通夕疾走環城數周日以爲常其堅忍類如此嘗立城門之側有大車載藁秸而過藁觸其鼻忽若有所省懽喜踴躍不能自禁爲一老師鎻閉空室中三日乃止初不知書自是日誦數百言有示老莊者隨讀隨講如迎刃而解不數年徧內外學作爲歌詩伸紙引筆初若不經意皆切於事而合於理學者至今傳之爲人偉儀觀器量寬博世俗毁譽不以關諸心獨於周急繼困恒若不及也南渡後道價重一時京師貴遊聞師名奔走承事請爲門弟子者不勝紀正大中被旨提點亳州太淸宮賜號紫虛大師離峯子之生平如此門人輩將以葬師洛陽長生觀吾子嘗許以銘幸卒成之予在三鄉時蓋嘗見離峯子於眾人之中及官東南離峯子樂與吾屬遊思欲扣其所知而未果也且衞求予文有年矣今復自聊城走數百里及於濟上待之者又數月病予懶於筆墨若謂有疑於師者然予於離峯子何疑哉予聞之今之人全真道有取於老佛家之間故其寒餓憔悴痛自黔劓若枯寂頭陀然及有得也樹林水鳥竹木瓦石之所感觸則能穎脫縛律自解心光曄然普照六合亦與頭陀得道者無異故嘗論之夫事與理偕有是理則有是事然亦有無是理而有是事者予撰夷堅續志有平居未嘗知點畫一旦作偈頌肆口成文深入理窟者三數人黥卒販夫且然况念念在道者乎張內翰敏之離峯子之舊敘其歌詩曰師自以其言爲道之棄物今所以傳者欲知此老林下百眠塵中幾蛻耳又曰悠然而風鳴汛然而谷應彼區區者或以律度求我是亦按天籟以宮商責渾沌之尠丹青也吾友孫伯英河洛名士在太學時出高獻臣之門若雷希顏辛敬之劉景玄皆天下之選而伯英與之遊頭角嶄然不甘落其後一見師卽北面事之竟爲黃冠以殁張予所敬而孫所愛也二君子且然予於離峯子何疑哉乃爲銘離峯子諱道顯出於文登于氏初隱觀津女几之桃花平過洛陽得其師劉君舊隱葺居之是爲長生觀住太淸三年避壬辰之兵於盧氏漆水公迎置鄧下俄以疾終春秋六十有五離峯子其自號云銘曰分食雞豚託處鼯蛇視身寇讐自干罝羅樂有加耶年可退耶所持者狹而所獲奢耶豈無考槃在澗之阿木茹草衣召來天和急而張之弦絶奈何學道之難成使人咨嗟曰婦姑勃蹊交喪則多千日之功或棄於毫末之差彼避險而就夷背實而趨華拱璧以先駟馬不免於盜夸若人者不潰於流不磷於磨始於同氣關弓終以大方爲家顧雖蛻骨於此安知其不冠靑雲而佩飛霞也耶弘玄真人趙公道行碑翰林待制知制誥兼修國史李謙撰弘玄真人仙蛻之七十年至元庚辰春嗣法孫刑默庵道安託終南重陽萬壽宮宗主天樂真人李道謙狀其行實遣弟子至京師以道行碑爲請推本源委乃敘而銘之按真人諱悟玄字子深姓趙氏出臨潼之零口民家在孕十有二月生於金天德元年驚姜之夕室有光燁然父母異之早孤事母魏以孝謹稱性冲澹屏棄外慕旣冠讀書通大義時全真教始興真人聞而嚮焉會第一代重陽公謝世丹陽馬公扶護而西道出零口真人迎館於家禮敬備至丹陽觀其有受道之器與之語遂相契翌日遇丹陽行丐長安市真人出貨泉百緡饋之歸謂母曰人生幾何汨没一世間徒勞人耳不若鄙遠俗務棲心玄門可以悟理可以明性可以達道母曰果若有志吾與偕往乃舉家入道訪丹陽於終南之劉蔣師事之親炙日久丹陽教以息心養性之術浸有所得長安人趙恩虛第宅以請乃築爲環堵師弟子入居其中今蓬萊觀是也宴坐數𡻕心境澄徹至理貫融得丹陽之學爲多其後丹陽東遊有稷山段明源者復究玄旨丹陽喜曰關西已有趙悟玄河東又得段明源吾教得所傳矣是後關中之人攀挹道譽以不得參接爲恨邠州淳化李氏築爲精舍廷真人以居因剪柏四枝手植於庭且口占數語以道其樹善本之義柏遂生迄今茂盛泰和中樊川雒六郎者事真人執禮恭甚其弟某家居城中屢於茶肆見一道者居座傍暇日謁其兄來樊川聞真人爲兄所禮敬也同往拜之閱其貌則茶肆常見者因以語兄知真人未嘗出大加敬信遂割別墅朱陽村之柏坡爲真人築庵之地庵成命曰全道又謂弟子然逸期曰京兆延祥觀道祖玄元示跡之地曩者丹陽師已築堂其側他日必爲崇福道場汝可居之真人時亦往來其中𡻕增月葺今爲名觀大安壬申春真人拜掃先塋諸弟子皆從中路聞虛空有聲如樂音合奏從者皆聞之真人因作歌詞以志其異僅成半篇命弟子魯現琦識之時弟子李道寶自洛西還道中忽與真人遇且曰汝當速行吾其逝也言終不見至陜復遇真人曰向嘗作歌詞未終篇今足成之汝其無忘道寶至湻化真人已返真矣道寶爲諸弟子言所見舉其詞合現琦所識遂成全篇眾皆駭異真人閱世六十有三年自號了真子明年葬柏坡之全道庵同知平涼府事楊公庭秀實誌其墓國朝掌教宗師淸和尹公拜祠下嘆其崖巓峻狹不足以容廣厦命其徒芟夷坡之下而改作焉額曰翠微宮尊之也真常李公奉朝命追贈今號曰弘玄真人真人邃於玄學所謂修丹養性黃庭內外景之說得之於心宣之於口皆成詠歌有曰九九詩無生吟具載仙梯集傳於道流山東諸郡目真人曰小丹陽初真人居澧西嘗晨起呼眾曰三十年後玄教大興當有宗師闡化門人徧天下汝等其勉之及長春邱真人赴太祖聖武皇帝之召竟如其期咸以爲至誠前知靜而能應云門弟子甚眾其尤賢而有道者曰淸貧子王德遇洗燈子然逸期明微子王志淸嗣淸貧者曰呂志真嗣洗燈子者曰張道性明微子度李志久方主翠微宮事銘曰道家者流祖玄元太虛爲室靜爲門靈襟不受塵翳昏擴然洞見天地根厥初濫觴發真源季世遂有支流分禬禳科禁何紛紛玄元至教幾湮淪全真之興百餘年弱而能强謙而尊無爲而爲妙用全不言而言真理存重陽而下數散仙翼賛其道能弘宣就中丹陽得真筌誰能繼之曰弘玄妙齡不著愛欲纏逃人逕入終南山環堵宴坐百慮捐天光內照如澄淵關中道譽芬芝蘭捐貲割土爭招延築庵要結香火緣嗣法有人今再傳淳化之柏高參天翠微之宮矗雲煙御風乘氣返自然惟餘勝跡光樊川終南山碧虛真人楊先生墓銘翰林修撰嘉議大夫同知制誥上輕車都尉彭城郡開國伯食邑七百戸賜紫金魚袋劉祖謙撰明昌初僕時年十四五就學於長安聞得道羊皮先生已羽化于府署之宣詔廳復有紙襖先生居焉數數見之方稚蒙未能知其異人泰和之末得官有扈或言楊碧虛者傳王祖師之道名振關中乃向所謂紙襖先生也先生名明真其號碧虛子耀州三原趙曲里人家世爲農兄弟四人俱入道先生其伯也仲曰守珪餘俱早世先生始從馬丹陽學復詣山東見邱王諸師由宣詔廳往來南山承安泰和間徒眾頗多歸之適陜右二統帥俱皇族相繼師禮焉運使嘉議高公忽病心痛治莫能效先生爲布氣按摩立愈有詩十絶爲謝先生素不識書口占賡酬略不停思高大異之嘗云先生獨傳祖師心要紙襖草履土木形骸或歌或舞或類狂癡曾以養生安心術相授其爲宦貴士流尊禮如此道俗景仰隨問隨答頃刻詩頌積疊人人滿意正大二年淸明日語門人李志常卽祖墳預建壽塔果以十年六月無疾而逝享年八十集所爲歌詩餘三百篇目曰長安集先是其仲守珪受印可於先生遂居鳳翔一日求木於前知府术虎公旣瞑目門人歛焉郡人驚異觀者萬計二道人因忿爭於前久之不解忽聞擊木聲舉蓋再起讓曰若輩將賣我作利賂耶速蓋棺將無人矣葬後不數日北兵奄至城扉果闔於是郡人始悟事見定海節度使盧通議墓碑云嘻一門而二達者異哉志常以師之擴獨未有銘見請宜銘世人憧憧名利場體便綺紈味膏粱氣不內充性則戕一真忽焉散微茫反以紙襖爲猖狂誰知懷玉終煌煌倒持陰陽長不亡飛上神京朝玉皇守爐鍊丹曾竊嘗其徒今有李志常終南山全陽真人周尊師道行碑筠溪天樂道人李道謙撰至元甲戌𡻕秋九月壬午終南山重陽成道宮提點呉志恒來劉蔣祖庭之筠溪再拜稽首曰我先師全陽周君道高德著福大緣深願得子之文刻石以傳來世余以不敏辭而弗許也謹按藏室所收金蓮記及崆峒李公君瑞作師墓銘并向者洞真真人于君常談師之言行而編次之師姓周氏諱全道世爲古幽之巨室亂後譜牒遺墜故世系莫得其詳生於皇統乙丑十二月二十二日自幼語默進止若成人狀貌奇古神情雅澹夙喪其父生理蕭索竭力以事母母忽感奇疾百療不愈師割股與藥同進厥疾乃瘳鄉黨以孝聞年及冠里人有以子妻之者師婉其辭而卻之及母氏之終天也哀毁過禮幾於滅性嘆曰吾嘗聞道家有言一子進道九祖登仙欲服罔極之恩無踰於此時大定癸巳𡻕聞丹陽宗師環居終南祖庵弘演真教師徑詣席下求受道要丹陽納之俾與弟子列自薪水舂爨皆使親厯師恭服勤勞數年匪懈丹陽察其有受道之志一旦召入環室付之真訣及賜以全陽子號師旣得法克己鍊心行其所受如是又數載合堂雲眾莫不服其踐履之實無幾何丹陽謂曰邠近邊鄙教化難通汝當往居以弘吾道師承命而行卜庵玉峯山下頤神養浩積德累功與人子言教之孝與人弟言告之順貪者誨以廉懦者諭以立各因其根性淺深皆蒙啟發至於疲癃殘疾惸獨鰥寡而無告者收養於庵中由是閭里士庶日益敬仰邠人爲之遷善壬寅丹陽鶴馭東歸師每至淸明必躬詣終南祖庭致祭𡻕以爲常貞祐間𦍑人陷邠師亦在虜中雖被俘縶其精進道業略不少渝羌識其爲異人遂釋之厥後四方來詣門請益受教者奚止滿戸外之屨度弟子僅千人俱令各立方所誘掖後進元光末尚書左丞張公信甫出鎮邠郡素忌師名一日詣庵叩其所修師告以道德性命之理公喜其誠出而語人曰周全陽有道者也翌日設齋仍贈以袍履時遣人候問起居師亦嘗往來寓居長安縣之漢高祖廟統軍完顏公待以師禮正大戊子復還邠以十月十有七日命眾作齋召嗣法門人圓明子李志源洎諸上足囑之曰終南南時村活死人墓祖師開化鍊真之地吾欲增葺以彰仙跡奈世態如此不可强爲也他日昇平之後汝輩各當勉力以成吾志言訖命侍者焚香令眾誦淸靜經師危坐澄聽甫竟三過枕左肱而逝春秋八十有四葬於玉峯庵側士人王才卿者與師爲莫逆友時仕慶陽方天兵圍城甚急忽夢師布衣藜杖造門而至曰吾今特來與公相別軒冕倘寄不堪久戀此身一失再得實難珍重而去未幾圍解王乃訪人始知師入夢告別之日乃返真之辰也遽解印綬黜妻子樂道以終其身先承安戊午𡻕東魯鄆城縣洞虛子張志淵者嘗兩夢神人持白刃叱之曰爾年將盡胡爲不參師學道以脫速死耶旣覺心神恍惚因詣郭西郊行以暢其情適見一道者麻衣草履軀幹魁偉飄然西來就而言曰汝有宿緣故來相接卽於道傍樹陰教以烹鉛鍊汞密語及解以麻絛贈之且曰敬之哉無忘吾訓三十年後當有吾門弟來此與汝相會是時汝得與師真共結大緣矣張問其姓名答曰吾關中周全陽也俄失所在張乃警悟遂易衣入道後於濟州剏白雲觀度門弟數百人悉立庵觀於齊魯之間壬辰六軍下河南李圓明挈眾北渡於東河縣築棲真觀居之張聞往見告以向日遇師之故圓明出師畫像示之張焚香致拜曰此正吾曩者所遇師也卽遞相印可以圓明爲道兄焉乙未關中甫定圓明追念師之遺命率法屬門眾百餘西歸於南時剏重陽成道宮張洞虛屢輦金幣以資其用不十載雄構壯締庨豁可觀辛丑春淸和真人會葬祖師畢命門人捧師仙柩葬於劉蔣之仙蛻園壬子常教真常李君奉朝命追贈全陽廣德弘化真人號師仁慈憫物惠愛困窮處已儉薄而厚於施設每以謙沖自守不恃其成而居物先其嗇氣頤神之妙乃平日素習雖須臾不少替迨乎應緣扶教則任物之自然而門徒輻集權貴欽崇非以計謀而致其事仙宮道觀所在俱有成績兀坐終日望之儼然而不見惰容及其卽之熙然如陽和生物使人虛往而實歸老氏之三寶南華之真人行師兼而有之可謂聖門之達者歟系之以銘曰嗟若全陽玄門之綱天姿英偉上性昭彰松筠節操鐵石肝腸釋塵緣而求道要適玄化之浸昌三髻宗師授以靈章心淵而明氣大而剛神宇泰定發乎天光七載而心符聖教九年而妙契真常承命而行演道故鄉邠人先饋奚啻五漿示神變而驚張入夢魂而別王駕一氣之鴻濛恣八表以翱翔遊紫府宴華堂朝上帝禮元皇混太虛以莫測齊浩刼以無疆門徒道友思之不忘構祠而設像暮燈而朝香紀遺烈而刻貞珉將爲萬世而傳其芳也普照真人玄通子范公墓誌銘上黨宋子貞撰公諱圓曦姓范氏號玄通子甯海人性有夙慧能紀始生時事少長見屠豕遂不茹葷居母喪露處墓側父喪具凶服日一往雖大風雨不避幼業儒喜涉獵書傳務通大義而已年十九從郝太古學爲全真太古深器之潛授祕訣且屬以觀事常住多羨餘幾十萬緡聽其出入不問太古尋順世餘眾利其財謀欲害公公聞而笑曰吾爲眾守耳何至如是卽并管鑰以付拂袖如膠西屏絶世慮自閉環室中究其所謂精氣神之學繼徙密州州人大加敬信貞祐初紅寇起東海富人多以財寶寓公城破寇入公度不可保乃盡出所有以啖渠帥老幼獲免者甚眾寇退遺民奉公爲主復爲城守先是有詔能完復一州一縣者名就拜其州縣長官已而命下公力辭之曰道人得此安用改賜普照大師本州道正受之山東益亂由東平入覃懷登太行下遼山以達邢臺時邢臺已歸命遂屬國朝尋遷趙州築環堵不出居一𡻕聞邱長春奉詔南下詣謁於燕山大蒙印可俾充河間真定等路道門提點武仙之變挈徒走泰山丙戌東平大行臺嚴公迎修上淸萬壽宮署道教都提點時遣人候起居或就諮訪禮意勤縟莫與爲比公亦論列利害不屈左右行臺之政多所裨益積十有二年宮事稍就緒乃東遊海上謁太古祠及一覲先壠徑詣真定築太古觀又修趙州之天甯觀時時往來其間戊申朝命加賜玄通廣濟普照真人牢讓不受是𡻕遊關中祀重陽祖師於終南秦隴帥太傅濮國公素蹇傲未嘗下士見公不覺膝屈三返致疏請提點重陽萬壽宮公辭以年老不任應接帥檄關吏不令出公不得已爲之住持纔半載假以行緣諸方復還真定未幾會葬源明真人李志源於有莘歸次大名一日晨起盥潄畢忽謂眾曰吾今日以往更不度人日始中奄然長逝平昔嘗語人曰從上諸師多淹疾累久不得速去甚不快人意或曰師能之乎公曰令汝看至是果然𡻕在己酉十月二十五日也享年七十二門人王裕中等輦其柩歸東平卜以明年二月二十五日葬於上淸萬壽宮之翛然堂以子貞嘗辱知於公懇求乞銘公爲人開朗尚義汲汲於濟物而疾惡之心太重若將有志於世者閒暇談笑亹亹可愛一有不合則面折力爭雖毫髮不貸要之胸中無滯礙故言雖切直人不以爲訐與人交必盡誠振乏急難輕財如糞土樂從士大夫遊汴梁旣下衣冠北渡者多往依焉尤邃於玄學神怪幻惑之術略不掛口其嘗受戒籙稱爲門弟子者不可勝計四方請益之士多乞爲歌詩及其手字公布紙落筆動數百幅殊不致思而文彩可觀得片言隻字皆藏之十襲以爲祕寶所至之地則候騎絡繹幢蓋塞路馬首不得前自郡守縣令而下莫不奔走致敬北面師事其爲時所重如此銘曰三山無跡雲海昏海上渺渺餘仙源篤生異人弘妙門太古嫡嗣重陽孫淸談揮塵玉屑噴戲墨落紙銀濤翻窮殫聖奧角與根餘子不得窺其藩姝姝暖暖蓬艾繁竊取温飽幾穴垣鵬化甯知北海鯤麾斥八極恒孤騫退身閑居道愈尊所在請益如蜂屯百𡻕厭代歸朝元羽輪飈車閬復崑昭昭中有不亡存惠子已矣誰與論爲公作詩銘九原亦以發予之狂言棲雲真人王尊師道行碑翰林學士承旨資善大夫知制誥兼修國史王鶚撰今上皇帝卽位之二年稽古建官百度具舉內嚴省署外列監司班慶賞以酬勳庸錫嘉名以尊有德越八月之望中書丞相奏全真老宗師王棲雲操行純正海內欽崇宜降璽書以彰寵數制可特賜號惠慈利物至德真人命下之日四方萬里聞之莫不感悅知其錫予允當師真得人也師法諱志謹占籍東明之温里家世業農富而好禮師生體異夙有道緣甫冠將娶不告而出徑趨山東路聞太古廣甯真人演教甯海執弟子禮久之緣熟漸次親灸口傳心受凡得一語銘諸肺腑自是日益修進大蒙印可逮廣甯仙蛻隻影西來壞衲破瓢首蓬面垢行不知所之止不知所爲人役之笑而往人辱之拜而受韜光晦跡未有識其爲道者尋值兵饑盜賊蜂起民皆潛匿師遭執縛將殺而烹之神色不變言辭慷慨略無懼容羣盜知其異人而釋之亂甫定從長春真人北遊燕薊徜徉乎盤山西澗之石龕草衣木食若將終身焉諸方學者日來質疑由是道價愈增令聞遐播然猶執謙樂居人後長春仙去方出經行不喜置鉢囊拄杖盛暑不笠不扇嚴冬不裘不帽沿身之外無長物人有以財物獻者雖勉受之過目不問後遊諸方到卽緣契興建琳宇在處有之所至泰然不以舊新介意住雖久去不回顧暫憩朝夕亦猶久寓之安車轍所經願爲門弟子者動以千數達官著姓白叟黃童山林緇素之流閨闈笄緫之子莫不羅拜於前其爲世景仰如此凡了童之拜師卽答之或問之則曰凡隸玄門皆太上之徒吾之昆季也天下之患莫大乎傲慢輕易道性人人具足奚分長幼乎聞者嘆服平居澹泊不事華飾惟祭饗高真色色莊嚴未嘗以爲過雖金冠玉珮鶴氅鳳履服之不辭也設醮之際屢致休禎或鸞鶴翔空或風雨應期隱而不言不可殫紀𡻕戊子經鎮市帥曹德祿邀師作黃籙大齋遠近會者不下數千其井僅供二三十人德祿憂之請于師師命具茶果躬祭井上以淨席覆之厯一晝夜而後啟其泉洶湧用之不竭醮已復初四方傳誦師不以爲異或詢其故師曰無他彼以誠告我以誠應誠意交孚天地可通况其餘乎聞者愈服其感應不可備錄初重陽真人西歸契丹陽輩四子傳道於汴之逆旅主人王氏不禮反謗毁之重陽曰吾居之地他日當令子孫卜築於此主人以爲狂未幾重陽登仙後六十有四年汴降師挈其徒跡其地不十數年殿宇壯麗氣壓諸方識者知重陽之言始驗師亦不以爲功曰諸人之力也凡所興工皆聽自願不强率不責辦故人樂爲之用中統癸亥夏六月己酉朔晏坐方壺不語不食門弟子怪問其故但閉目凝神指虛空而已及沐浴安寢靜聽不聞呻吟之聲熟視不覩屈伸之跡門眾環侍不敢少離叱之曰汝等各幹自己正事去越十有七日乙丑盤桓枕肱晏然而逝春秋八十有六傾城號泣三日遠近訃聞皆爲位以哭事之如生其至誠感人又如此師雖不看書所行皆合理事所言唯真實語動與二篇四輔相契有一毫利人利物卽自爲之向在特室環堵中如對千百人無做作無縱恣無褻慢日日如是𡻕𡻕如是所謂獨立而不改周行而不殆惟師有焉師慈以利物儉以律身謙以自牧老氏之三寶師能保之所以上格天心下孚人望嶷然爲一代宗師學者瞠乎其後而有不可及焉𡻕閼逢困敦正月朏師之門人論志元魏志言持師行狀洎提點張志格李志居書不遠數千里乞銘於予予於師鄉里也同宗也昔予待罪翰林稔師之名限以南北未之獲見北渡後始識於燕予不知宗屬近遠以年長一紀拜之師亦答拜比年數數會晤時辱見臨情話終日予乘間問之曰師年八十宜深居簡出坐以傳教使問道之人香火來不亦重乎顧區區普受人請車無停轍人無甯跡毋乃涉於輕易耶師應之曰渠書生也凡在交際宜有分別我全真者流不敢失前輩遺躅富貴者召之亦往貧賤者召之亦往一日十請亦往千里來請亦往急於利人所以不敢少安以自便耳又問師所至日書法名不知其數不詢其人不考其素其中豈無惡少博徒無乃爲累乎師曰全真化導正在此耳使朝爲盜跖暮爲伯夷則又何求雖千百一人亦化導之力也予聞之喜甚知師之心天地之心父母之心也後之學者欲吾師之真師之全一編語錄求之有餘師予衰朽之人忝居翰職應制之外不宜爲人作文字帷師以同里同宗之分而掌教誠明真人亦爲言之義不容辭乃爲書其大槪拜手稽首而爲之銘銘曰玄元至德澹乎無爲支分派別橫流四馳天授全真障而東之作者七人爲百世師粵有廣甯號稱鐵面棲雲入侍久經鍛鍊隻影西歸一無健羨白刃交前神色不變北遊燕薊養浩盤山學者方來日叩玄關爾言雖答予心自閑長春仙寂遊戲人間睠惟汴梁重陽蛻息大建朝元翬飛雉翼不自爲功歸之眾力名飛九重爾書褒德八十有六聊以應緣密承道廕在處百千一聞訃音泣涕漣漣付畀如常教得所傳惟師之行光乎道紀惟師之名達乎萬里堂堂一碑未盡其美我銘以辭無愧焉耳應緣扶教崇道張尊師道行碑承事郎太常博士應奉翰林文字孟棋撰廣哉道之爲用巨無不包細無不入後玄元之跡千八百年黃其冠鶴其氅以五千言爲宗者不可勝紀而全真之教獨能大振玄風會眾流而爲一夷考其行豈無所本而然哉當乾坤板蕩之際長春老仙徵自海濱首以好生惡殺爲請一言之功旣足以感九重而風四海又侍從之士十有八人皆英偉宏達道行純備或心膂之或羽翼之欲玄風之不振眾流之不一不可得矣故應緣扶教崇道大宗師十八人之一也宗師姓張氏諱志素號谷神子睢陽人震肅之際母夢衣冠丈人以芝見授明日誕師及長風儀秀整遇異人飲之以酒襟靈頓悟有瀟灑出塵之想遂拉同志謁長春真人於東萊長春嚼齒大罵漫不加省二三子大懼皆逡巡遁去師留請益恭長春噱然笑曰孺子可教遂以備庖爨之列始於侍海嶠之遊赴龍庭之召迄於環西域之轍稅燕城之駕艱關數萬里首尾四十年周旋供養未嘗失長春旨意暫違几杖輒有如失一手之喻長春羽化淸和真常二真人嗣教師一居提點之位一錄中都路道教事眾務鱗集他人若不可措手師處之常有餘裕旣而應北諸侯之聘演教白霫門徒琳宇燦然改一方之觀時譙郡玄元祖庭久廢於兵僉以興復爲難誠明真人念獨師可辦尺書加幣改白霫之轅而南之居十餘年殿堂廊廡合百餘楹彩碧一新郡上其事有詔特加擁衞仍錫今宗師之號至元五年十二月屢有光自頂出氤氲徹於空際一日語其徒曰長春有閬風之召遂沐浴具衣冠而逝壽八十有一嗚呼異哉師有才略幹局遇事必成文章技術靡不兼善故訃傳之日咸有道林憔悴之嘆雖然此奚足以知師蓋大方之家以心爲死灰以形爲槁木黜聰明去健羨至於㗳焉隱几不知有己而後已師至人也豈獨異夫是哉但真光內映心與天遊物交於前一與之淵默一與之波流發於外者不得不爲賢智事業輿人蚩蚩語其渺冥恍惚之妙不可得而致詰特以土苴見稱耳觀谷神子者能以此言求之庶乎其不繆矣一日住持太淸宮提點李志祕狀師生平用道教提點劉公之命以紀述爲請義不可讓遂約其所說而書之至元九年春謹記
