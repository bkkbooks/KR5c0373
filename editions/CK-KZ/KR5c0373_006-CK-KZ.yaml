front:
  text: 重刋道藏輯要甘水仙源錄卷之六
  hash: sha256:619501395cee1219a54ab84f7b3a716c0afe6d45bdae5631bf5b407e1656bae4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0373_CK-KZ_02p098b, image: JY295/CK-KZ_JY295_02p098b.png}
body:
  text: 夷門天樂道人李道謙集終南山重陽萬壽宮無欲觀妙真人李公本行碑宣差宗玄大師提點陜西五路興元路教門兼領重陽萬壽事何道甯撰釣六鰲於東海者不爲鯢鱨而垂鈎採合抱於鄧林者不爲拱把而加斧苟志於大區區細務不較也今觀無欲行實其超出物表之志蓋類是歟公族姓李諱仲美原月山人父珍職官醖有子四人公其次生於大定己丑五𡻕始能步及長聰慧邁倫慷慨特達毅然以正直自負里閈有狡獪者每正辭折之人望而畏服嘗肆意酒間視舉世爲不足玩年三十七乃幡然曰與其汨沒塵坌中孰若擺脫方外耶時全真教方行意欲從師而未知所向適碧虛楊先生主重陽祖庭事乃往見之碧虛素得人於眉睫間知其爲玄門重器然天屬所繫度其有難解於心者且令還歸但勉以積善而已公抵家與諸親友決謝妻子而去其妻訕之笑而不顧其父見而呵責公婉其辭曉之以理性之事父徐省悟亦欲向道乃同詣碧虛門下碧虛以公識量不凡命名守甯及無欲子號公蓬頭弊衣行丐於市時人謂之酒李先生日用間惟以濟人利物爲己任至於幽微之理允造其極大安庚午秦境大旱居民阻飢公謂其屬曰餓殍如此安忍坐視同邑趙三郞富甲關中公詣其門備訴田里艱棘之狀趙悟乃發廪粟付公賙賑公與齊志道等晝夜舂爨以給貧病日不減百人井水適涸眾憂之公密禱于神鑿泉得水設濟至秋斂而罷公素不欲彰名懼人知己卽日西行已而有司奏聞特賜趙爲潤國長者未幾入興平環居以千日爲約其靜中妙用見長安集至期渠河使夾谷公及耆老數輩就環懇請以縣南龍祥觀委公爲主公諾之居五年至興定庚辰住終南樓觀五年又遷京兆之丹霞尋蒙師旨主營建三原碧虛觀事所寓之地皆有成規正大戊子春碧虛於祖庭丈室謂公可以倚重舉以自代關中搔動公及軍民避亂于南山糧盡人相魚肉幾及我公或曰此酒李先生素有道者也因攜持出山遂得免焉庚寅春如南陽依附者眾會冲虛李公洞真于公在汴冲虛奏請住持丹陽觀癸巳汴京欵附于我朝俄而忽起異議無辜者皆坐誅公與一長老止水泊中迫於兇焰長老悚慄不能自持公止之曰我輩平日所行正爲此耳死生常事夫何畏焉竟以事免城中絶糧人爭北渡津人固拒飢溺者以萬計公請洞真先登因以陰隲開諭津人餘皆獲濟公繼達新衛門徒望風輻湊今之靈虛天慶創成榮觀自此始也明年領眾適燕時淸和尹公掌教每會道眾議祖庭緣事皆推公爲能公謝不逮復奏請住持重陽宮兼任提點陜西教門事更名志遠祖以厚贐公東行而歸過魯過魏自侯伯以下皆夾道祇迎有以庵觀奉之者有願爲弟子者有以財施者公得之不以一毫私已悉歸之祖庭京兆田侯德粲聞公西歸督佐官就河中相迓以府城佑德觀歸之今玉淸宮是也時關中甫定暴狠相煽公以仁言誘掖稍稍格心比年南征俘摯來者不絶公詢其主有好善者多端勸諭引而歸道有不可必致者乃議貨取隨授以明文許其自便其感之深者終不忍去公嘗往來於祖庭玉淸之間然規畫調度未嘗不拳拳於祖庭丙申秋受淸和師書督祖師葬事畢掌教真常宗師又任以祖庭之職冬十月詔提點重陽宮再年秦士議修文廟闕瓦郞中邳邦用輩請於公公盡給之士皆稱嘆庚子春三月被旨特賜無欲觀妙真人號秋七月河北郝公總管家隸百餘陰謀南遁得其顯狀盡欲刑之公聞之連夜馳至其門以善言誨導亡者皆免明年城中羣小數百結連私逸權府韓淵密知其情議尸諸市以令眾感公一言但殲其魁渠太傳移刺寶儉其母死欲以二婢爲殉公以古葬禮正之始罷議凡契丹人以人殉死者弊因以革丙午春詔燕京作普天醮公預焉夏四月歸自衞汴京長官復請住丹陽棲雲王公具禮郊迎座中若有急色介諸徒速出人莫知其然甫登舟南軍己擁京門其先見類如此明年還宮秋八月朝旨加玄微真人號尋又被冠服之寵甲寅春宗師以國家醮事具書招致年已八十六矣不敢以老耄辭比至堂下疾篤以後事付于法弟衍真大師張志悅以其徒拜宗師爲大度師於長春方壺留頌而蛻時夏六月二十六日也諸徒奉柩西歸附葬于終南祖塋禮也葬之明年志悅命李志安陳志元具行狀請于宗師欲刻諸石道𡨴適有事于堂下宗師就命當筆且曰無欲領袖祖庭蓋有年矣今子代之始終行實子必熟知其文之也固宜道𡨴不復牢讓謹按無欲可見之行爲之說曰有主持玄教之大人不可無輔翼玄教之仁人大人者正己而物正者也我宗師正容悟物天下羽士皆觀而化無欲公輔弼其教以仁存心俾祖師根本之地有隆無替可謂無負宗師眷倚之意蓋公之爲人稟剛大正直之氣持特立獨行之操傳授有源充養有地故施於事也無不濟之以仁遇患難則先之見人急難必盡力救援而後已有叩其修真之訣者則以積累勉勵之其可與談性命事者每至夜分不寐雖與童子言亦諄諄未嘗倦至於名士大夫尤樂與交遊而相忘形骸與人接談又能度其高下而切中其機然且待人以約持己以謙其處眾也威而不猛和而不流在環堵四五年間神變之妙欲直書之恐人以爲誕原其動靜語默之常亦可謂世間異人者矣故碑之而無慊乃賛之曰偉歟李公專氣致柔其守也堅其行也周解紛庶務而善計不籌一志不撓而先爲之儔若人者將猒世擾攘而追帝鄉之遊耶吾知其了了諸緣而㗳然乎歸休也紫陽真人祭無欲真人維大蒙古國𡻕舍乙卯正月己亥朔二十三日辛酉友生河南漕長兼廉訪致仕奉天楊奐謹致祭于無欲真人開元天寶若呉尊師性質高鯁克愼攸履嘯月吟風嵩少之趾所與善者惟李謫仙孔巢父爾若張志和號玄真子浮家泛宅逍遙卒𡻕寓意於魚釣不設餌曰陳少游實觀察使曰顏魯公乃州刺史杖屨往來迄今傳之以爲勝事奐也何人浪名進士職非顏陳才非孔李巖穴素契洞真無欲兩翁而已旅舍京華適癸之已天兵南渡喋血千里十二都門閉而弗啟一死一生誓言在耳頃承驛召入長安市洞真羽化吁亦久矣真人旣見傾寫底裏目電射人徹曉不寐靑山滿眼簿書紛委盛夏五月腦瘡作祟夜半託君萬有不諱朝殞朝葬暮殞墓瘞大限未終勉强而起真人入燕遽然猒世倐聞訃音老淚如水玉骨北還臥病桑梓剝琢荆扉尺書踵至白馬素車遠涉淸渭三奠生蒭少酬知己儻念宿昔能不監止再見無時伏惟尚饗佐玄寂照大師馮公道行碑銘虎巖趙著撰公諱志亨字伯通寂照其號同州馮翊人五代瀛王道之後賦性明敏業進士年甫弱冠府薦入京師就住太學兩赴內試不中適崇慶兵亂還鄉以詩書自娛不復爲舉子計本州節度使奧屯肅請攝教授事公辭以不能大兵西征公因北渡寓德興深居不出𡻕癸未長春宗師自北闕迴道過焉公以其平昔聖學浸灌之故至是爲真師感發之機一召於外而己之天機立應於內鶴鳴子和森不可禦尋卽願奉几杖列門弟中乃先謁真常真人爲先容真常一見莫逆於心遂引見焉宗師亦不以常人待之旣還燕一夕指公謂二三尊宿曰斯人他日必能扶持吾玄門後事也公默然銘於胷中後數載宗師將歸真宅眾乃以嗣事爲請師曰我之託付伯通知之矣不必復言長春仙去公謂淸和真人曰道教之興自開闢以來未有今日之盛長春宗師人貌而天者也教門後事屬意在君豈非天乎請毋多讓遂集道眾并達官貴族天下大老便宜劉公之屬就迎於所居之靜室請定仙號初淸和閉門而不納公奓戸而入扶至堂上使眾羅拜堂下名位旣正玄風大振公之力也至乙未淸和因祖庭事往闡教於秦晉之間默遺公手書云予年邁而往矣老不歇心少不努力俱非所宜况四時之序功成者去未成者來汝當果斷時不可不順公得書乃自念言真常攝行此事已十年知之者不惟玄門道眾上至天庭下至山野皆知之此蓋天也豈人私意所得而可否哉丁酉淸和承詔還宮公乃取元初立淸和彌縫扶護之禮按爲典故而行之遂立真常旣畢淸和乃以歸老之計逍遙於自得之鄉真常乃以無礙智慧進服教門之重任輔兹二真人終始進退俱不失其正者亦公之力也先是承詔教授冑子十有八人公乃於名家子弟中選性行温恭者如其數爲伴讀令讀孝經語孟中庸大學等書庶幾各人於口傳心受之間而萬善固有之地日益開明能知治國平天下之道本自正心誠意始是後日就月將果皆克自樹立不惟俱獲重用復以才德見稱於士人又勸宣撫王公改樞密院爲宣聖廟命弟子薛德琚修葺武廟而守祀之又創建五嶽觀及道庵十餘處爲道眾修進之所庚子冬十月京兆太傳及總管田侯等請淸和改葬重陽祖師以公爲輔行自燕至秦三千餘里凡經過道家宮觀廢者興之缺者完之至百餘所其間公爲之記使刻諸石者亦十二三焉祖師葬事旣已復從淸和還宮戊申真常大宗師依恩例賜金欄紫服遷充教門都道錄權教門事仍賜以今號蓋嘉之也及將立玄學公復以作成後進之心而賛助之直至有成甲寅秋八月二十三日示疾卽真享壽七十有五二十六日葬之五華山之西南原禮也化之明日著因以祭文致奠禮於靈柩前門人薛德琚姚志玄執公之行狀求爲墓銘將刻石以表之著辱公之交爲最厚因知公爲最詳故不辭而爲之且真常之於此老一相遇便懽若平生遂引致博大真人門下同著道家冠服又與築室於宮之右而居之比至物化三十五年之間其相與往來者梁運使斗南陳翰林秀玉吳大理卿德明輩每論及當世人物至以宰輔之器許之其雅量高致爲可知已厯觀三代宗師所行之實跡則是靡有一事不相咨問不相假借而成之者又於化前後凡十數日數相往來於似夢非夢之中豈亦各人胷次真理融會之地別有相得於形聲之表歟何其誠通氣合物莫能間而至於是耶或者往往竊議謂同出身於儒之故兹蓋囿於私智之所見也化之後真常祭之曰與公相會三旬有五不交以勢不聚以富憶初相見無言心許公今假化境出非人生死示跡孰知其神此豈囿於私智者之所能及也哉予故斷之曰如其不然烏得爲寂照乃銘之曰堂堂佐玄博大無偏止水應物不隨物遷禮服智燭仁宅義路才德雖兼時則不遇蓽門圭竇終日如愚窮通有別聖道豈殊忽遇長春星拱北辰一惠發藥德因日新孔廟躬修武廟繼剏文武之道將行有望公之所開豈小補哉賛成玄教亦卜大來荆金趙璧光而不耀英華外發誠明內照昔日非熊今學猶龍彼此一時不謀攸同刊之金石磨滅有終盛德流風云胡可窮重玄廣德弘道真人孟公碑銘太原虛舟道人李鼎撰公名志源字德淸號重玄子其先本上京徒單氏大定末遷萊州膠水居孟氏宅人因以孟氏歸之此亦古之因食采地得氏者也高祖貺卒於汾陽軍節度使高祖母完顏氏金源郡王希尹之妹曾祖克𡨴尚嘉祥縣主事熙宗海陵興陵道陵凡四朝以功累遷至太師封淄王及薨諡曰忠烈祖斜哥辭世襲千戸終于南京副留守父給答馬復世襲千戸職母烏林答氏略以金國名臣傳考之其家世可謂盛矣况在大定明昌泰和間使他人處之鮮不爲紛華之所流蕩公獨從髫齓中猒富貴而樂淡薄非性分上夙有薰習之力能之乎明昌初年饑卽墨人高翔嘯聚劫掠詔命公之父討之乃曰食者民之天得之則生弗得則死抵死求生小人之常情討而誅之惡在其爲民父母也遂宣布主上之德賑以倉廪不戮一人寇爲之平古語有云活千人之命其後必有顯者是公能了此大事亦必借先世豐功厚澤陰相之力而致之耳公有三兄六弟其兄有官至驃騎者有至輔國者餘皆克紹家聲泰和癸亥父母與議婚事公因遁去徑詣濰州玉淸宮見長春宗師請爲門弟子師憐其貴家子兼異其風骨不凡後必爲玄門大器乃從其請授今之名字父兄疑其第四都全真觀主知之故爲隱匿縶歸有司公聞之遂還家自言其志父母知不可奪因選第二都樂真觀使居之樂真今更名玉淸矣公雖得法於長春充養之際亦嘗質於玉陽太古二師真玉陽賜號開真子太安己巳長春應詔京師還住玉淸知公有所得乃賜重玄子號蓋嘉之也貞祐癸酉公之昆弟皆爲兵亂蕩散而父母失依公乃扶二親就己所居致孝養之力三載雖二兄還其安置省問誠敬之禮未嘗缺己卯聖朝遣便宜劉仲祿起長春於海濱門人中選道行淸實可以從行者得十八人公其一也及進程萬里沙漠其緇重車皆兩人主之惟公獨御焉淸和憫其勤請副於師師曰吾知斯人之勤矣但欲先行其人之所難而後必有大所獲耳公聞之乃曰弟子於師丘山厚德無以爲報共僕其御實當爲之事予惟不知所求亦不知爲勞也同行者由是雖勤苦百至皆爭赴矣辛巳西至阿不罕山始有漢人耕作因公等九人立棲霞觀癸未住德興之龍陽甲申長春奉旨往燕城太極宮尋更名長春公亦自龍陽來丁亥師反真公年四十一矣一日靜坐一室忽於恍惚間見重陽長真長春三師真公拜畢侍立祖師言汝壽當七十五長春言汝五十後必負教門重任事雖繁劇汝勿憚是皆磨礪汝之砥石煅鍊汝之爐冶也言訖不知所在尋覺身中百關通暢真氣泝流昇尾閭入泥丸是後日復一日神物變化金漿玉液黃庭絳宮灌漑浸漬非言可及公因徧考先代師真得道之後身中之事著見於書者針芥相投矣公從此以來雖顛沛造次罔不在是其身中所得流運之理亦未嘗止想當時其爲樂可勝計耶至淸和真人掌教乃副知長春宮事俄遷知宮戊戌受宮門提舉丙午遷宮門提點戊申權教門事己酉以恩例賜金冠紫服并至德玄虛悟真大師號癸丑掌教真常大宗師奉朝命普度戒籙委公爲監度師丙辰真常羽化誠明真人張公嗣教以公玄門大老之故己又在制遂授以教門都提點印俾攝其事戊午秋應丞相胡公之請主平陽黃籙羅天大醮尋奉令旨賜今真人號中統二年辛酉春秋七十有五矣度門人五百有奇宮觀稱是是年春二月二日順正而化前此數日預以後事囑門人凡爲省視者見其耳聰目明音吐洪暢盡如平昔皆不之信至是方知公之所得過人遠甚越三日葬之五華山仙瑩從遺命也至於度門人立宮觀兹皆緒餘土苴眾人之所共見者或可得而言之今壽幾八十矣而精神不衰臨行一著又明白如彼其素養之於內必有精真微妙眾人之所不能見之者豈易得而言之也送葬之日官僚士庶前擠後擁傾動都邑道眾不言可知秋九月門人狀其行請文於予予因按其實而次第之屬以銘曰荏苒柔木言緡之絲大浸沼天砥柱不移二者之美公并有之公旣有之我請布之一遇師真便得正理觀公之性已超異矣及住大宮中正不倚四十年又出類矣苟非其人道不虛行本若不立道無由生推公之孝及公之誠本旣立矣道宜有成人所見者緒餘土苴公之得者妙絶真假天地一指萬物一馬不以是觀知公蓋寡與其觀身孰若觀神神如之何把握乾坤陰升陽降黃河崑崙至人妙處不屬見聞精神骸骨各歸本始門人治任奢儉合禮燕城之北五華之址碑以表之公元不死渾源縣真常子劉君道行記前進士王鶚撰君諱道𡨴雲中白登人世爲縣吏以廉平稱君生不好弄閒與諸兒戲必結庵跌坐曰我學道爾識者知其有宿習及長雅意玄門昆季凡四人君其伯也縣民推嗣世業力卻之太和壬戌聞渾源隱士劉柴頭號得道乃與家人訣詣屏風山金泉觀師事焉師厯試諸難至遣丐食君樂從不屑也師知可教遂授微旨自是東遊海上西厯關中寓華山上方之白雲宮屬𡻕饑僵餒立志不少衰旣又如太原泊神霄宮有饒益院僧賢而飯之道獲楮幣千二百貫君榜求其主踰月竟不至悉以給貧乏而一無所私貞祐之甲戌避地張村穴洞以居𡻕丙子鄉里稍安帖土官馮祿聞君之在并也迎歸雲內君尸居環堵若將與世絶者而樂道之人渴於請益百方爲出之於是肩摩踵接學君之學者日益眾矣庚辰春渾源長高定飽聞君譽敬請之來曰龍泉曰金泉曰玄元皆名觀也君更爲住持而興廢起頓之功爲多癸未秋真人邱長春入覲回君執弟子禮迓諸銀海之東目擊道存一見如故問君之初事以柴頭對師頷之曰仙人中天隱也因授祕訣加號真常令築室西京未幾推爲道官長遊戲十年庭無一訟逮長春仙蛻淸和紹休尤與君相得丙申之春尹淸和謁祖庭還會君於古恒嶽之陽語之曰吾近遊陜右奉田侯德粲之命凡玄宮道宇皆擇人主之惟華山之雲臺地靈物秀實仙家一洞天非君無可託者君再辭不獲遂遣門人爲經營君亦往返再三大興築構所過崇奉男女如市癸卯中夏田侯修華嶽廟復與丞相胡公天祿同署邀君於雲應間君聞命欣然卽日就途甫四三年厥功告成丙午春有詔設普天大醮於燕京之長春宮徧召諸方耆德而君亦預焉時李真人主醮事得君甚喜是年夏五月庚申旋車古恒越二十二日壬午請州牧高仲揀洎門人許志安屬以後事翌日將中曲肱而逝春秋七十有五君生長大定明昌間不以世俗所樂者嬰其心而能遠跡塵凡棲心物表東遊西厯所至風靡雖土木屢興聊亦應緣而已嘗作巴人曲接引於眾又著會仙隨應總仙三錄以道神仙可學之事臨終語門弟子曰可於丈室瘞吾軀榜以倐然足矣蓋取南華翛然而來翛然而往之義則君之平昔所養可知已方君之在渾源樂與學士魏公邦彥遊故其亡也門人史志經狀其行走燕求記于公且將刻石祠堂之側公一日攜以過僕曰真常好道人吾知之詳然吾老不作文字久矣子其代予言僕初客燕城殊無文思重違學士之請而復嘉志經之不忘所事乃以臨終之言名其堂因爲紀其始末云若夫門弟之翹楚者皆當識諸碑陰兹不敢喋喋𡻕疆圉協洽淸明前六日記重玄子李先生返真碑銘嘉議大夫吏禮部尚書高嗚撰金朝故事新天子卽位例出諸王爲方鎭大安崇慶間宣宗以豐王來彰德先生時以高訾家推擇爲功曹掾有廉平稱尤精算術因之出入府中雅性重厚復小心畏愼故見親任至甯元年宣宗入繼大統明年車駕幸汴梁扈從以行補戸部令史當艱難之際柄臣高琪蔑視文吏其持下急如束濕從事者爲之惴恐稍稍引去先生以直道自任氣殊不少衰會被檄漕米餽燕師抵霸州值北兵大入幾至不測然憂世之懇每見於顏間議者謂秩無崇卑顧力行何如耳若是而進武則功名爵位其畏不顯一日忽報謝病歸隆慮山聞者愕然適與丹陽馬公之高弟盧公相遇便請執禮爲全真師旣付授有源未幾默有所契徑入樓霞谷無憂洞深坐練化木茹澗飮其節愈堅苦學道者難言之行元師府宗室惟良招撫使杜仙皆一時豪傑日加敬異在屯戍扞禦中嘗率僚佐致謁其他可知甲申聞長春邱公應召還附盧公遠迓得賜名志方號重玄子盧公有北京之命謂先生緣在彰德俾之南行總管趙德用請住迎祥觀觀雖兵燼日久凡事草剏先生一顧奐焉有承平舊物之漸丁亥長春公上仙攜法眾往祭因宿留檀順若致心喪焉庚寅復還士庶逢迎懽動閭里皆曰吾家先生來也總帥蕭仲通曁同列奉疏請主盟天慶宮宮之荒廢畧如始住迎祥時先生力爲經度不數𡻕大敞而新之殿堂庭廡壇藏廚庫下逮廐湢咸備而法視他郡邑爲冠丁巳宗王穆哥崇向高風遣使持金冠雲錦羽衣焜耀之仍加真人號以庚申二月九日春秋七十有六怡然留頌而逝門弟子葬之王裕村某原從治命也所著地元經若干篇行於世甲子春提點趙志璞偕法兄弟扶狀來謁曰先師𡨴神塜上之木拱矣而旌紀寂寥誠惠顧之以銘死且無恨敢請鳴以先生之行有應銘者蓋先生少時已自不碌碌雖由文法進人皆以遠大器許之况潜邸舊人依光日月君臣相遇古人謂之千載雖方駕漢名臣可也乃今挺然不顧槁項黃馘自棄於澹泊無端倪之地以至成道非烈丈夫孰能如此以是槩之真可銘也已若夫萬鶴遶醮壇而翔飛蝗抱祭器而死虎承牒而殺田豕雪失道而作司南其靈異類此者甚多皆先生平日所不喜道亦不敢具書先生字友之相州安陽人初諱益旣入道止以法名行銘曰貪魃倀倀不膠者臧在昔所難在我翕張城旦刑書家令智囊顧乾龍未躍已麗乎初九之陽迨雲雺滃然而從相得益章果以功名自任於一代宗臣而有望政屑就代來之議猶作封侯之宋昌胡舍彼而取此抑可謂有天德沉潛之剛翩翩獨征澹與世忘擁腫之與隣寂寞之爲鄉是宜爲下士所笑而耿耿自信者廓兮其心光此孰得孰失計必有能辨其詳或乘白雲或下大荒千年夜旦曾不失處順安時之常有豐者碑植立墓傍繄攓蓬之日雖樵童牧堅知有道者爲不亡棲真子李尊師墓碑嘉議大夫河東山西道提刑按察使王博文撰尊師姓李氏諱志明字用晦棲真其號也世爲潞之壺關人以農爲業祖考而上皆潛德不耀甫九𡻕去父母爲全真學初禮樊山潘先生爲師誦經讀書爲童子事稍長遇超然廣化王真人授以火候周天之法鍊陰爲陽之術久之覺有徵驗鼓舞踊躍不自勝乃曰師真豈欺我哉自是益積日新之功遂事長春真人命名與字愛之深所以教之篤始自薪水庖廐及一切勞筋力役心智之事皆令親厯而備嘗之然後誘之以至道之妙示之以用力之方廑懇諄複不憚朝夕師亦力强而志苦至脇不沾席者逾十年靜而生慧性識明了伸紙引筆肆口爲歌頌皆有理致長春曰李生果爲受道之器非餘子所及也居無幾乃曳杖掛瓢徑歸太原葺保真觀居之或寄跡於鄽肆或丐食於村墟觀化閱世人無識之者但以單子李師父目之時方進取國制未定戎馬營屯星散汾晉間劫攘財物戕害人命者在所有之有司莫敢誰何𡻕庚寅太宗皇帝南伐駐蹕并之古城師率徒侶拜覲天光拈香祝壽上情悅懌因勅兵人有暴民攘物者以軍法從事遂著爲令由是行者無擾居者晏然師與有力焉辛卯再駕而南復蒙盼睞是後師之道價益重矣淸和宗師嗣教命管領一路道門事仍兼本府道錄復以道體冲虛大師之號畀之未幾府尹石抹公及道錄智公以保真狹隘疏請師住持天慶故宮天慶兵亂後鞠爲荆棘瓦礫之場旣允其請慨然以興復崇建爲事一日從容語徒眾曰度道士以守宮觀雖近代之制然自漢武帝時於甘泉宮中爲臺畫天地太一諸鬼神像各置祭具自是之後蔓綿衍溢恢張弘大以至於今其來遠矣吾道家者流雖恬淡無爲以治其心可不以分祉祝釐爲立教之跡乎是則以營繕之事不得不盡心力而爲之也或有以功大難之者師曰古人有言作舍道傍三年不成謀之欲眾斷之在我卽荷畚鍤爲之倡從之者雲集貴者董其役富者輸其財智者獻其巧壯者程其力師斡旋運動於神明之中而應之者不愆於素遂使天慶之䂓制雄碩俊整爲一方之冠者具見於榮祿宋公所撰萬壽宮碑兹故畧戊子夏大旱將爲一路災府中祈雨僚屬以師主醮事已而澍雨霑浹𡻕以大豐又宣差完顏胡失刺暴得奇疾氣息幾絶家人走告師以危殆狀躬詣其處咒詛杯水下咽復甦其精誠之至感格之效如此平生不勝計所錄纔一二耳己酉真常真人以師踐履之實洋溢遠邇遷河東南北兩路道敎副提點凝坐一室中不動聲色而事無不集者雅爲誠明宗師所敬重中統二年卽陞副爲正越明年左仙翁保奏於永𡨴邸卽授棲真洪妙真人之號方爲人天所瞻仰遽爾猒世於至元丙寅建子月之浹晨返真得年六十有七又明年師之高弟提點張志希侯志正等請道教都提點洞元大師申雲叟繼主天慶事雲叟卽師之同法弟也至元癸酉予方官太原適洞元還自燕都將以是年四月己酉葬師於太原府城之東南三里所從遺命也洞元持師之門人郭志修等所纂行實狀以墓碑爲請洞元與予二十年之舊也固辭弗許因請洞元言尊師一方外閑人耳無猗頓之富無晉楚之力徒以日積月累而𡻕以增加遂令荒寒寂寞之域一顧盻之頃化爲天上之玉京平地之寶坊非德足以服人誠足以感物曷以臻此莊子有言水之積也不厚則其負大舟也無力風之積也不厚則其負大翼也無力以師今日之所成就者論之可謂積厚而有力者哉銘曰維全不虧不虧何傷維真不僞不僞可常斯道昭昭熟爲主張得其人而遇其時遂川流而天光僉謂若人福厚莫量心靜而明志堅而剛內德旣充道價日彰事之者煬竈爭席師之者摳衣升堂騰實蜚聲佩蘭襲芳砥柱中流橫潰獨障遊赤水而得玄珠讀南華而友子桑視人世之死生猶旦夜與陰陽遽猒世而上仙返白雲之帝鄉顧雖蛻骨於此旣不足以喪吾存則又何必驚於凡亡耶
